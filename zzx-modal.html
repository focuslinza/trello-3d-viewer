<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Просмотр .zzx</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="./config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fflate@0.8.2/umd/index.js"></script>
  <style>
    :root{ --bg:#1d2125; --bg2:#22272b; --line:#3c444c; --txt:#e6edf3; --muted:#9fadbc; --accent:#4f7cff; }
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--txt);font-size:14px}
    .wrap{padding:16px;max-width:900px;margin:0 auto}
    .sec{background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:14px}
    h3{margin:0 0 10px;font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
    .muted{color:var(--muted)}
    .small{font-size:12px}
    .files{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
    .fbtn{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:8px 12px;cursor:pointer;color:var(--txt);font-size:13px}
    .fbtn.active{border-color:var(--accent);color:#fff;background:#2b3a63}
    .preview{background:#fff;border-radius:10px;padding:10px;text-align:center}
    .preview img{max-width:100%;height:auto;image-rendering:auto}
    .specs{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-top:10px}
    .spec{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:10px 12px}
    .spec .k{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
    .spec .v{font-size:16px;font-weight:700;margin-top:2px}
    .bar{position:sticky;bottom:0;background:var(--bg);border-top:1px solid var(--line);padding:12px 16px;display:flex;justify-content:flex-end;gap:10px}
    .btn{background:transparent;border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:10px 16px;font-size:14px;cursor:pointer}
  </style>
</head>
<body>
  <div class="wrap" id="app"><div class="muted" id="boot">Загрузка…</div></div>
  <div class="bar"><button class="btn" id="close" type="button">Закрыть</button></div>

<script>
  var t = window.TrelloPowerUp.iframe();
  var WORKER = (window.CONFIG && window.CONFIG.WORKER_URL) || window.WORKER_URL || '';
  var ZFILES=[]; var curUrl=null; var lastObjUrl=null;

  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function boot(m){ var b=document.getElementById('boot'); if(b) b.textContent=m; }
  function td(x){ return new TextDecoder().decode(x); }

  function loadList(){
    return t.card('id','attachments').then(function(c){
      var atts=(c&&c.attachments)||[];
      ZFILES = atts.filter(function(a){ return /\.zzx$/i.test(a.name||''); });
    }).catch(function(){ ZFILES=[]; });
  }

  function render(activeUrl, bodyHtml){
    var html='<div class="sec"><h3>Файлы .zzx на карточке</h3>';
    if(!ZFILES.length){ html+='<div class="muted">На этой карточке нет файлов .zzx.</div></div>'; document.getElementById('app').innerHTML=html; return; }
    html+='<div class="files">';
    ZFILES.forEach(function(f){
      html+='<div class="fbtn'+(f.url===activeUrl?' active':'')+'" data-url="'+esc(f.url)+'">'+esc(f.name)+'</div>';
    });
    html+='</div></div>';
    html+='<div id="viewer">'+(bodyHtml||'<div class="muted">Выберите файл.</div>')+'</div>';
    document.getElementById('app').innerHTML=html;
    [].forEach.call(document.querySelectorAll('.fbtn'), function(b){
      b.addEventListener('click', function(){ open(this.getAttribute('data-url')); });
    });
  }

  function specRow(label, value){ return '<div class="spec"><div class="k">'+esc(label)+'</div><div class="v">'+esc(value)+'</div></div>'; }

  function parseSpecs(files){
    var specs={};
    try{
      var seg=files['Segments/content.xml']?td(files['Segments/content.xml']):'';
      var m=seg.match(/SectionClass="([^"]+)"\s+ThickNess="([^"]+)"/);
      if(m){ specs.section=m[1]; specs.thick=m[2]; }
      specs.cuts=(seg.match(/GeoCurve\s+Handle/g)||[]).length;
      var nm=seg.match(/TubeSegment[^>]*Name="([^"]+)"/); if(nm) specs.name=nm[1];
    }catch(e){}
    try{
      var info=files['info.xml']?td(files['info.xml']):'';
      var a=info.match(/AppName="([^"]+)"\s+AppVer="([^"]+)"/); if(a){ specs.app=a[1]+' '+a[2]; }
      var st=info.match(/SaveTime="([^"]+)"/); if(st){ specs.saved=st[1].replace('T',' ').replace('Z',''); }
    }catch(e){}
    return specs;
  }

  var SECTION_RU={ Square:'Квадратная труба', Rectangle:'Прямоугольная труба', Round:'Круглая труба', Circle:'Круглая труба', Oval:'Овальная труба', Channel:'Швеллер', Angle:'Уголок', H:'Двутавр', C:'C-профиль', D:'D-образная' };

  function showFile(url, files){
    var thumb=files['Thumbnail/Seg'];
    var body='';
    if(thumb && thumb.length>2 && thumb[0]===0x42 && thumb[1]===0x4d){
      if(lastObjUrl){ try{URL.revokeObjectURL(lastObjUrl);}catch(e){} }
      var blob=new Blob([thumb], {type:'image/bmp'});
      lastObjUrl=URL.createObjectURL(blob);
      body+='<div class="sec"><h3>Предпросмотр детали</h3><div class="preview"><img src="'+lastObjUrl+'" alt="preview"/></div>';
    } else {
      body+='<div class="sec"><h3>Предпросмотр детали</h3><div class="muted">В этом файле нет встроенного превью.</div>';
    }
    var s=parseSpecs(files);
    body+='<div class="specs">';
    if(s.section) body+=specRow('Профиль', SECTION_RU[s.section]||s.section);
    if(s.thick) body+=specRow('Толщина', s.thick+' мм');
    if(s.cuts!=null) body+=specRow('Резов/контуров', s.cuts);
    if(s.name) body+=specRow('Имя сегмента', s.name);
    if(s.app) body+=specRow('Программа', s.app);
    if(s.saved) body+=specRow('Сохранён', s.saved);
    body+='</div></div>';
    render(url, body);
  }

  function open(url){
    curUrl=url;
    render(url, '<div class="sec"><div class="muted">Загрузка и распаковка файла…</div></div>');
    fetch(WORKER+'/zzx-fetch?url='+encodeURIComponent(url)).then(function(r){
      if(!r.ok) throw new Error('сервер: '+r.status);
      return r.arrayBuffer();
    }).then(function(buf){
      var files;
      try{ files=window.fflate.unzipSync(new Uint8Array(buf)); }
      catch(e){ throw new Error('это не распаковываемый .zzx (' + (e&&e.message||e) + ')'); }
      showFile(url, files);
    }).catch(function(e){
      render(url, '<div class="sec"><div class="muted">Не удалось открыть файл: '+esc(e&&e.message||e)+'</div></div>');
    });
  }

  document.getElementById('close').onclick=function(){ t.closeModal(); };

  loadList().then(function(){
    if(!ZFILES.length){ render(null, null); return; }
    open(ZFILES[0].url);
  }).catch(function(e){ boot('Ошибка: '+(e&&e.message||e)); });
</script>
</body>
</html>
