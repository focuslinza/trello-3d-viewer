<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Просмотр .zzx</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="./config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fflate@0.8.2/umd/index.js"></script>
  <style>
    :root{ --bg:#1d2125; --bg2:#22272b; --line:#3c444c; --txt:#e6edf3; --muted:#9fadbc; --accent:#4f7cff; --green:#3aa657; --brown:#8a5a2b; }
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--txt);font-size:14px}
    .wrap{padding:16px;max-width:900px;margin:0 auto}
    .sec{background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:14px}
    h3{margin:0 0 10px;font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
    .muted{color:var(--muted)} .small{font-size:12px}
    .preview{background:#fff;border-radius:10px;padding:10px;text-align:center}
    .preview img{max-width:100%;height:auto}
    .specs{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-top:4px}
    .spec{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:10px 12px}
    .spec .k{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
    .spec .v{font-size:16px;font-weight:700;margin-top:2px}
    .fld{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
    .fld label{font-size:12px;color:var(--muted)}
    input[type=number]{background:var(--bg);border:1px solid var(--line);border-radius:8px;color:var(--txt);padding:9px 11px;font-size:15px;width:180px}
    .row{display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end}
    .calcout{font-size:15px;margin-top:6px}
    .calcout b{font-size:18px;color:var(--green)}
    .bar{position:sticky;bottom:0;background:var(--bg);border-top:1px solid var(--line);padding:12px 16px;display:flex;justify-content:space-between;gap:10px;align-items:center}
    .btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:11px 18px;font-size:14px;cursor:pointer}
    .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--txt)}
    .btn.green{background:var(--green)}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .hint{background:#2a2f1c;border:1px solid #4a5a2c;color:#dbe8b5;border-radius:8px;padding:8px 11px;font-size:12px;margin-top:8px}
    #msg{font-size:13px;color:var(--green)}
  </style>
</head>
<body>
  <div class="wrap" id="app"><div class="muted" id="boot">Загрузка и распаковка файла…</div></div>
  <div class="bar">
    <div id="msg"></div>
    <div style="display:flex;gap:10px">
      <button class="btn ghost" id="close" type="button">Закрыть</button>
      <button class="btn green" id="save" type="button" disabled>Передать в калькулятор</button>
    </div>
  </div>

<script>
  var t = window.TrelloPowerUp.iframe();
  var WORKER = (window.CONFIG && window.CONFIG.WORKER_URL) || window.WORKER_URL || '';
  var ctx = { cardId:null, attId:null, fileName:'', url:'' };
  var STATE = { thick:null, section:null, dims:null, cutLenM:null, qty:1, secClass:'' };
  var lastObjUrl=null;

  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function boot(m){ var b=document.getElementById('boot'); if(b) b.textContent=m; }
  function td(x){ return new TextDecoder().decode(x); }

  var SECTION_RU={ Square:'Квадратная труба', Rectangle:'Прямоугольная труба', Round:'Круглая труба', Circle:'Круглая труба', Oval:'Овальная труба', Channel:'Швеллер', Angle:'Уголок' };

  function readF64(bytes, ceil){
    if(!bytes || !bytes.buffer) return [];
    var dv=new DataView(bytes.buffer, bytes.byteOffset, bytes.byteLength), best=[];
    for(var start=0;start<8;start++){
      var vals=[];
      for(var o=start;o+8<=bytes.length;o+=8){
        var v=dv.getFloat64(o,true);
        if(isFinite(v) && Math.abs(v)<ceil){ var r=Math.round(v*100)/100; if(Math.abs(v-r)<1e-6) vals.push(r); }
      }
      if(vals.length>best.length) best=vals;
    }
    return best;
  }
  function mostFreq(arr){ var c={},bk=null,bn=0; arr.forEach(function(v){ c[v]=(c[v]||0)+1; if(c[v]>bn){bn=c[v];bk=+v;} }); return bk; }

  function parseFile(files){
    var seg = files['Segments/content.xml']?td(files['Segments/content.xml']):'';
    var m = seg.match(/SectionClass="([^"]+)"\s+ThickNess="([^"]+)"/);
    if(m){ STATE.secClass=m[1]; STATE.thick=parseFloat(m[2]); }
    STATE.cuts = (seg.match(/GeoCurve\s+Handle/g)||[]).length;

    var curves=readF64(files['Curves/data.bin'], 400);
    var secSet=[], seen={};
    curves.forEach(function(v){ v=Math.round(v*2)/2; if(v>=5 && v<=400 && !seen[v]){ seen[v]=1; secSet.push(v); } });
    secSet.sort(function(a,b){return a-b;});
    var round=/Round|Circle/i.test(STATE.secClass);
    var w=secSet.length?secSet[secSet.length-1]:0, h=secSet.length>=2?secSet[secSet.length-2]:w;
    STATE.dims={ w:w, h:h, round:round };
    STATE.section = !secSet.length ? '' : (round ? ('\u2300'+w+' \u043c\u043c') : (w+'\u00d7'+h+' \u043c\u043c'));
    STATE.perimeter = round ? (Math.PI*w) : (2*(w+h));

    var lite=readF64(files['LiteGeos/data.bin'], 3000);
    var secMax=Math.max(w,h,20);
    var L=mostFreq(lite.filter(function(v){ return v>secMax*1.2 && v<3000; }));
    STATE.length = L || null;

    STATE.thumb = files['Thumbnail/Seg'] || null;
  }

  function qtyFromName(name){ var m=(name||'').match(/(\d+)\s*(\u0448\u0442|sht|pcs|pc)/i); return m?parseInt(m[1],10):1; }
  function estimateCutLen(){ if(!STATE.perimeter) return null; return Math.round(STATE.perimeter*2)/1000; }

  function spec(k,v){ return '<div class="spec"><div class="k">'+esc(k)+'</div><div class="v">'+esc(v)+'</div></div>'; }

  function render(){
    var html='';
    html+='<div class="sec"><h3>\u041f\u0440\u0435\u0434\u043f\u0440\u043e\u0441\u043c\u043e\u0442\u0440 \u0434\u0435\u0442\u0430\u043b\u0438</h3>';
    if(STATE.thumb && STATE.thumb.length>2 && STATE.thumb[0]===0x42 && STATE.thumb[1]===0x4d){
      if(lastObjUrl){ try{URL.revokeObjectURL(lastObjUrl);}catch(e){} }
      lastObjUrl=URL.createObjectURL(new Blob([STATE.thumb], {type:'image/bmp'}));
      html+='<div class="preview"><img src="'+lastObjUrl+'" alt="preview"/></div>';
    } else { html+='<div class="muted">\u0412 \u044d\u0442\u043e\u043c \u0444\u0430\u0439\u043b\u0435 \u043d\u0435\u0442 \u0432\u0441\u0442\u0440\u043e\u0435\u043d\u043d\u043e\u0433\u043e \u043f\u0440\u0435\u0432\u044c\u044e.</div>'; }
    html+='<div class="specs" style="margin-top:10px">';
    if(STATE.secClass) html+=spec('\u041f\u0440\u043e\u0444\u0438\u043b\u044c', SECTION_RU[STATE.secClass]||STATE.secClass);
    if(STATE.section) html+=spec('\u0421\u0435\u0447\u0435\u043d\u0438\u0435', STATE.section);
    if(STATE.length!=null) html+=spec('\u0414\u043b\u0438\u043d\u0430 \u0442\u0440\u0443\u0431\u044b', STATE.length+' \u043c\u043c ('+(STATE.length/10).toFixed(1).replace(/\.0$/,'')+' \u0441\u043c)');
    if(STATE.thick) html+=spec('\u0422\u043e\u043b\u0449\u0438\u043d\u0430 \u0441\u0442\u0435\u043d\u043a\u0438', STATE.thick+' \u043c\u043c');
    if(STATE.cuts!=null) html+=spec('\u041b\u0438\u043d\u0438\u0439 \u0440\u0435\u0437\u0430', STATE.cuts);
    html+='</div></div>';

    html+='<div class="sec"><h3>\u0420\u0430\u0441\u0447\u0451\u0442 \u0434\u043b\u044f \u043a\u0430\u043b\u044c\u043a\u0443\u043b\u044f\u0442\u043e\u0440\u0430 (\u0440\u0435\u0437\u043a\u0430 \u0442\u0440\u0443\u0431\u044b)</h3>';
    html+='<div class="row">';
    html+='<div class="fld"><label>\u0414\u043b\u0438\u043d\u0430 \u0440\u0435\u0437\u0430 \u043d\u0430 1 \u0434\u0435\u0442\u0430\u043b\u044c, \u043c</label><input type="number" id="cutLen" min="0" step="0.001" value="'+(STATE.cutLenM!=null?STATE.cutLenM:'')+'"></div>';
    html+='<div class="fld"><label>\u041a\u043e\u043b\u0438\u0447\u0435\u0441\u0442\u0432\u043e, \u0448\u0442</label><input type="number" id="qty" min="1" step="1" value="'+(STATE.qty||1)+'"></div>';
    html+='<div class="fld"><label>\u0422\u043e\u043b\u0449\u0438\u043d\u0430 \u0441\u0442\u0435\u043d\u043a\u0438, \u043c\u043c</label><input type="number" id="thick" min="0" step="0.1" value="'+(STATE.thick||'')+'"></div>';
    html+='</div>';
    html+='<div class="calcout" id="calcout"></div>';
    html+='<div class="hint">\u0414\u043b\u0438\u043d\u0430 \u0440\u0435\u0437\u0430 \u043f\u043e\u0434\u0441\u0442\u0430\u0432\u043b\u0435\u043d\u0430 \u043e\u0446\u0435\u043d\u043a\u043e\u0439: \u043f\u0435\u0440\u0438\u043c\u0435\u0442\u0440 \u0441\u0435\u0447\u0435\u043d\u0438\u044f ('+(STATE.perimeter?Math.round(STATE.perimeter):'?')+' \u043c\u043c) \u00d7 2 \u0442\u043e\u0440\u0446\u0430. \u0414\u043b\u044f \u0442\u0440\u0443\u0431\u044b <b>\u0441 \u0432\u044b\u0440\u0435\u0437\u0430\u043c\u0438/\u043e\u0442\u0432\u0435\u0440\u0441\u0442\u0438\u044f\u043c\u0438</b> \u0440\u0435\u0430\u043b\u044c\u043d\u0430\u044f \u0434\u043b\u0438\u043d\u0430 \u0431\u043e\u043b\u044c\u0448\u0435 \u2014 \u0441\u0432\u0435\u0440\u044c\u0442\u0435 \u0441\u043e \u0437\u043d\u0430\u0447\u0435\u043d\u0438\u0435\u043c \u0432 TubePro \u0438 \u043f\u043e\u043f\u0440\u0430\u0432\u044c\u0442\u0435, \u0435\u0441\u043b\u0438 \u043d\u0443\u0436\u043d\u043e.</div>';
    html+='</div>';

    document.getElementById('app').innerHTML=html;
    document.getElementById('cutLen').addEventListener('input', onCalc);
    document.getElementById('qty').addEventListener('input', onCalc);
    document.getElementById('thick').addEventListener('input', onCalc);
    onCalc();
  }

  function readInputs(){
    STATE.cutLenM = parseFloat(document.getElementById('cutLen').value)||0;
    STATE.qty = Math.max(1, parseInt(document.getElementById('qty').value,10)||1);
    var th=parseFloat(document.getElementById('thick').value); if(th>0) STATE.thick=th;
  }
  function onCalc(){
    readInputs();
    var total=STATE.cutLenM*STATE.qty;
    var out=document.getElementById('calcout');
    if(STATE.cutLenM>0){
      out.innerHTML='\u0418\u0442\u043e\u0433\u043e \u0434\u043b\u0438\u043d\u0430 \u0440\u0435\u0437\u0430: <b>'+total.toFixed(3)+' \u043c</b> ('+STATE.cutLenM.toFixed(3)+' \u043c \u00d7 '+STATE.qty+' \u0448\u0442) \u2014 \u0443\u0439\u0434\u0451\u0442 \u0432 \u043a\u0430\u043b\u044c\u043a\u0443\u043b\u044f\u0442\u043e\u0440 \u043a\u0430\u043a \u00ab\u0420\u0435\u0437\u043a\u0430 \u0442\u0440\u0443\u0431\u044b/\u043f\u0440\u043e\u0444\u0438\u043b\u044f\u00bb (\u00d73 \u043a \u043b\u0438\u0441\u0442\u0443).';
    } else { out.innerHTML='<span class="muted">\u0423\u043a\u0430\u0436\u0438\u0442\u0435 \u0434\u043b\u0438\u043d\u0443 \u0440\u0435\u0437\u0430.</span>'; }
    document.getElementById('save').disabled = !(STATE.cutLenM>0);
  }

  function save(){
    readInputs();
    if(!(STATE.cutLenM>0)) return;
    var btn=document.getElementById('save'); btn.disabled=true; document.getElementById('msg').textContent='\u0421\u043e\u0445\u0440\u0430\u043d\u0435\u043d\u0438\u0435\u2026';
    var rec={ fileName:ctx.fileName, tube:true, cutLenM:STATE.cutLenM, thicknessMm:STATE.thick||null, quantity:STATE.qty, section:STATE.section, tubeLenMm:STATE.length, secClass:STATE.secClass, savedAt:Date.now() };
    var attKey = ctx.attId || ('zzx:'+ctx.fileName);
    fetch(WORKER+'/dxf-save',{ method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ cardId: ctx.cardId, attachmentId: attKey, rec: rec })
    }).then(function(r){ return r.json(); }).then(function(j){
      if(!j || !j.ok) throw new Error((j&&j.error)||'сервер не подтвердил сохранение');
      document.getElementById('msg').textContent='\u041f\u0435\u0440\u0435\u0434\u0430\u043d\u043e \u2713 \u041e\u0442\u043a\u0440\u043e\u0439\u0442\u0435 \u00ab\u041a\u0430\u043b\u044c\u043a\u0443\u043b\u044f\u0442\u043e\u0440 \u0441\u0442\u043e\u0438\u043c\u043e\u0441\u0442\u0438\u00bb \u2192 \u00ab\u041f\u043e\u0434\u0442\u044f\u043d\u0443\u0442\u044c \u0438\u0437 DXF\u00bb.';
      btn.disabled=false;
      // одноразовый перенос старых записей с карточки в базу + освобождение места
      return t.get('card','shared','dxfMetrics', {}).then(function(all){
        if (!all || !Object.keys(all).length) return;
        return fetch(WORKER+'/dxf-save',{ method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ cardId: ctx.cardId, records: all })
        }).then(function(r){ return r.json(); }).then(function(j2){
          if (j2 && j2.ok) return t.remove('card','shared','dxfMetrics').catch(function(){ return t.set('card','shared','dxfMetrics', {}); });
        });
      }).catch(function(){});
    }).catch(function(e){ document.getElementById('msg').textContent='\u041e\u0448\u0438\u0431\u043a\u0430: '+(e&&e.message||e); btn.disabled=false; });
  }

  function loadSaved(){
    function apply(rec){
      if(rec){ if(rec.cutLenM) STATE.cutLenM=rec.cutLenM; if(rec.quantity) STATE.qty=rec.quantity; if(rec.thicknessMm) STATE.thick=rec.thicknessMm; return true; }
      return false;
    }
    return fetch(WORKER+'/dxf-get?cardId='+encodeURIComponent(ctx.cardId||''))
      .then(function(r){ return r.json(); })
      .then(function(j){ return apply(j && j.ok && j.metrics && (j.metrics[ctx.attId] || j.metrics['zzx:'+ctx.fileName])); })
      .catch(function(){ return false; })
      .then(function(found){
        if(found) return;
        return t.get('card','shared','dxfMetrics', {}).then(function(all){
          apply(all && (all[ctx.attId] || all['zzx:'+ctx.fileName]));
        }).catch(function(){});
      });
  }

  function loadContext(){
    ctx.cardId=t.arg('cardId')||null; ctx.attId=t.arg('attachmentId')||null;
    ctx.fileName=t.arg('fileName')||''; ctx.url=t.arg('url')||'';
    return Promise.resolve().then(function(){
      if(ctx.url) return;
      return t.card('id','attachments').then(function(c){
        var z=((c&&c.attachments)||[]).filter(function(a){ return /\.zzx$/i.test(a.fileName||a.name||''); })[0];
        if(z){ ctx.attId=z.id; ctx.fileName=z.fileName||z.name; ctx.url=z.url; }
      }).catch(function(){});
    });
  }

  document.getElementById('close').onclick=function(){ t.closeModal(); };
  document.getElementById('save').onclick=save;

  loadContext().then(function(){
    if(!ctx.url){ boot('\u0424\u0430\u0439\u043b .zzx \u043d\u0435 \u043d\u0430\u0439\u0434\u0435\u043d \u043d\u0430 \u043a\u0430\u0440\u0442\u043e\u0447\u043a\u0435.'); return Promise.reject('no url'); }
    return fetch(WORKER+'/zzx-fetch?url='+encodeURIComponent(ctx.url)).then(function(r){
      if(!r.ok) throw new Error('\u0441\u0435\u0440\u0432\u0435\u0440: '+r.status); return r.arrayBuffer();
    });
  }).then(function(buf){
    var files;
    try{ files=window.fflate.unzipSync(new Uint8Array(buf)); }
    catch(e){ throw new Error('\u043d\u0435 \u0443\u0434\u0430\u043b\u043e\u0441\u044c \u0440\u0430\u0441\u043f\u0430\u043a\u043e\u0432\u0430\u0442\u044c .zzx'); }
    parseFile(files);
    STATE.qty = qtyFromName(ctx.fileName);
    STATE.cutLenM = estimateCutLen();
    return loadSaved();
  }).then(function(){ render(); }).catch(function(e){
    if(e!=='no url') boot('\u041e\u0448\u0438\u0431\u043a\u0430: '+(e&&e.message||e));
  });
</script>
</body>
</html>
