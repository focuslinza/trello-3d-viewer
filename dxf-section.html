<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>DXF / Раскрой</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="./config.js"></script>
  <style>
    html[data-color-mode="light"] { --txt:#172b4d; --muted:#5e6c84; --chip:#f4f5f7; --ok:#1f845a; --okbg:#e3fcef; }
    html[data-color-mode="dark"]  { --txt:#c7d1db; --muted:#9fadbc; --chip:#2c333a; --ok:#4bce97; --okbg:#1c3329; }
    html { --txt:#172b4d; --muted:#5e6c84; --chip:#f4f5f7; --ok:#1f845a; --okbg:#e3fcef; }
    html, body { margin:0; padding:0; font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    #list { padding:6px 4px; }
    .hdr { display:flex; align-items:center; gap:8px; padding:2px 4px 8px; font-size:12px; color:var(--muted); flex-wrap:wrap; }
    .hdr b { color:var(--txt); }
    .hdr .pill { background:var(--chip); border-radius:10px; padding:2px 9px; font-weight:600; }
    .hdr .pill.done { background:var(--okbg); color:var(--ok); }
    .row { display:flex; align-items:center; justify-content:space-between; gap:8px; padding:5px 4px; }
    .name { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size:13px; color:var(--txt); }
    .ext { display:inline-block; font-size:10px; font-weight:700; color:var(--muted); background:var(--chip); border-radius:3px; padding:1px 5px; margin-right:6px; }
    .btn { flex:0 0 auto; background:#0c66e4; color:#fff; border:none; border-radius:3px; padding:5px 12px; font-size:12px; font-weight:600; cursor:pointer; }
    .btn:hover { background:#0055cc; }
    .st { flex:0 0 68px; text-align:left; font-size:12px; white-space:nowrap; }
    .st .ok { color:var(--ok); font-weight:700; }
    .st .no { color:var(--muted); opacity:.55; }
    .empty { padding:8px 4px; font-size:12px; color:var(--muted); }
  </style>
</head>
<body>
  <div id="list"><div class="empty">Загрузка…</div></div>
  <script>
    var t = window.TrelloPowerUp.iframe();
    var WORKER = (window.CONFIG && window.CONFIG.WORKER_URL) || window.WORKER_URL || '';
    function getExt(n){ var m=/\.[^.]+$/.exec((n||'').toLowerCase()); return m?m[0]:''; }
    function isDxf(a){ return getExt(a.fileName||a.name||a.url||'')==='.dxf'; }
    function isZzx(a){ return getExt(a.fileName||a.name||a.url||'')==='.zzx'; }
    function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function openViewer(att, cardId){
      var fileName = att.fileName || att.name;
      return t.modal({
        title: att.name || fileName,
        url: './dxf-viewer.html',
        args: { cardId: cardId, attachmentId: att.id, fileName: fileName },
        accentColor: '#172b4d',
        fullscreen: true
      });
    }
    function openZzx(att, cardId){
      var fileName = att.fileName || att.name;
      return t.modal({
        title: att.name || fileName,
        url: './zzx-modal.html?t=' + Date.now(),
        args: { cardId: cardId, attachmentId: att.id, fileName: fileName, url: att.url },
        accentColor: '#8a5a2b',
        fullscreen: true
      });
    }

    // сохранённые расчёты: из базы (D1) + старые записи с карточки
    function loadMetrics(cardId){
      var fromD1 = fetch(WORKER+'/dxf-get?cardId='+encodeURIComponent(cardId))
        .then(function(r){ return r.json(); })
        .then(function(j){ return (j && j.ok && j.metrics) || {}; })
        .catch(function(){ return {}; });
      var fromCard = t.get('card','shared','dxfMetrics', {}).catch(function(){ return {}; });
      return Promise.all([fromCard, fromD1]).then(function(res){
        return Object.assign({}, res[0]||{}, res[1]||{});   // база главнее
      });
    }

    function statusCell(rec){
      var st=document.createElement('span'); st.className='st';
      if (rec){
        var q = +rec.quantity || 1;
        st.innerHTML='<span class="ok" title="Расчёт сохранён'+(rec.thicknessMm?(' · '+rec.thicknessMm+' мм'):'')+'">✓ '+q+' шт</span>';
      } else {
        st.innerHTML='<span class="no" title="Расчёт ещё не сохранён">—</span>';
      }
      return st;
    }

    var rendering=false;
    function render(){
      if (rendering) return Promise.resolve();
      rendering=true;
      return t.card('id','attachments').then(function(card){
        var all=(card.attachments||[]);
        var dxfs=all.filter(isDxf), zzxs=all.filter(isZzx);
        var el=document.getElementById('list');
        if (dxfs.length===0 && zzxs.length===0){ el.innerHTML='<div class="empty">Нет файлов DXF или .zzx на карточке.</div>'; return t.sizeTo('#list'); }
        return loadMetrics(card.id).then(function(metrics){
          function recFor(att){ return metrics[att.id] || metrics['zzx:'+(att.fileName||att.name||'')] || null; }
          var files=dxfs.concat(zzxs);
          var done=files.filter(recFor).length;
          var totalQty=files.reduce(function(s,a){ var r=recFor(a); return s+(r?(+r.quantity||1):0); },0);
          el.innerHTML='';
          // шапка-счётчик
          var hdr=document.createElement('div'); hdr.className='hdr';
          hdr.innerHTML='Файлов: <b>'+files.length+'</b>'
            +(zzxs.length?('&nbsp;<span class="pill">DXF '+dxfs.length+' · ZZX '+zzxs.length+'</span>'):'')
            +'&nbsp;<span class="pill'+(done===files.length?' done':'')+'">рассчитано '+done+' из '+files.length+'</span>'
            +(totalQty?('&nbsp;<span class="pill done">итого '+totalQty+' шт</span>'):'');
          el.appendChild(hdr);
          dxfs.forEach(function(att){
            var fileName=att.fileName||att.name||'';
            var row=document.createElement('div'); row.className='row';
            var nm=document.createElement('span'); nm.className='name';
            var ext=document.createElement('span'); ext.className='ext'; ext.textContent='DXF';
            var txt=document.createElement('span'); txt.textContent=att.name||fileName;
            nm.appendChild(ext); nm.appendChild(txt);
            var btn=document.createElement('button'); btn.className='btn'; btn.type='button'; btn.textContent='Открыть / Расчёт';
            btn.addEventListener('click', function(){ openViewer(att, card.id); });
            row.appendChild(nm); row.appendChild(btn); row.appendChild(statusCell(recFor(att))); el.appendChild(row);
          });
          zzxs.forEach(function(att){
            var fileName=att.fileName||att.name||'';
            var row=document.createElement('div'); row.className='row';
            var nm=document.createElement('span'); nm.className='name';
            var ext=document.createElement('span'); ext.className='ext'; ext.textContent='ZZX';
            var txt=document.createElement('span'); txt.textContent=att.name||fileName;
            nm.appendChild(ext); nm.appendChild(txt);
            var btn=document.createElement('button'); btn.className='btn'; btn.type='button'; btn.style.background='#8a5a2b'; btn.textContent='Просмотр';
            btn.addEventListener('click', function(){ openZzx(att, card.id); });
            row.appendChild(nm); row.appendChild(btn); row.appendChild(statusCell(recFor(att))); el.appendChild(row);
          });
          return t.sizeTo('#list');
        });
      }).catch(function(err){
        document.getElementById('list').innerHTML='<div class="empty">Ошибка: '+esc(err&&err.message?err.message:'неизвестно')+'</div>';
        return t.sizeTo('#list');
      }).then(function(r){ rendering=false; return r; }, function(e){ rendering=false; throw e; });
    }

    t.render(render);
    // расчёты хранятся в базе — Trello о них не знает, поэтому обновляемся сами:
    setInterval(render, 12000);
    window.addEventListener('focus', render);
    document.addEventListener('visibilitychange', function(){ if(!document.hidden) render(); });
  </script>
</body>
</html>
