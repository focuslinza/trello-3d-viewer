<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Калькулятор стоимости</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <style>
    html[data-color-mode="light"] { --txt:#172b4d; --muted:#5e6c84; --chip:#f4f5f7; --line:#dfe1e6; }
    html[data-color-mode="dark"]  { --txt:#c7d1db; --muted:#9fadbc; --chip:#2c333a; --line:#3c4149; }
    html { --txt:#172b4d; --muted:#5e6c84; --chip:#f4f5f7; --line:#dfe1e6; }
    html, body { margin:0; padding:0; font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    #wrap { padding:6px 4px; }
    .row { display:flex; align-items:center; justify-content:space-between; gap:10px; }
    .total { font-size:13px; color:var(--txt); }
    .total b { font-size:16px; }
    .muted { color:var(--muted); font-size:12px; }
    .btn { flex:0 0 auto; background:#0c66e4; color:#fff; border:none; border-radius:3px; padding:6px 14px; font-size:12px; font-weight:600; cursor:pointer; height:32px; display:inline-flex; align-items:center; }
    .btn:hover { background:#0055cc; }
  </style>
</head>
<body>
  <div id="wrap"><div class="muted">Загрузка…</div></div>
  <script src="./config.js"></script>
  <script>
    var t = window.TrelloPowerUp.iframe();
    var WORKER = (window.CONFIG && window.CONFIG.WORKER_URL) || window.WORKER_URL || '';
    function fmt(n){ return (Math.round((+n||0))).toLocaleString('ru-RU'); }

    var CARD = { id:null, board:'', name:'', status:'' };

    function openCalc(){
      return t.modal({
        title: 'Калькулятор стоимости',
        url: './calc-modal.html?t=' + Date.now(),
        fullscreen: true,
        accentColor: '#0c66e4',
        args: { cardId: CARD.id, boardId: CARD.board, cardName: CARD.name, status: CARD.status }
      });
    }
    function openEarnings(){
      return t.modal({
        title: 'Заработок по заказу',
        url: './earnings-modal.html?t=' + Date.now(),
        fullscreen: true,
        accentColor: '#0c66e4',
        args: { cardId: CARD.id }
      });
    }
    function openInvoice(){
      return t.modal({
        title: 'Счёт на оплату',
        url: './invoice-modal.html?t=' + Date.now(),
        fullscreen: true,
        accentColor: '#0c66e4',
        args: { cardId: CARD.id, boardId: CARD.board }
      });
    }
    function isDirector(){
      return Promise.all([
        t.member('id'),
        t.board('memberships'),
        t.organization('memberships').catch(function(){ return null; })
      ]).then(function(res){
        var me=res[0]||{};
        function adminIn(o){ var ms=((o&&o.memberships)||[]).filter(function(x){return x.idMember===me.id;})[0]; return !!(ms&&ms.memberType==='admin'); }
        return adminIn(res[1]) || adminIn(res[2]);
      }).catch(function(){ return false; });
    }

    var renderGen = 0;
    t.render(function(){
      var myGen = ++renderGen;
      // capture card id/name with the minimal field set (matches the working DXF section)
      return t.card('id','name').then(function(card){
        CARD.id = card && card.id || null;
        CARD.name = card && card.name || '';
      }).catch(function(){}).then(function(){
        return t.board('id').then(function(b){ CARD.board=(b&&b.id)||''; }).catch(function(){});
      }).then(function(){
        // list (status) is optional — fire-and-forget so it can never block the chain
        try { t.list('name').then(function(l){ CARD.status=(l&&l.name)||''; }).catch(function(){}); } catch(e){}
        return t.get('card','shared','calcData', null);
      }).then(function(d){
        if (myGen !== renderGen) return; // устарело — подоспела более новая перерисовка
        var el=document.getElementById('wrap');
        el.innerHTML='';
        var row=document.createElement('div'); row.className='row';
        var left=document.createElement('div');
        if (d && d.total!=null){
          left.className='total';
          left.innerHTML='Итого: <b>'+fmt(d.total)+' ₸</b><div class="muted">с налогом '+(Math.round((d.taxRate||0.16)*100))+'% · обновлено '+(d.savedAt? new Date(d.savedAt).toLocaleDateString('ru-RU'):'')+'</div>';
        } else {
          left.className='muted';
          left.textContent='Расчёт ещё не сделан.';
        }
        var btn=document.createElement('button'); btn.className='btn'; btn.type='button';
        btn.textContent = (d && d.total!=null) ? 'Открыть расчёт' : 'Открыть калькулятор';
        btn.addEventListener('click', openCalc);
        row.appendChild(left); row.appendChild(btn); el.appendChild(row);
        // director: earnings; director OR allowed worker: invoice
        function addInvoiceBtn(){
          var row3=document.createElement('div'); row3.className='row'; row3.style.marginTop='8px';
          var lbl3=document.createElement('div'); lbl3.className='muted'; lbl3.textContent='Счёт на оплату (можно объединить несколько заказов клиента)';
          var ib=document.createElement('button'); ib.className='btn'; ib.type='button'; ib.style.background='#1f845a';
          ib.textContent='Счёт на оплату';
          ib.addEventListener('click', openInvoice);
          row3.appendChild(lbl3); row3.appendChild(ib); el.appendChild(row3);
          // выставленные ранее счета, в которые входит этот заказ (виден только директору и допущенным)
          var row4=document.createElement('div'); row4.className='row'; row4.style.marginTop='8px';
          var lbl4=document.createElement('div'); lbl4.className='muted'; lbl4.textContent='Выставленные счета по этому заказу';
          var sb=document.createElement('button'); sb.className='btn'; sb.type='button'; sb.style.background='#5a5a5a';
          sb.textContent='Счета (PDF)';
          sb.addEventListener('click', function(){
            return t.modal({
              title: 'Счета по заказу',
              url: './card-invoices-modal.html?t=' + Date.now(),
              fullscreen: true,
              accentColor: '#0c66e4',
              args: { cardId: CARD.id }
            });
          });
          row4.appendChild(lbl4); row4.appendChild(sb); el.appendChild(row4);
        }
        return Promise.all([ isDirector(), t.member('id').catch(function(){return {};}) ]).then(function(r){
          if (myGen !== renderGen) return; // устарело
          var admin=r[0], me=r[1]||{};
          if(admin){
            var row2=document.createElement('div'); row2.className='row'; row2.style.marginTop='8px';
            var lbl=document.createElement('div'); lbl.className='muted'; lbl.textContent='Заработок и эффективность по этому заказу';
            var eb=document.createElement('button'); eb.className='btn'; eb.type='button'; eb.style.background='#5a4a8a';
            eb.textContent='Заработок по заказу';
            eb.addEventListener('click', openEarnings);
            row2.appendChild(lbl); row2.appendChild(eb); el.appendChild(row2);
          }
          if(admin){ addInvoiceBtn(); return t.sizeTo('#wrap'); }
          // not admin: show invoice only if my Trello account is an allowed worker
          return fetch(WORKER+'/worker-perms?memberId='+encodeURIComponent(me.id||'')).then(function(x){return x.json();}).then(function(j){
            if (myGen !== renderGen) return; // устарело
            if(j&&(j.canIssueInvoice||j.canInvoice)) addInvoiceBtn();
          }).catch(function(){}).then(function(){ if (myGen !== renderGen) return; return t.sizeTo('#wrap'); });
        });
      });
    });
  </script>
</body>
</html>
