<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>3D File Viewer - Connector</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
  <script>
    // Which file extensions this Power-Up will handle.
    var SUPPORTED_EXTENSIONS = ['.stl', '.step', '.stp', '.gcode', '.gco', '.nc', '.tap', '.cnc', '.ngc', '.g'];

    function getExtension(name) {
      var match = /\.[^.]+$/.exec((name || '').toLowerCase());
      return match ? match[0] : '';
    }

    function is3DModelAttachment(attachment) {
      var name = attachment.fileName || attachment.name || attachment.url || '';
      return SUPPORTED_EXTENSIONS.indexOf(getExtension(name)) !== -1;
    }

    window.TrelloPowerUp.initialize({
      // Called by Trello for every attachment on a card so we can "claim"
      // the ones we know how to render.
      'attachment-sections': function (t, options) {
        var claimed = (options.entries || []).filter(is3DModelAttachment);

        if (claimed.length === 0) {
          return [];
        }

        // Group every 3D file we found into a single section on the card.
        return [
          {
            id: '3d-model-viewer-section',
            claimed: claimed,
            icon: t.signUrl('./icon-gray.svg'),
            title: '3D / G-code Viewer',
            content: {
              type: 'iframe',
              url: t.signUrl('./section.html'),
              // A little extra room per claimed file, plus some padding.
              height: Math.min(40 + claimed.length * 34, 300)
            }
          }
        ];
      },

      // Company + contacts panel shown on the back of every card.
      'card-back-section': function (t, options) {
        return {
          title: 'Компания и контакты',
          icon: t.signUrl('./icon-gray.svg'),
          content: {
            type: 'iframe',
            url: t.signUrl('./company-section.html'),
            height: 120
          }
        };
      }
    });
  </script>
</body>
</html>
