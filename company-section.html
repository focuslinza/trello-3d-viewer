<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Компания и контакты</title>
  <link rel="stylesheet" href="https://p.trellocdn.com/power-up.min.css" />
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <style>
    /* Colours that follow Trello's light/dark theme automatically */
    html[data-color-mode="light"] { --txt: #172b4d; --muted: #5e6c84; --line: #dfe1e6; }
    html[data-color-mode="dark"]  { --txt: #c7d1db; --muted: #9fadbc; --line: #3c4757; }
    html { --txt: #172b4d; --muted: #5e6c84; --line: #dfe1e6; } /* fallback */

    html, body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; color: var(--txt); }
    #root { padding: 4px 2px 8px; }
    .muted { color: var(--muted); font-size: 13px; }
    .company-name { font-size: 15px; font-weight: 700; margin: 0 0 2px; color: var(--txt); }
    .req { font-size: 12px; color: var(--muted); margin: 1px 0; }
    .contacts { margin-top: 8px; }
    .contact {
      display: flex; align-items: center; justify-content: space-between;
      gap: 8px; padding: 6px 8px; border: 1px solid var(--line); border-radius: 6px; margin-bottom: 6px;
    }
    .contact .who { overflow: hidden; }
    .contact .nm { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--txt); }
    .contact .role { font-size: 11px; color: var(--muted); }
    .contact .num { font-size: 12px; color: var(--muted); }
    .actions { display: flex; gap: 6px; flex: 0 0 auto; }
    a.wa {
      background: #25d366; color: #fff; text-decoration: none; font-size: 12px; font-weight: 600;
      padding: 5px 10px; border-radius: 4px; white-space: nowrap;
    }
    a.call {
      background: transparent; color: var(--txt); text-decoration: none; font-size: 12px;
      padding: 5px 9px; border-radius: 4px; border: 1px solid var(--line); white-space: nowrap;
    }
    .toolbar { margin-top: 8px; display: flex; gap: 8px; flex-wrap: wrap; }
    button.btn {
      background: #0c66e4; color: #fff; border: none; border-radius: 4px;
      padding: 7px 12px; font-size: 13px; font-weight: 600; cursor: pointer;
    }
    button.btn.secondary { background: transparent; color: var(--txt); border: 1px solid var(--line); }
    button.btn:hover { filter: brightness(1.05); }
    .empty-box { padding: 6px 2px; }
  </style>
</head>
<body>
  <div id="root"><div class="muted">Загрузка…</div></div>

  <script src="./crm-common.js"></script>
  <script>
    var t = window.TrelloPowerUp.iframe();

    function openManager() {
      return t.modal({
        title: 'Компания и контакты',
        url: './company-modal.html',
        height: 600,
        fullscreen: false
      });
    }

    function renderContactRow(contact) {
      var wa = CRM.waLink(contact.phone);
      var tel = CRM.telLink(contact.phone);
      var html = '<div class="contact">';
      html += '<div class="who">';
      html += '<div class="nm">' + CRM.esc(contact.name || 'Без имени') + '</div>';
      if (contact.role) html += '<div class="role">' + CRM.esc(contact.role) + '</div>';
      if (contact.phone) html += '<div class="num">' + CRM.esc(contact.phone) + '</div>';
      html += '</div><div class="actions">';
      if (wa) html += '<a class="wa" href="' + wa + '" target="_blank" rel="noopener">WhatsApp</a>';
      if (tel) html += '<a class="call" href="' + tel + '" target="_blank" rel="noopener">Звонок</a>';
      html += '</div></div>';
      return html;
    }

    t.render(function () {
      var root = document.getElementById('root');

      return CRM.getCardCompanyId(t).then(function (companyId) {
        if (!companyId) {
          root.innerHTML =
            '<div class="empty-box"><div class="muted">Компания для этой карточки ещё не выбрана.</div>' +
            '<div class="toolbar"><button class="btn" id="choose">Выбрать компанию</button></div></div>';
          document.getElementById('choose').addEventListener('click', openManager);
          return t.sizeTo('#root');
        }

        return Promise.all([
          CRM.getCompanyById(t, companyId),
          CRM.getCardContacts(t),
          CRM.getCardObjectId(t)
        ]).then(function (res) {
          var company = res[0];
          var cardContactIds = res[1] || [];
          var cardObjectId = res[2] || null;

          if (!company) {
            root.innerHTML =
              '<div class="empty-box"><div class="muted">Связанная компания не найдена (возможно, удалена).</div>' +
              '<div class="toolbar"><button class="btn" id="choose">Выбрать компанию</button></div></div>';
            document.getElementById('choose').addEventListener('click', openManager);
            return t.sizeTo('#root');
          }

          var contacts = company.contacts || [];
          var selected = contacts.filter(function (c) { return cardContactIds.indexOf(c.id) !== -1; });
          var toShow = selected.length ? selected : contacts; // if none flagged, show all

          var html = '';
          html += '<div class="company-name">' + CRM.esc(company.name) + '</div>';

          var obj = (company.objects || []).filter(function (o) { return o.id === cardObjectId; })[0];
          if (obj) {
            html += '<div class="req">Объект: ' + CRM.esc(obj.name) + '</div>';
            if (obj.addr) html += '<div class="req">Адрес: ' + CRM.esc(obj.addr) + '</div>';
          }

          if (toShow.length) {
            html += '<div class="contacts">';
            html += '<div class="req" style="margin-bottom:4px;">Заказчик:</div>';
            toShow.forEach(function (c) { html += renderContactRow(c); });
            html += '</div>';
          } else {
            html += '<div class="req" style="margin-top:6px;">Контакт заказчика ещё не добавлен.</div>';
          }

          html += '<div class="toolbar">' +
            '<button class="btn" id="manage">Управление</button>' +
            '</div>';

          root.innerHTML = html;
          document.getElementById('manage').addEventListener('click', openManager);
          return t.sizeTo('#root');
        });
      }).catch(function (err) {
        root.innerHTML = '<div class="muted">Ошибка: ' + CRM.esc(err && err.message ? err.message : 'неизвестно') + '</div>';
        return t.sizeTo('#root');
      });
    });
  </script>
</body>
</html>
