<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Счёт на оплату</title>
  <script src="./config.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.72/pdfmake.min.js"></script>
  <script src="./dejavu-vfs.js"></script>
  <script src="./invoice-doc.js"></script>
  <style>
    :root{ --bg:#1d2125; --bg2:#22272b; --line:#3a414a; --txt:#c7d1db; --muted:#9fadbc; --blue:#4f7cff; --green:#4bce97; --red:#f28b82; --amber:#e8c07d; }
    html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:13.5px}
    #app{max-width:760px;margin:0 auto;padding:16px 16px 80px}
    h2{margin:0;font-size:17px}
    .muted{color:var(--muted);font-size:12.5px}
    .pillrow{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
    .pill{border-radius:10px;padding:3px 10px;font-size:11.5px;font-weight:600;background:var(--bg2);border:1px solid var(--line)}
    .pill.g{background:#1c3329;color:var(--green);border-color:#2e5c44}
    .pill.a{background:#3a2f1a;color:var(--amber);border-color:#5c4a2e}
    .pill.r{background:#42221f;color:var(--red);border-color:#5a3a3a}
    .doc{background:#fff;color:#172b4d;border-radius:12px;padding:22px 24px;margin-top:8px;font-size:13px}
    .doc h3{margin:4px 0 10px;font-size:16px;border-bottom:2px solid #172b4d;padding-bottom:6px}
    .doc table{width:100%;border-collapse:collapse;margin-top:8px}
    .doc th,.doc td{border:1px solid #b9c2cf;padding:5px 7px;font-size:12px}
    .doc th{background:#eef1f5}
    .doc .num{text-align:right}
    .doc .tot{ text-align:right;font-weight:700;font-size:14px;margin-top:8px }
    .tabs{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0}
    .tabbtn{border:1px solid var(--line);background:var(--bg2);color:var(--txt);border-radius:8px;padding:5px 12px;cursor:pointer;font-size:12.5px}
    .tabbtn.active{border-color:var(--blue);color:#cfe1ff}
    .bar{position:fixed;left:0;right:0;bottom:0;background:var(--bg);border-top:1px solid var(--line);padding:12px 16px;display:flex;justify-content:flex-end;gap:10px}
    .btn{background:var(--bg2);border:1px solid var(--line);border-radius:8px;color:var(--txt);padding:9px 16px;font-size:13px;cursor:pointer}
    .btn.primary{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:600}
  </style>
</head>
<body>
  <div id="app"><div class="muted">Загрузка счёта…</div></div>
  <div class="bar">
    <button class="btn primary" id="pdf" type="button" style="display:none">⬇ Скачать PDF</button>
  </div>
  <script>
    var WORKER = (window.CONFIG && window.CONFIG.WORKER_URL) || window.WORKER_URL || '';
    var Q = new URLSearchParams(location.search);
    var ROWS = [], CUR = null, PAYINFO = {};
    function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
    function money(v){ return (window.INVOICE&&window.INVOICE.money)?window.INVOICE.money(v):(Math.round(+v||0)).toLocaleString('ru-RU'); }
    function parse(s,d){ try{ var v=JSON.parse(s); return v==null?d:v; }catch(e){ return d; } }

    function statusPill(p){
      if(!p) return '';
      var st=p.status, cls=st==='full'?'g':(st==='launched'||st==='partial')?'a':'r';
      var lbl=st==='full'?'оплачен полностью':st==='launched'?'аванс — в производстве':st==='partial'?'частично оплачен':'не оплачен';
      return '<span class="pill '+cls+'">'+lbl+' · поступило '+money(p.received)+' ₸'+(p.pct!=null?(' ('+p.pct+'%)'):'')+'</span>';
    }

    function render(){
      var el=document.getElementById('app');
      if(!ROWS.length){
        el.innerHTML='<h2>Счёт не найден</h2><div class="muted" style="margin-top:8px">'+
          (Q.get('cardId')?'По этому заказу счёт ещё не выставлялся — его можно сформировать кнопкой «Счёт на оплату» на карточке.':'Счёт с таким номером не найден в журнале.')+'</div>';
        return;
      }
      var h='';
      if(ROWS.length>1){
        h+='<div class="muted">По этому заказу выставлено счетов: '+ROWS.length+'</div><div class="tabs">';
        ROWS.forEach(function(r,i){ h+='<button class="tabbtn'+(r===CUR?' active':'')+'" data-i="'+i+'" type="button">№'+esc(r.number)+' · '+money(r.total)+' ₸</button>'; });
        h+='</div>';
      }
      var r=CUR;
      var p=PAYINFO[r.number];
      h+='<h2>Счёт на оплату №'+esc(r.number)+' от '+esc(r.date_text||r.date_iso||'')+'</h2>';
      h+='<div class="pillrow">'+
         (r.sent_at?('<span class="pill g">📤 выслан '+esc(String(r.sent_at).slice(0,16).replace('T',' '))+(r.sent_to?(' → '+esc(r.sent_to)):'')+'</span>'):'<span class="pill">не выслан</span>')+
         statusPill(p)+'</div>';
      // заказы в счёте: клик открывает карточку Trello в новой вкладке —
      // посмотрели заказ, закрыли вкладку, вернулись сюда
      var items0=parse(r.items_json,[])||[], cardIds0=parse(r.card_ids_json,[])||[];
      var orderChips=[];
      items0.forEach(function(it){
        if(it && it.cardId) orderChips.push({ cardId:it.cardId, code:it.code||'', name:it.name||'' });
      });
      if(!orderChips.length && cardIds0.length) cardIds0.forEach(function(id){ orderChips.push({ cardId:id, code:'', name:'карточка заказа' }); });
      if(orderChips.length){
        h+='<div class="pillrow" style="margin-top:2px">'+orderChips.map(function(o){
          var lbl=(o.code?('№'+esc(o.code)+' · '):'')+esc(String(o.name).slice(0,48))+(String(o.name).length>48?'…':'');
          return '<a href="https://trello.com/c/'+esc(o.cardId)+'" target="_blank" class="pill" '+
            'style="text-decoration:none;color:#cfe1ff;border-color:var(--blue);cursor:pointer" '+
            'title="Открыть карточку заказа в новой вкладке (закройте её, чтобы вернуться к счёту)">📋 '+lbl+' ↗</a>';
        }).join('')+'</div>';
      }
      // сам счёт показываем HTML-копией PDF (браузеры блокируют PDF во вложенном
      // окне Trello); скачивание отдаёт настоящий PDF тем же генератором
      h+=renderDocHtml(r);
      el.innerHTML=h;
      [].forEach.call(document.querySelectorAll('.tabbtn'), function(b){
        b.onclick=function(){ CUR=ROWS[+this.getAttribute('data-i')]; render(); };
      });
      document.getElementById('pdf').style.display='';
    }

    // HTML-копия макета PDF: предупреждение, банковская шапка, стороны, позиции,
    // итоги, сумма прописью, подпись директора
    function renderDocHtml(r){
      var sup=parse(r.supplier_json,{})||{}, buy=parse(r.buyer_json,{})||{}, items=parse(r.items_json,[])||[];
      var total=0; items.forEach(function(it){ total+=(+it.qty||0)*(+it.price||0); });
      if(!total) total=+r.total||0;
      var isPerson = buy.kind==='person';
      var bt=(isPerson?'ИИН ':'БИН / ИИН ')+(buy.bin||'')+', '+(buy.name||'')+(buy.addr?', '+buy.addr:'')+(buy.phone?', тел. '+buy.phone:'');
      var h='<div class="doc">';
      h+='<div style="font-size:9.5px;color:#333;margin-bottom:8px">Внимание! Оплата данного счета означает согласие с условиями поставки товара. Уведомление об оплате обязательно, в противном случае не гарантируется наличие товара на складе. Товар отпускается по факту прихода денег на р/с Поставщика, самовывозом, при наличии доверенности и документов удостоверяющих личность.</div>';
      h+='<table style="margin-bottom:10px"><tbody>'+
         '<tr><td style="width:110px">Бенефициар:</td><td>'+esc(sup.name||'')+'<br>ИИН: '+esc(sup.bin||'')+'</td><td style="width:34px;text-align:center">ИИК</td><td style="width:170px;text-align:center">'+esc(sup.iban||'')+'</td><td style="width:34px;text-align:center">Кбе</td><td style="width:34px;text-align:center">'+esc(sup.kbe||'')+'</td></tr>'+
         '<tr><td>Банк бенефициара:</td><td>'+esc(sup.bank||'')+'</td><td style="text-align:center">БИК</td><td style="text-align:center">'+esc(sup.bik||'')+'</td><td style="text-align:center;font-size:10px">Код назн. плат.</td><td style="text-align:center">'+esc(sup.paycode||'')+'</td></tr>'+
         '</tbody></table>';
      h+='<h3>Счет на оплату № '+esc(r.number)+' от '+esc(r.date_text||r.date_iso||'')+'</h3>';
      h+='<div style="margin-top:6px"><b>Поставщик:</b> БИН / ИИН '+esc(sup.bin||'')+', '+esc(sup.name||'')+', '+esc(sup.addr||'')+'</div>';
      h+='<div style="margin-top:3px"><b>Покупатель:</b> '+esc(bt)+'</div>';
      h+='<div style="margin-top:3px"><b>Договор:</b> '+esc(r.contract||'Без договора')+'</div>';
      h+='<table><thead><tr><th>№</th><th>Код</th><th>Наименование</th><th class="num">Кол-во</th><th>Ед.</th><th class="num">Цена</th><th class="num">Сумма</th></tr></thead><tbody>';
      items.forEach(function(it,i){
        var sm=(+it.qty||0)*(+it.price||0);
        h+='<tr><td style="text-align:center">'+(i+1)+'</td><td>'+esc(it.code||'')+'</td><td>'+esc(it.name||'')+'</td><td class="num">'+money(it.qty)+'</td><td style="text-align:center">'+esc(it.unit||'Услуга')+'</td><td class="num">'+money(it.price)+'</td><td class="num">'+money(sm)+'</td></tr>';
      });
      h+='</tbody></table>';
      h+='<div class="tot">Итого: '+money(total)+'</div>';
      h+='<div style="text-align:right;font-size:12px;margin-top:2px">В том числе НДС: -</div>';
      h+='<div style="margin-top:8px;font-size:12.5px">Всего наименований '+items.length+', на сумму '+money(total)+' KZT</div>';
      h+='<div style="font-size:12.5px"><b>Всего к оплате: '+esc((window.INVOICE&&window.INVOICE.rubWords)?window.INVOICE.rubWords(total):'')+'</b></div>';
      h+='<hr style="border:none;border-top:1px solid #b9c2cf;margin:16px 0 6px">';
      h+='<div style="display:flex;align-items:flex-end;gap:12px">'+
         '<span style="width:90px">Исполнитель</span>'+
         '<span style="width:170px;position:relative;display:inline-block;border-bottom:1px solid #172b4d;height:34px">'+
           ((window.INVOICE&&window.INVOICE.directorSign)?('<img src="'+window.INVOICE.directorSign+'" style="position:absolute;left:30px;bottom:-8px;width:96px">'):'')+
         '</span>'+
         '<span>/'+esc(sup.executor||'')+'/</span></div>';
      h+='</div>';
      return h;
    }

    function buildDoc(r){
      pdfMake.vfs = window.DEJAVU_VFS;
      pdfMake.fonts = { DejaVu:{ normal:'DejaVuSans.ttf', bold:'DejaVuSans-Bold.ttf', italics:'DejaVuSans.ttf', bolditalics:'DejaVuSans-Bold.ttf' } };
      return window.INVOICE.buildInvoiceDoc({ number:r.number, date:r.date_text||'', contract:r.contract||'',
        supplier:parse(r.supplier_json,null), buyer:parse(r.buyer_json,null),
        items:parse(r.items_json,[]), total:+r.total||0 });
    }
    document.getElementById('pdf').onclick=function(){
      if(!CUR || !window.pdfMake){ alert('Генератор PDF не загрузился — проверьте интернет.'); return; }
      var r=CUR, buy=parse(r.buyer_json,{})||{};
      pdfMake.createPdf(buildDoc(r)).download('Счет_'+r.number+'_'+String(buy.name||'клиент').replace(/[^0-9A-Za-zА-Яа-яЁё]+/g,'_').slice(0,30)+'.pdf');
    };

    var qs = Q.get('number') ? ('number='+encodeURIComponent(Q.get('number'))) : ('cardId='+encodeURIComponent(Q.get('cardId')||''));
    Promise.all([
      fetch(WORKER+'/invoice-list?'+qs).then(function(r){return r.json();}).catch(function(){return {};}),
      fetch(WORKER+'/invoice-payments-list').then(function(r){return r.json();}).catch(function(){return {};})
    ]).then(function(res){
      ROWS=(res[0]&&res[0].rows)||[];
      ((res[1]&&res[1].rows)||[]).forEach(function(p){ PAYINFO[p.number]=p; });
      CUR=ROWS[0]||null;
      render();
    });
  </script>
</body>
</html>
