<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>CRM — Клиенты</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="./config.js"></script>
  <script src="./crm-common.js"></script>
  <style>
    :root{ --bg:#1d2125; --bg2:#22272b; --line:#3a414a; --txt:#c7d1db; --muted:#9fadbc; --blue:#4f7cff; --green:#4bce97; --red:#f28b82; --amber:#e8c07d; }
    html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;font-size:14px}
    #app{max-width:1000px;margin:0 auto;padding:16px 16px 70px}
    h2{margin:0 0 12px;font-size:18px}
    h3{margin:16px 0 8px;font-size:14px;color:#e6edf3}
    .muted{color:var(--muted);font-size:12.5px}
    .search{width:100%;box-sizing:border-box;background:var(--bg2);border:1px solid var(--line);border-radius:8px;color:var(--txt);padding:10px 12px;font-size:14px;margin-bottom:10px}
    .clist{display:flex;flex-direction:column;gap:8px}
    .crow{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:10px 14px;cursor:pointer}
    .crow:hover{border-color:var(--blue)}
    .crow .nm{font-weight:700}
    .crow .sub{font-size:12px;color:var(--muted);margin-top:2px}
    .crow .stats{text-align:right;font-size:12.5px;white-space:nowrap}
    .crow .stats .rev{font-weight:700}
    .crow .stats .debt{color:var(--red)}
    .crow .stats .ok{color:var(--green)}
    .btn{background:var(--bg2);border:1px solid var(--line);border-radius:8px;color:var(--txt);padding:8px 14px;font-size:13px;cursor:pointer}
    .btn:hover{border-color:var(--blue)}
    .btn.primary{background:#274469;border-color:var(--blue);color:#cfe1ff}
    .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin:10px 0}
    .kpi{background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:10px 12px}
    .kpi .k{font-size:11px;color:var(--muted);text-transform:uppercase}
    .kpi .v{font-size:16px;font-weight:800;margin-top:4px}
    .kpi.green .v{color:var(--green)} .kpi.red .v{color:var(--red)}
    table{width:100%;border-collapse:collapse;margin-top:6px}
    th,td{padding:7px 8px;border-bottom:1px solid var(--line);text-align:left;font-size:13px}
    th{color:var(--muted);font-size:11px;text-transform:uppercase}
    td.num,th.num{text-align:right;white-space:nowrap}
    .pill{display:inline-block;border-radius:10px;padding:2px 9px;font-size:11.5px;font-weight:600}
    .pill.paid{background:#1c3329;color:var(--green)}
    .pill.unpaid{background:#3a2320;color:var(--red)}
    a{color:#8ab4ff;text-decoration:none} a:hover{text-decoration:underline}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;flex-wrap:wrap}
    .empty{color:var(--muted);padding:14px 4px}
    .bar{position:fixed;left:0;right:0;bottom:0;background:var(--bg);border-top:1px solid var(--line);padding:12px 16px;display:flex;justify-content:space-between;gap:10px;z-index:50}
    .grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:6px 18px;font-size:13px}
    .grid2 .lbl{color:var(--muted);font-size:11.5px;text-transform:uppercase;margin-top:6px}
  </style>
</head>
<body>
  <div id="app"><div class="empty" id="boot">Загрузка клиентов…</div></div>
  <div class="bar">
    <button class="btn" id="back" type="button" style="display:none">← Все клиенты</button>
    <span></span>
    <button class="btn" id="close" type="button">Закрыть</button>
  </div>
  <script>
    var t = window.TrelloPowerUp.iframe();
    var LIST = [];        // весь справочник
    var ORDERS_CACHE = {}; // companyId -> {totals, orders}
    var VIEW = { mode:'list', companyId:null, filter:'' };

    var WORKER = (window.CONFIG && window.CONFIG.WORKER_URL) || window.WORKER_URL || '';
    function money(v){ return Math.round(+v||0).toLocaleString('ru-RU'); }
    function esc(s){ return CRM.esc(s); }

    document.getElementById('close').onclick=function(){ t.closeModal(); };
    document.getElementById('back').onclick=function(){ VIEW.mode='list'; VIEW.companyId=null; render(); };

    function matches(c, f){
      if(!f) return true;
      f=f.toLowerCase();
      var hay=[c.name,c.bin,c.phone,c.addr].concat((c.contacts||[]).map(function(p){return (p.name||'')+' '+(p.phone||'');})).join(' ').toLowerCase();
      return hay.indexOf(f)>=0;
    }

    function ordersFor(c){
      if(ORDERS_CACHE[c.id]) return Promise.resolve(ORDERS_CACHE[c.id]);
      return CRM.companyOrders(c.id, c.name).then(function(j){ ORDERS_CACHE[c.id]=j; return j; });
    }

    function renderList(){
      var app=document.getElementById('app');
      var h='<h2>Клиенты <span class="muted" style="font-weight:400">· всего '+LIST.length+'</span></h2>';
      h+='<div class="topbar"><input class="search" id="q" type="text" placeholder="Поиск: название, БИН/ИИН, телефон, контактное лицо…" value="'+esc(VIEW.filter)+'" style="flex:1;margin:0">';
      h+='<button class="btn primary" id="addC" type="button">+ Новый клиент</button></div>';
      var shown=LIST.filter(function(c){ return matches(c, VIEW.filter); });
      if(!shown.length){ h+='<div class="empty">'+(LIST.length?'Никого не нашлось по запросу.':'Справочник пуст — добавьте первого клиента.')+'</div>'; }
      h+='<div class="clist">';
      shown.forEach(function(c){
        var st=ORDERS_CACHE[c.id];
        var stats = (st && st.totals) ? ('<div class="rev">'+money(st.totals.revenue)+' ₸ · '+st.totals.orders+' зак.</div>'+
          (st.totals.unpaidRev>0?('<div class="debt">долг '+money(st.totals.unpaidRev)+' ₸</div>'):'<div class="ok">долгов нет</div>')) : '<div class="muted">…</div>';
        var isPerson = (c.type||c.kind)==='person';
        h+='<div class="crow" data-id="'+esc(c.id)+'"><div><div class="nm">'+esc(c.name||'(без названия)')+
           (isPerson?' <span class="muted" style="font-weight:400;font-size:11.5px;border:1px solid var(--line);border-radius:8px;padding:1px 7px">частное лицо</span>':'')+'</div>'+
           '<div class="sub">'+esc([c.bin?((isPerson?'ИИН ':'БИН ')+c.bin):'', c.phone||''].filter(Boolean).join(' · '))+'</div></div>'+
           '<div class="stats">'+stats+'</div></div>';
      });
      h+='</div>';
      app.innerHTML=h;
      document.getElementById('back').style.display='none';
      document.getElementById('q').oninput=function(){ VIEW.filter=this.value; renderList(); this.focus(); var v=this.value; this.value=''; this.value=v; };
      document.getElementById('addC').onclick=function(){ openEdit(null); };
      [].forEach.call(document.querySelectorAll('.crow'), function(el){
        el.onclick=function(){ VIEW.mode='card'; VIEW.companyId=this.getAttribute('data-id'); render(); };
      });
      // подтягиваем суммы для видимых клиентов лениво (не более 15 за раз, чтобы не заспамить сервер)
      shown.slice(0,15).forEach(function(c){
        if(ORDERS_CACHE[c.id]) return;
        ordersFor(c).then(function(){ if(VIEW.mode==='list') renderList(); });
      });
    }

    function renderCard(){
      var c=LIST.filter(function(x){return x.id===VIEW.companyId;})[0];
      if(!c){ VIEW.mode='list'; return renderList(); }
      var app=document.getElementById('app');
      var h='<h2>'+esc(c.name||'(без названия)')+
        ((c.type||c.kind)==='person'?' <span class="muted" style="font-weight:400;font-size:13px;border:1px solid var(--line);border-radius:8px;padding:2px 9px">частное лицо</span>':'')+'</h2>';
      h+='<div id="ordersBlock"><div class="muted">Загружаю заказы…</div></div>';
      h+='<div style="display:flex;gap:8px;margin:12px 0 4px;flex-wrap:wrap">'+
         '<button class="btn" id="anBtn" type="button">📊 Аналитика по клиенту</button>'+
         '<button class="btn" id="docBtn" type="button">📁 Документы и договора</button></div>'+
         '<div id="anBlock"></div><div id="docBlock"></div>';
      // реквизиты — набор полей зависит от типа клиента
      h+='<h3>Реквизиты</h3><div class="grid2">';
      CRM.fieldsForType(c.type||c.kind).forEach(function(f){
        if(f.type==='checkbox'){ h+='<div><div class="lbl">'+esc(f.label)+'</div>'+(c[f.key]?'Да':'Нет')+'</div>'; }
        else if(c[f.key]){ h+='<div><div class="lbl">'+esc(f.label)+'</div>'+esc(c[f.key])+'</div>'; }
      });
      h+='</div>';
      // контакты
      var ppl=c.contacts||[];
      h+='<h3>Контактные лица</h3>';
      if(!ppl.length) h+='<div class="muted">Нет контактов.</div>';
      else{
        h+='<table><thead><tr><th>Имя</th><th>Роль</th><th>Телефон</th><th>Связь</th></tr></thead><tbody>';
        ppl.forEach(function(p){
          var wa=CRM.waLink(p.phone), tel=CRM.telLink(p.phone);
          h+='<tr><td>'+esc(p.name||'')+'</td><td>'+esc(p.role||'')+'</td><td>'+esc(p.phone||'')+'</td><td>'+
             (wa?('<a href="'+wa+'" target="_blank">WhatsApp</a>'):'')+(tel?(' · <a href="'+tel+'">Позвонить</a>'):'')+'</td></tr>';
        });
        h+='</tbody></table>';
      }
      // объекты
      var objs=c.objects||[];
      if(objs.length){
        h+='<h3>Объекты</h3><table><thead><tr><th>Название</th><th>Адрес</th><th>Маршрут</th></tr></thead><tbody>';
        objs.forEach(function(o){
          var m=CRM.mapUrls(o.addr||'');
          h+='<tr><td>'+esc(o.name||'')+'</td><td>'+esc(o.addr||'')+'</td><td><a href="'+m.gis+'" target="_blank">2ГИС</a> · <a href="'+m.yandex+'" target="_blank">Яндекс</a></td></tr>';
        });
        h+='</tbody></table>';
      }
      h+='<div style="margin-top:16px"><button class="btn" id="editC" type="button">✎ Редактировать клиента</button> <button class="btn" id="delC" type="button" style="border-color:#7a3a32;color:#e8a59d">Удалить</button></div>';
      app.innerHTML=h;
      document.getElementById('back').style.display='';
      document.getElementById('anBtn').onclick=function(){ loadAnalytics(c); };
      document.getElementById('docBtn').onclick=function(){ loadDocs(c); };
      document.getElementById('editC').onclick=function(){ openEdit(c); };
      document.getElementById('delC').onclick=function(){
        if(!confirm('Удалить клиента «'+(c.name||'')+'» из справочника? Заказы в Trello не пострадают.')) return;
        CRM.deleteCompany(t, c.id).then(function(){ return reload(); }).then(function(){ VIEW.mode='list'; render(); })
          .catch(function(e){ alert('Не удалось удалить: '+(e&&e.message||e)); });
      };
      // заказы
      ordersFor(c).then(function(j){
        var el=document.getElementById('ordersBlock'); if(!el) return;
        var T=j.totals||{};
        var oh='<div class="kpis">';
        oh+='<div class="kpi"><div class="k">Заказов</div><div class="v">'+(T.orders||0)+'</div></div>';
        oh+='<div class="kpi"><div class="k">Выручка</div><div class="v">'+money(T.revenue)+' ₸</div></div>';
        oh+='<div class="kpi green"><div class="k">Оплачено</div><div class="v">'+money(T.paidRev)+' ₸</div></div>';
        oh+='<div class="kpi red"><div class="k">Долг</div><div class="v">'+money(T.unpaidRev)+' ₸</div></div>';
        oh+='</div>';
        var orders=j.orders||[];
        if(orders.length){
          oh+='<table><thead><tr><th>№</th><th>Заказ</th><th class="num">Сумма</th><th>Оплата</th><th>Дата</th></tr></thead><tbody>';
          orders.forEach(function(o){
            oh+='<tr><td>'+esc(o.number)+'</td><td>'+esc(o.name)+'</td><td class="num">'+money(o.total)+' ₸</td>'+
                '<td><span class="pill '+(o.paid?'paid':'unpaid')+'">'+(o.paid?'оплачен':'не оплачен')+'</span></td><td>'+esc(o.date)+'</td></tr>';
          });
          oh+='</tbody></table>';
        } else oh+='<div class="muted">Заказов с расчётом пока нет.</div>';
        el.innerHTML=oh;
      });
    }

    // редактирование: простая форма по COMPANY_FIELDS + контакты
    function openEdit(c){
      var isNew=!c;
      c = c ? JSON.parse(JSON.stringify(c)) : { id: CRM.newId(), type:'company', contacts: [], objects: [] };
      if(!c.type) c.type = c.kind || 'company'; // подхватываем тип и из старого поля kind (карточка), и по умолчанию юрлицо
      delete c.kind; // впредь пишем только в type — единое поле для карточки и окна CRM
      var app=document.getElementById('app');
      var h='<h2>'+(isNew?'Новый клиент':'Редактировать клиента')+'</h2>';
      h+='<div class="lbl">Тип клиента</div><div style="display:flex;gap:8px;margin:4px 0 14px">';
      CRM.CLIENT_TYPES.forEach(function(tp){
        h+='<label style="display:flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:8px;padding:6px 12px;cursor:pointer">'+
           '<input type="radio" name="ctype" value="'+tp.key+'"'+(c.type===tp.key?' checked':'')+'> '+esc(tp.label)+'</label>';
      });
      h+='</div><div id="fieldsBox" class="grid2"></div>';
      app.innerHTML=h;
      document.getElementById('back').style.display='';

      function drawFields(){
        var box=document.getElementById('fieldsBox'); var fh='';
        CRM.fieldsForType(c.type).forEach(function(f){
          if(f.type==='checkbox'){
            fh+='<div><div class="lbl">'+esc(f.label)+'</div><label><input type="checkbox" id="f_'+f.key+'"'+(c[f.key]?' checked':'')+'> Да</label></div>';
          } else {
            fh+='<div><div class="lbl">'+esc(f.label)+(f.required?' *':'')+'</div><input class="search" style="margin:0" type="text" id="f_'+f.key+'" value="'+esc(c[f.key]||'')+'" placeholder="'+esc(f.placeholder||'')+'"></div>';
          }
        });
        box.innerHTML=fh;
      }
      drawFields();
      [].forEach.call(document.querySelectorAll('input[name="ctype"]'), function(r){
        r.onchange=function(){
          // сохраняем то, что уже ввели в общих полях (имя/адрес/телефон)…
          var oldFields=CRM.fieldsForType(c.type);
          oldFields.forEach(function(f){ var el=document.getElementById('f_'+f.key); if(el) c[f.key]=(f.type==='checkbox')?el.checked:el.value; });
          var newType=this.value, newKeys=CRM.fieldsForType(newType).map(function(f){return f.key;});
          // …а поля, которых нет у нового типа (например IBAN/банк/БИК/НДС у частного лица), удаляем совсем,
          // чтобы «пустой хвост» от юрлица не сохранился в записи частного лица
          oldFields.forEach(function(f){ if(newKeys.indexOf(f.key)<0) delete c[f.key]; });
          c.type=newType;
          drawFields();
        };
      });
      var ctsHtml = '<h3>Контактные лица</h3><div id="cts"></div><button class="btn" id="addP" type="button">+ Контакт</button>'+
        '<div style="margin-top:18px"><button class="btn primary" id="saveC" type="button">💾 Сохранить</button> <button class="btn" id="cancelC" type="button">Отмена</button></div>';
      document.getElementById('app').insertAdjacentHTML('beforeend', ctsHtml);
      function drawContacts(){
        var el=document.getElementById('cts'); var ch='';
        (c.contacts||[]).forEach(function(p,i){
          ch+='<div style="display:flex;gap:8px;margin-bottom:6px;flex-wrap:wrap">'+
              '<input class="search" style="margin:0;flex:1;min-width:140px" placeholder="Имя" data-ci="'+i+'" data-f="name" value="'+esc(p.name||'')+'">'+
              '<input class="search" style="margin:0;flex:1;min-width:120px" placeholder="Роль" data-ci="'+i+'" data-f="role" value="'+esc(p.role||'')+'">'+
              '<input class="search" style="margin:0;flex:1;min-width:150px" placeholder="+7 701 …" data-ci="'+i+'" data-f="phone" value="'+esc(p.phone||'')+'">'+
              '<button class="btn" data-del="'+i+'" type="button">✕</button></div>';
        });
        el.innerHTML=ch||'<div class="muted" style="margin-bottom:6px">Нет контактов.</div>';
        [].forEach.call(el.querySelectorAll('input'), function(inp){
          inp.oninput=function(){ c.contacts[+this.getAttribute('data-ci')][this.getAttribute('data-f')]=this.value; };
        });
        [].forEach.call(el.querySelectorAll('[data-del]'), function(b){
          b.onclick=function(){ c.contacts.splice(+this.getAttribute('data-del'),1); drawContacts(); };
        });
      }
      drawContacts();
      document.getElementById('addP').onclick=function(){ (c.contacts=c.contacts||[]).push({id:CRM.newId(),name:'',role:'',phone:''}); drawContacts(); };
      document.getElementById('cancelC').onclick=function(){ render(); };
      document.getElementById('saveC').onclick=function(){
        CRM.fieldsForType(c.type).forEach(function(f){
          var el=document.getElementById('f_'+f.key); if(!el) return;
          c[f.key]=(f.type==='checkbox')?el.checked:el.value.trim();
        });
        if(!c.name){ alert(c.type==='person' ? 'Укажите ФИО.' : 'Укажите название компании.'); return; }
        c.contacts=(c.contacts||[]).filter(function(p){ return (p.name||p.phone); });
        var btn=this; btn.disabled=true; btn.textContent='Сохранение…';
        CRM.upsertCompany(t, c).then(function(){ return reload(); }).then(function(){
          VIEW.mode='card'; VIEW.companyId=c.id; render();
        }).catch(function(e){ alert('Не удалось сохранить: '+(e&&e.message||e)); btn.disabled=false; btn.textContent='💾 Сохранить'; });
      };
    }

    // ---------- аналитика по клиенту ----------
    function loadAnalytics(c){
      var el=document.getElementById('anBlock');
      el.innerHTML='<div class="muted" style="margin-top:8px">Считаю…</div>';
      fetch(WORKER+'/company-analytics?companyId='+encodeURIComponent(c.id))
        .then(function(r){return r.json();})
        .then(function(j){
          if(!j||!j.ok) throw new Error((j&&j.error)||'сервер не ответил');
          var T=j.totals;
          var h='<h3 style="margin-top:14px">Аналитика</h3>';
          h+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:8px">';
          function kpi(l,v,color){ return '<div style="background:var(--bg2,#22272b);border:1px solid var(--line);border-radius:10px;padding:9px 12px"><div style="font-size:10.5px;color:var(--muted);text-transform:uppercase">'+l+'</div><div style="font-size:16px;font-weight:700;'+(color?('color:'+color):'')+'">'+v+'</div></div>'; }
          h+=kpi('Заказов', T.orders + (T.repairs?(' + '+T.repairs+' рем.'):''));
          h+=kpi('Выручка (заказы)', money(T.revenue)+' ₸');
          if(T.repairRevenue) h+=kpi('Выручка (ремонт)', money(T.repairRevenue)+' ₸');
          h+=kpi('Выставлено счетов', money(T.invoiced)+' ₸');
          h+=kpi('Оплачено (по банку)', money(T.received)+' ₸', '#4bce97');
          h+=kpi('Сдельная по заказам', money(T.piece)+' ₸');
          h+=kpi('Материалы', money(T.materials)+' ₸');
          h+=kpi('Прибыль (оценка)', money(T.profit)+' ₸', T.profit>=0?'#4bce97':'#f28b82');
          h+='</div>';
          h+='<div class="muted" style="margin-top:6px;font-size:11.5px">Прибыль = выручка − сдельная − материалы − накладные ('+T.overheadRate+'% от выручки, из 90-дневного оборота); налоги и точные постоянные — в «Финансах».</div>';
          if(j.sections.length){
            h+='<h3>На чём выручка</h3><table><thead><tr><th>Статья</th><th class="num" style="text-align:right">Выручка</th><th style="width:45%"></th></tr></thead><tbody>';
            var mx=j.sections[0].revenue||1;
            j.sections.forEach(function(s2){
              h+='<tr><td>'+esc(s2.section)+'</td><td style="text-align:right">'+money(s2.revenue)+' ₸</td>'+
                 '<td><div style="background:#2f5ac7;height:10px;border-radius:5px;width:'+Math.max(2,Math.round(s2.revenue/mx*100))+'%"></div></td></tr>';
            });
            h+='</tbody></table>';
          }
          if(j.invoices.length){
            h+='<h3>Счета</h3><table><thead><tr><th>№</th><th>Дата</th><th style="text-align:right">Сумма</th><th style="text-align:right">Оплачено</th><th>Статус</th></tr></thead><tbody>';
            j.invoices.forEach(function(iv){
              var st = iv.pct>=100?'<span style="color:#4bce97">оплачен</span>':iv.pct>0?('<span style="color:#e8c07d">частично ('+iv.pct+'%)</span>'):(iv.sentAt?'выслан '+esc(iv.sentAt):'не оплачен');
              h+='<tr><td>№'+esc(iv.number)+'</td><td>'+esc(iv.date)+'</td><td style="text-align:right">'+money(iv.total)+' ₸</td><td style="text-align:right">'+money(iv.received)+' ₸</td><td>'+st+'</td></tr>';
            });
            h+='</tbody></table>';
          }
          if(j.orders.length){
            h+='<h3>Заказы: выручка и прибыль</h3><table><thead><tr><th>№</th><th>Заказ</th><th style="text-align:right">Сумма</th><th style="text-align:right">Прибыль</th><th>Оплата</th><th>Дата</th></tr></thead><tbody>';
            j.orders.forEach(function(o){
              h+='<tr><td>'+esc(o.number)+'</td><td>'+esc(String(o.name).slice(0,60))+'</td><td style="text-align:right">'+money(o.total)+' ₸</td>'+
                 '<td style="text-align:right;color:'+(o.profit>=0?'#4bce97':'#f28b82')+'">'+money(o.profit)+' ₸</td>'+
                 '<td>'+(o.paid?'✓':'—')+'</td><td class="muted">'+esc(o.date)+'</td></tr>';
            });
            h+='</tbody></table>';
          }
          el.innerHTML=h;
        })
        .catch(function(e){ el.innerHTML='<div class="muted">Ошибка аналитики: '+esc(e&&e.message||e)+'</div>'; });
    }

    // ---------- документы и договора клиента ----------
    function fileToB64(file){
      return new Promise(function(res,rej){ var fr=new FileReader();
        fr.onload=function(){ res(String(fr.result).split(',')[1]); }; fr.onerror=rej; fr.readAsDataURL(file); });
    }
    function loadDocs(c){
      var el=document.getElementById('docBlock');
      el.innerHTML='<div class="muted" style="margin-top:8px">Загружаю документы…</div>';
      fetch(WORKER+'/receipts-list?kind=company&refId='+encodeURIComponent(c.id))
        .then(function(r){return r.json();})
        .then(function(j){
          var list=(j&&j.receipts)||[];
          var h='<h3 style="margin-top:14px">Документы и договора</h3>';
          if(!list.length) h+='<div class="muted">Пока пусто. Загрузите договор, доверенность или карточку предприятия — они всегда будут под рукой у этого клиента.</div>';
          else{
            h+='<table><thead><tr><th>Файл</th><th style="width:120px">Загружен</th><th style="width:40px"></th></tr></thead><tbody>';
            list.forEach(function(f){
              h+='<tr><td><a href="'+WORKER+'/receipt-get?id='+f.id+'" target="_blank">📄 '+esc(f.filename||'файл')+'</a></td>'+
                 '<td class="muted">'+esc(String(f.createdAt||'').slice(0,10))+'</td>'+
                 '<td><button class="btn docdel" data-id="'+f.id+'" type="button" title="Удалить документ" style="padding:2px 8px">✕</button></td></tr>';
            });
            h+='</tbody></table>';
          }
          h+='<label class="btn" style="display:inline-block;margin-top:8px;cursor:pointer">📎 Загрузить документ (PDF/фото/док, до ~650 КБ)<input type="file" id="docFile" accept="image/*,application/pdf,.doc,.docx,.xls,.xlsx" multiple style="display:none"></label>'+
             '<span class="muted" id="docMsg" style="margin-left:10px"></span>';
          el.innerHTML=h;
          document.getElementById('docFile').onchange=function(){
            var files=this.files; if(!files.length) return;
            var msg=document.getElementById('docMsg');
            var chain=Promise.resolve();
            [].forEach.call(files, function(f,i){
              chain=chain.then(function(){
                msg.textContent='Файл '+(i+1)+' из '+files.length+'…';
                if(f.size>650000 && !/^image\//.test(f.type||'')) return Promise.reject(new Error('«'+f.name+'» больше ~650 КБ'));
                return fileToB64(f).then(function(b64){
                  return fetch(WORKER+'/receipt-save',{method:'POST',headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({kind:'company',refId:String(c.id),filename:f.name||'документ',mime:f.type||'application/octet-stream',dataB64:b64})})
                    .then(function(r){return r.json();})
                    .then(function(jr){ if(!jr||!jr.ok) throw new Error((jr&&jr.error)||'не сохранился'); });
                });
              });
            });
            chain.then(function(){ loadDocs(c); }).catch(function(e){ msg.textContent='Ошибка: '+(e&&e.message||e); msg.style.color='#f28b82'; });
          };
          [].forEach.call(el.querySelectorAll('.docdel'), function(b){
            b.onclick=function(){
              if(!confirm('Удалить документ безвозвратно?')) return;
              fetch(WORKER+'/receipt-delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:+this.getAttribute('data-id')})})
                .then(function(){ loadDocs(c); });
            };
          });
        })
        .catch(function(e){ el.innerHTML='<div class="muted">Ошибка: '+esc(e&&e.message||e)+'</div>'; });
    }

    function render(){ if(VIEW.mode==='card') renderCard(); else renderList(); }
    function reload(){ return CRM.getDirectory(t).then(function(list){ LIST=list; }); }

    // раздел доступен только руководителю (админу доски/пространства) — здесь клиенты, выручка и долги
    function isDirector(){
      return Promise.all([
        t.member('id'),
        t.board('memberships'),
        t.organization('memberships').catch(function(){ return null; })
      ]).then(function(res){
        var me = res[0] || {};
        function adminIn(o){
          var ms = ((o && o.memberships) || []).filter(function(x){ return x.idMember === me.id; })[0];
          return !!(ms && ms.memberType === 'admin');
        }
        return adminIn(res[1]) || adminIn(res[2]);
      }).catch(function(){ return false; });
    }

    function canUse(){
      return isDirector().then(function(admin){
        if(admin) return true;
        return t.member('id').then(function(me){
          var W=(window.CONFIG && window.CONFIG.WORKER_URL) || window.WORKER_URL || '';
          return fetch(W+'/worker-perms?memberId='+encodeURIComponent((me&&me.id)||''))
            .then(function(r){return r.json();}).then(function(j){ return !!(j&&j.canCrm); })
            .catch(function(){ return false; });
        });
      });
    }
    canUse().then(function(allowed){
      if(!allowed){
        document.getElementById('boot').textContent='Раздел доступен руководителю и менеджеру продаж (право «CRM» включается в «Зарплата / Работники»).';
        return;
      }
      return reload().then(render);
    }).catch(function(e){
      document.getElementById('boot').textContent='Ошибка загрузки: '+(e&&e.message||e);
    });
  </script>
</body>
</html>
