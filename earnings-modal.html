<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Заработок по заказу</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="./config.js"></script>
  <script src="./calc-engine.js?v=14"></script>
  <style>
    :root{ --bg:#1d2125; --bg2:#22272b; --line:#3c444c; --txt:#e6edf3; --muted:#9fadbc;
      --accent:#4f8cff; --accent2:#2f6f4f; --warn:#d8a657; }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);
      font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;font-size:14px}
    #app{max-width:980px;margin:0 auto;padding:16px 16px 44px}
    h2{margin:0 0 4px;font-size:18px}
    .sub{color:var(--muted);font-size:12px;margin-bottom:16px}
    .sec{background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:14px}
    .sec h3{margin:0 0 10px;font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted)}
    table{width:100%;border-collapse:collapse}
    th,td{text-align:left;padding:8px 8px;border-bottom:1px solid var(--line);vertical-align:top}
    th{font-size:11px;color:var(--muted);text-transform:uppercase}
    td.num,th.num{text-align:right;white-space:nowrap}
    .earn{color:#a8d5b5;font-weight:600}
    .eff{color:#9fc7e8}
    .stages{color:var(--muted);font-size:12px;margin-top:3px}
    .src{display:inline-block;font-size:11px;padding:1px 6px;border-radius:6px;background:#2a3a52;color:#9fc7e8}
    .src.man{background:#3a2a52;color:#c8b3e8}
    .src.none{background:#4a2a2a;color:#e9b3b3}
    .warnbox{border:1px solid #5a4a2a;background:#2a2418;border-radius:8px;padding:10px 12px;color:#e6cf9c;font-size:13px;margin-top:6px}
    .muted{color:var(--muted)}
    input,select{background:var(--bg);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:7px 9px;font-size:14px}
    input[type=text]{width:100%}
    input[type=number]{width:130px;text-align:right}
    .mrow{display:flex;gap:8px;align-items:center;margin-bottom:8px}
    .mrow .nm{flex:1}
    .mrow .grow{flex:1;min-width:120px}
    .mrow .lt{min-width:90px;text-align:right;color:var(--muted)}
    .mrow .x{padding:6px 10px}
    .msub{font-weight:600;color:var(--muted);margin:4px 0 8px;font-size:13px;text-transform:uppercase;letter-spacing:.4px}
    .chk{display:flex;align-items:center;gap:6px;font-size:13px}
    .crew{display:flex;flex-wrap:wrap;gap:12px;margin:8px 0}
    .btn{border:1px solid var(--line);background:var(--bg);color:var(--txt);border-radius:8px;padding:8px 14px;cursor:pointer;font-size:13px}
    .btn:hover{border-color:var(--accent)}
    .btn.save{background:var(--accent2);border-color:var(--accent2)}
    .btn.add{border-style:dashed;color:var(--accent)}
    .btn.x{color:#e9b3b3;border-color:#5a3a3a;padding:6px 9px}
    .msg{font-size:12px;color:var(--muted);margin-top:8px;min-height:16px}
    .totrow{display:flex;justify-content:space-between;padding:6px 0;border-top:1px solid var(--line)}
    .big{font-size:20px;font-weight:700}
  </style>
</head>
<body>
  <div id="app">
    <h2 id="title">Заработок по заказу</h2>
    <div class="sub" id="meta">v1 · загрузка…</div>
    <div id="body"></div>
  </div>

  <script>
    var t = window.TrelloPowerUp.iframe();
    var WORKER = (window.WORKER_URL || '').replace(/\/+$/,'');
    var ctx = { cardId:null };
    var WORKERS = [];
    var STAGE_LBL = { eng:'Инженер', cut:'Резка', bend:'Гибка', weld:'Сварка', assembly:'Сборка', montazh:'Монтаж' };
    function unitGroup(key){
      if(!key) return key;
      if(key.indexOf('comp:')===0) return 'assembly';
      if(key==='shleif'||key==='paint') return 'assembly';
      return key; // eng/cut/bend/weld
    }
    function workersFor(group){
      return WORKERS.filter(function(w){
        var st=w.stages||[];
        return !st.length || st.indexOf(group)>=0; // no stages set -> show everywhere
      });
    }

    function fmt(n){ return (Math.round(n||0)).toLocaleString('ru-RU'); }
    function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
    function setMeta(s){ document.getElementById('meta').textContent = s; }
    function denied(){
      document.getElementById('body').innerHTML =
        '<div class="sec"><h3>Доступ ограничен</h3><div class="muted">Отчёт по заработку доступен только директору (администратору доски). '+
        'Свой личный заработок работник смотрит в разделе «Мой заработок».</div></div>';
    }

    function loadContext(){
      ctx.cardId = t.arg('cardId') || null;
      return Promise.resolve().then(function(){
        if(ctx.cardId) return;
        return t.card('id','name').then(function(c){ if(c&&c.id){ ctx.cardId=c.id; } }).catch(function(){});
      });
    }

    function checkAdmin(){
      return Promise.all([
        t.member('id'),
        t.board('memberships'),
        t.organization('memberships').catch(function(){ return null; })
      ]).then(function(res){
        var me=res[0]||{}, board=res[1]||{}, org=res[2]||{};
        function adminIn(o){
          var ms=((o&&o.memberships)||[]).filter(function(x){return x.idMember===me.id;})[0];
          return !!(ms && ms.memberType==='admin');
        }
        return adminIn(board) || adminIn(org);
      }).catch(function(){ return false; });
    }

    function render(data){
      var b=document.getElementById('body');
      var html='';

      // 1) per-stage editable table
      html+='<div class="sec"><h3>Этапы заказа — исполнитель и заработок</h3>';
      if(!data.hasCalc){
        html+='<div class="muted">Нет сохранённого расчёта для этой карточки. Откройте «Калькулятор стоимости», сделайте расчёт и нажмите «Сохранить».</div></div>';
        b.innerHTML=html; return;
      }
      var stages = data.stages || [];
      if(!stages.length){
        html+='<div class="muted">В этом заказе нет этапов с работами.</div>';
      } else {
        html+='<div class="muted" style="margin-bottom:8px">Выберите исполнителя по каждому этапу/работе. «По умолчанию» — закрепить работника для будущих заказов. Доля работника по каждому виду работ настраивается в Панели руководителя → «Цены и коэффициенты». Источник: <b>авто</b> (кто двигал карточку), <b>умолч.</b> (закрепление), <b>вручную</b> (выбрали вы).</div>';
        html+='<table><thead><tr><th>Этап / работа</th><th class="num">Стоимость</th><th>Исполнитель</th><th class="num">Заработок</th><th class="num">Время / выработка</th></tr></thead><tbody>';
        stages.forEach(function(s){
          var srcLbl = s.source==='auto'?'<span class="src">авто</span>': s.source==='default'?'<span class="src">умолч.</span>': s.source==='manual'?'<span class="src man">вручную</span>':'<span class="src none">нет</span>';
          var pool=workersFor(unitGroup(s.key));
          var opts='<option value="">— выбрать —</option>'+pool.map(function(w){ return '<option value="'+w.id+'"'+(w.id===s.assigneeId?' selected':'')+'>'+esc(w.name)+'</option>'; }).join('');
          var defChecked = (data.defaults && data.defaults[s.key] && data.defaults[s.key]===s.assigneeId) ? ' checked' : '';
          var shareLbl = Math.round((+s.share||0)*1000)/10 + '%';
          var timeCell = s.hours!=null ? (s.hours+' ч'+(s.assigneeId&&s.earned&&s.hours? ' / '+fmt(s.earned/s.hours)+' ₸/ч':'')) : '<span class="muted">—</span>';
          // paint row shows the mode (set in the calculator), read-only here
          var paintToggle = s.paint ? ('<div class="stages">'+(data.paintInShop?('красили в цеху → '+shareLbl+' начисляется'):'красили на стороне → не начисляется')+' · меняется в калькуляторе</div>') : '';
          var earnCell = s.paintOutside ? '<span class="muted">на стороне</span>' : (s.assigneeId? fmt(s.earned)+' ₸':'<span class="muted">—</span>');
          html+='<tr>'+
            '<td>'+esc(s.label||s.key)+'<div class="stages">'+srcLbl+' · доля '+shareLbl+(s.autoName?(' · двигал: '+esc(s.autoName)):'')+'</div>'+paintToggle+'</td>'+
            '<td class="num">'+fmt(s.cost)+' ₸</td>'+
            '<td><select class="asg" data-stage="'+s.key+'">'+opts+'</select>'+
              '<label class="chk" style="margin-top:4px"><input type="checkbox" class="def" data-stage="'+s.key+'"'+defChecked+'> по умолчанию</label></td>'+
            '<td class="num earn">'+earnCell+'</td>'+
            '<td class="num eff">'+timeCell+'</td>'+
          '</tr>';
        });
        html+='</tbody></table>';
        html+='<div class="msg" id="asgmsg"></div>';
      }
      if(data.unattributed && data.unattributed.length){
        html+='<div class="warnbox">Без исполнителя (не начислено): '+
          data.unattributed.map(function(u){ return esc(u.label||u.stage)+' — '+fmt(u.earned)+' ₸'; }).join(', ')+
          '. Выберите исполнителя в списке выше.</div>';
      }
      html+='</div>';

      // 2) per-worker summary
      if(data.perWorker && data.perWorker.length){
        html+='<div class="sec"><h3>Итого по работникам</h3><table><thead><tr><th>Работник</th><th class="num">Заработал</th><th class="num">Время</th><th class="num">Выработка</th></tr></thead><tbody>';
        data.perWorker.forEach(function(r){
          html+='<tr><td>'+esc(r.name)+'</td><td class="num earn">'+fmt(r.earned)+' ₸</td>'+
                '<td class="num">'+(r.hours? r.hours+' ч':'—')+'</td>'+
                '<td class="num eff">'+(r.efficiency!=null? fmt(r.efficiency)+' ₸/ч':'—')+'</td></tr>';
        });
        html+='</tbody></table></div>';
      }

      // 3) montazh-by-fact editor (mini-calculator)
      html+='<div class="sec"><h3>Монтаж по факту (заполняется после выезда)</h3>';
      html+='<div class="muted" style="margin-bottom:10px">Внесите работы, выполненные на объекте — как в калькуляторе (резка/гибка/сварка + компоненты/краска). Заработок бригады = объём работ × ⅓ × 1.5, делится поровну между отмеченными. Флажок «в счёт» — попадает ли работа в счёт клиенту. Шлейфовка добавляется автоматически (50% от сварки на монтаже).</div>';
      html+='<div class="msub">Работы</div><div id="mops"></div><button class="btn add" id="addMOp" type="button">+ работа</button>';
      html+='<div class="msub" style="margin-top:12px">Компоненты / Краска</div><div id="mcomps"></div><button class="btn add" id="addMComp" type="button">+ компонент</button>';
      html+='<div style="margin-top:12px"><b>Кто ездил:</b><div class="crew" id="crew"></div></div>';
      html+='<div id="msums"></div>';
      html+='<div style="margin-top:10px"><button class="btn save" id="saveM" type="button">Сохранить монтаж</button> <span class="msg" id="mmsg" style="display:inline"></span></div>';
      html+='</div>';

      b.innerHTML=html;

      // wire assignee dropdowns + default checkboxes
      [].forEach.call(document.querySelectorAll('.asg'), function(sel){ sel.addEventListener('change', saveAssignees); });
      [].forEach.call(document.querySelectorAll('.def'), function(cb){ cb.addEventListener('change', saveDefaults); });

      // fill montazh editor from raw
      var raw = data.montazhRaw || { crew:[], operations:[], components:[] };
      var mops=document.getElementById('mops'), mcomps=document.getElementById('mcomps');
      (raw.operations||[]).forEach(function(o){ mops.appendChild(makeMOpRow(o)); });
      (raw.components||[]).forEach(function(c){ mcomps.appendChild(makeMCompRow(c)); });
      renderCrew(raw.crew||[]);
      document.getElementById('addMOp').onclick=function(){ mops.appendChild(makeMOpRow()); recalcM(); };
      document.getElementById('addMComp').onclick=function(){ mcomps.appendChild(makeMCompRow()); recalcM(); };
      document.getElementById('saveM').onclick=saveMontazh;
      recalcM();
    }

    // ---- montazh mini-calculator (engine-backed) ----
    var M_OP_KINDS = [
      ['cut','Резка листа (м)'], ['cutTube','Резка трубы/профиля (м)'],
      ['bend','Гибка листа (кол.)'], ['bendTube','Гибка трубы (кол.)'], ['bendRod','Гибка прута (кол.)'],
      ['weldSS','Сварка нерж (см)'], ['weldBlack','Сварка черн (см)']
    ];
    var M_TH = (window.CALC && CALC.TH) || [0.8,1,1.5,2,3,4,5];
    function mGroupCmp(){
      var map=(window.CALC&&CALC.CMP)||{}, groups={}, order=[];
      Object.keys(map).forEach(function(code){ var sec=map[code].sec||'Прочее'; if(!groups[sec]){groups[sec]=[];order.push(sec);} groups[sec].push({code:code,label:map[code].lbl||code}); });
      return {groups:groups, order:order};
    }
    var MCMPG = mGroupCmp();
    function mKindSelect(sel){ var s=document.createElement('select'); s.className='grow'; M_OP_KINDS.forEach(function(k){ var o=document.createElement('option'); o.value=k[0]; o.textContent=k[1]; if(k[0]===sel)o.selected=true; s.appendChild(o); }); return s; }
    function mThSelect(sel){ var s=document.createElement('select'); s.style.width='84px'; M_TH.forEach(function(t){ var o=document.createElement('option'); o.value=t; o.textContent=t+' мм'; if(+sel===t)o.selected=true; s.appendChild(o); }); return s; }
    function mCmpSelect(sel){ var s=document.createElement('select'); s.className='grow'; var e=document.createElement('option'); e.value=''; e.textContent='— выбрать —'; s.appendChild(e);
      MCMPG.order.forEach(function(sec){ var og=document.createElement('optgroup'); og.label=sec; MCMPG.groups[sec].forEach(function(it){ var o=document.createElement('option'); o.value=it.code; o.textContent=it.label; if(it.code===sel)o.selected=true; og.appendChild(o); }); s.appendChild(og); }); return s; }

    function priceOp(kind,th,qty){ if(!window.CALC) return 0; var r=CALC.compute({operations:[{kind:kind,thickness:th,qty:qty}],engCoef:0,urgency:0,montazh:0,taxRate:0,shleifRate:0}); return r.opsBase||0; }
    function priceComp(code,qty){ if(!window.CALC||!code) return {full:0,work:0,isPaint:false}; var r=CALC.compute({components:[{code:code,qty:qty}],engCoef:0,urgency:0,montazh:0,taxRate:0}); var li=(r.lineItems||[]).filter(function(l){return l.group==='component';})[0]||{}; var mat=li.material||0,lab=li.labor||0,p=!!li.isPaint; return {full:p?mat:(mat+lab),work:p?mat:lab,isPaint:p}; }

    function makeMOpRow(o){
      o=o||{}; var row=document.createElement('div'); row.className='mrow';
      var ks=mKindSelect(o.kind||'weldSS'), th=mThSelect(o.thickness||M_TH[2]);
      var qty=document.createElement('input'); qty.type='number'; qty.min='0'; qty.step='any'; qty.placeholder='кол-во'; qty.style.width='90px'; if(o.qty!=null)qty.value=o.qty;
      var inc=document.createElement('input'); inc.type='checkbox'; inc.className='inc'; if(o.inClient!==false)inc.checked=true;
      var lab=document.createElement('label'); lab.className='chk'; lab.appendChild(inc); lab.appendChild(document.createTextNode(' в счёт'));
      var lt=document.createElement('span'); lt.className='lt'; lt.textContent='0 ₸';
      var x=document.createElement('button'); x.className='btn x'; x.type='button'; x.textContent='✕'; x.onclick=function(){ row.remove(); recalcM(); };
      [ks,th,qty,inc].forEach(function(e){ e.addEventListener('input',recalcM); e.addEventListener('change',recalcM); });
      row._read=function(){ return {kind:ks.value,thickness:+th.value,qty:+qty.value||0,inClient:inc.checked}; };
      row._lt=lt;
      row.appendChild(ks); row.appendChild(th); row.appendChild(qty); row.appendChild(lab); row.appendChild(lt); row.appendChild(x);
      return row;
    }
    function makeMCompRow(c){
      c=c||{}; var row=document.createElement('div'); row.className='mrow';
      var sel=mCmpSelect(c.code||'');
      var qty=document.createElement('input'); qty.type='number'; qty.min='0'; qty.step='any'; qty.placeholder='кол-во'; qty.style.width='90px'; if(c.qty!=null)qty.value=c.qty;
      var inc=document.createElement('input'); inc.type='checkbox'; inc.className='inc'; if(c.inClient!==false)inc.checked=true;
      var lab=document.createElement('label'); lab.className='chk'; lab.appendChild(inc); lab.appendChild(document.createTextNode(' в счёт'));
      var lt=document.createElement('span'); lt.className='lt'; lt.textContent='0 ₸';
      var x=document.createElement('button'); x.className='btn x'; x.type='button'; x.textContent='✕'; x.onclick=function(){ row.remove(); recalcM(); };
      [sel,qty,inc].forEach(function(e){ e.addEventListener('input',recalcM); e.addEventListener('change',recalcM); });
      row._read=function(){ return {code:sel.value,qty:+qty.value||0,inClient:inc.checked}; };
      row._lt=lt;
      row.appendChild(sel); row.appendChild(qty); row.appendChild(lab); row.appendChild(lt); row.appendChild(x);
      return row;
    }
    function renderCrew(selected){
      var c=document.getElementById('crew'); c.innerHTML='';
      var pool=workersFor('montazh');
      if(!pool.length){ c.innerHTML='<span class="muted">Нет работников с этапом «Монтаж» (отметьте в «Зарплата / Работники»).</span>'; return; }
      pool.forEach(function(w){
        var lab=document.createElement('label'); lab.className='chk';
        lab.innerHTML='<input type="checkbox" class="cw" value="'+w.id+'"'+(selected.indexOf(w.id)>=0?' checked':'')+'> '+esc(w.name);
        lab.querySelector('input').addEventListener('change', recalcM);
        c.appendChild(lab);
      });
    }
    function montazhCompute(ops, comps){
      var weldTotal=0, weldIn=0, work=0, client=0;
      ops.forEach(function(o){ var w=priceOp(o.kind,o.thickness,o.qty); o._price=w; work+=w; if(o.inClient)client+=w; if(o.kind==='weldSS'||o.kind==='weldBlack'){ weldTotal+=w; if(o.inClient)weldIn+=w; } });
      var shleifWork=0.5*weldTotal, shleifClient=0.5*weldIn;
      work+=shleifWork; client+=shleifClient;
      comps.forEach(function(c){ var p=priceComp(c.code,c.qty); c._price=p.full; work+=p.work; if(c.inClient)client+=p.full; });
      return { workValue:work, clientValue:client, shleifWork:shleifWork };
    }
    function collectMontazh(){
      var ops=[].map.call(document.querySelectorAll('#mops .mrow'), function(r){ var o=r._read(); o._row=r; return o; }).filter(function(o){ return o.qty>0; });
      var comps=[].map.call(document.querySelectorAll('#mcomps .mrow'), function(r){ var c=r._read(); c._row=r; return c; }).filter(function(c){ return c.code && c.qty>0; });
      var crew=[].map.call(document.querySelectorAll('#crew .cw:checked'), function(c){ return c.value; });
      var t=montazhCompute(ops, comps);
      // update per-row price labels
      ops.forEach(function(o){ if(o._row&&o._row._lt) o._row._lt.textContent=fmt(o._price||0)+' ₸'; });
      comps.forEach(function(c){ if(c._row&&c._row._lt) c._row._lt.textContent=fmt(c._price||0)+' ₸'; });
      return {
        crew:crew,
        operations:ops.map(function(o){ return {kind:o.kind,thickness:o.thickness,qty:o.qty,inClient:o.inClient}; }),
        components:comps.map(function(c){ return {code:c.code,qty:c.qty,inClient:c.inClient}; }),
        workValue:t.workValue, clientValue:t.clientValue, shleifWork:t.shleifWork
      };
    }
    function recalcM(){
      var m=collectMontazh();
      var crewEarn=m.workValue*(1/3)*1.5;
      var per=m.crew.length? crewEarn/m.crew.length:0;
      document.getElementById('msums').innerHTML=
        (m.shleifWork>0?'<div class="totrow"><span>в т.ч. шлейфовка (авто, 50% от сварки)</span><b>'+fmt(m.shleifWork)+' ₸</b></div>':'')+
        '<div class="totrow"><span>Объём работ на монтаже</span><b>'+fmt(m.workValue)+' ₸</b></div>'+
        '<div class="totrow"><span>В счёт клиенту</span><b>'+fmt(m.clientValue)+' ₸</b></div>'+
        '<div class="totrow"><span>Заработок бригаде (× ⅓ × 1.5)</span><b class="earn">'+fmt(crewEarn)+' ₸</b></div>'+
        '<div class="totrow"><span>На каждого из '+(m.crew.length||0)+'</span><b class="earn">'+fmt(per)+' ₸</b></div>';
    }
    function saveAssignees(){
      var st={}; [].forEach.call(document.querySelectorAll('.asg'), function(sel){ if(sel.value) st[sel.getAttribute('data-stage')]=sel.value; });
      var m=document.getElementById('asgmsg'); if(m) m.textContent='Сохранение…';
      fetch(WORKER+'/order-assignees-save',{ method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({ cardId:ctx.cardId, assignees:{ stages:st } }) })
        .then(function(r){return r.json();})
        .then(function(d){ if(d&&d.ok){ load(); } else if(m){ m.textContent='Ошибка: '+((d&&d.error)||'?'); } })
        .catch(function(e){ if(m) m.textContent='Сеть: '+(e&&e.message||e); });
    }
    function saveDefaults(){
      // default[stage] = currently selected assignee for that stage, for each checked box
      var def={};
      [].forEach.call(document.querySelectorAll('.def'), function(cb){
        if(cb.checked){
          var stage=cb.getAttribute('data-stage');
          var sel=document.querySelector('.asg[data-stage="'+stage+'"]');
          if(sel && sel.value) def[stage]=sel.value;
          else cb.checked=false; // can't default an empty assignee
        }
      });
      var m=document.getElementById('asgmsg'); if(m) m.textContent='Сохранение закреплений…';
      fetch(WORKER+'/stage-defaults-save',{ method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({ defaults:def }) })
        .then(function(r){return r.json();})
        .then(function(d){ if(d&&d.ok){ load(); } else if(m){ m.textContent='Ошибка: '+((d&&d.error)||'?'); } })
        .catch(function(e){ if(m) m.textContent='Сеть: '+(e&&e.message||e); });
    }
    function saveMontazh(){
      var m=collectMontazh();
      var mm=document.getElementById('mmsg'); mm.textContent='Сохранение…';
      fetch(WORKER+'/montazh-save',{ method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({ cardId:ctx.cardId, montazh:m }) })
        .then(function(r){return r.json();})
        .then(function(d){ if(d&&d.ok){ mm.textContent='Монтаж сохранён. Обновляю отчёт…'; load(); } else mm.textContent='Ошибка: '+((d&&d.error)||'?'); })
        .catch(function(e){ mm.textContent='Ошибка сети: '+(e&&e.message||e); });
    }

    function load(){
      setMeta('v2 · загрузка отчёта…');
      return fetch(WORKER+'/order-earnings?cardId='+encodeURIComponent(ctx.cardId)+'&cb='+Date.now())
        .then(function(r){return r.json();})
        .then(function(d){
          if(d.error){ document.getElementById('body').innerHTML='<div class="sec"><div class="muted">Ошибка: '+esc(d.error)+'</div></div>'; return; }
          if(d.cardName) document.getElementById('title').textContent='Заработок: '+d.cardName;
          setMeta('v2 · card …'+String(ctx.cardId||'?').slice(-6));
          render(d);
        })
        .catch(function(e){ document.getElementById('body').innerHTML='<div class="sec"><div class="muted">Сеть недоступна: '+esc(e&&e.message||e)+'</div></div>'; });
    }

    // boot: context -> admin gate -> workers -> report
    loadContext().then(function(){
      if(!ctx.cardId){ document.getElementById('body').innerHTML='<div class="sec"><div class="muted">Не удалось определить карточку.</div></div>'; return; }
      return checkAdmin().then(function(isAdmin){
        if(!isAdmin){ denied(); return; }
        return fetch(WORKER+'/workers-list?cb='+Date.now()).then(function(r){return r.json();})
          .then(function(d){ WORKERS=(d&&d.workers)||[]; })
          .catch(function(){ WORKERS=[]; })
          .then(load);
      });
    });
  </script>
</body>
</html>
