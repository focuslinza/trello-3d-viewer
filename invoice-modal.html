<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Счёт на оплату</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="./config.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.72/pdfmake.min.js"></script>
  <script src="./dejavu-vfs.js"></script>
  <script src="./invoice-doc.js"></script>
  <style>
    :root{ --bg:#1d2125; --bg2:#22272b; --line:#3c444c; --txt:#e6edf3; --muted:#9fadbc;
           --accent:#4f7cff; --green:#3aa657; --warn:#5a4636; }
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--txt);font-size:14px}
    .hd{position:sticky;top:0;background:var(--accent);color:#fff;text-align:center;font-weight:700;padding:12px;font-size:15px;z-index:5}
    .wrap{padding:16px;max-width:900px;margin:0 auto}
    .sec{background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:14px}
    h3{margin:0 0 10px;font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
    .muted{color:var(--muted)}
    .row{display:flex;gap:14px;flex-wrap:wrap;align-items:center}
    label.opt{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:8px 12px;cursor:pointer}
    label.opt input{accent-color:var(--accent)}
    input[type=text],input[type=number],input[type=date]{background:var(--bg);border:1px solid var(--line);border-radius:8px;color:var(--txt);padding:8px 10px;font-size:14px}
    .fld{display:flex;flex-direction:column;gap:4px}
    .fld label{font-size:12px;color:var(--muted)}
    table{width:100%;border-collapse:collapse;margin-top:6px}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:left;vertical-align:middle}
    th{font-size:12px;color:var(--muted);font-weight:600}
    td.num,th.num{text-align:right}
    .tot{font-size:16px;font-weight:700}
    .btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:10px 16px;font-size:14px;cursor:pointer}
    .btn.green{background:var(--green)}
    .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--txt)}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .bar{position:sticky;bottom:0;background:var(--bg);border-top:1px solid var(--line);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;gap:12px}
    .warnbox{background:var(--warn);border:1px solid #7a5a32;border-radius:8px;padding:10px 12px;color:#f0d9b5;margin-top:8px}
    .qty{width:70px}
    .small{font-size:12px}
    .pill{display:inline-block;background:var(--bg);border:1px solid var(--line);border-radius:20px;padding:2px 10px;font-size:12px;color:var(--muted)}
    .lnk{color:#7aa2ff;cursor:pointer;text-decoration:underline dotted}
    .lnk:hover{color:#a9c2ff}
    .ovl{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;z-index:50;overflow:auto}
    .pop{background:var(--bg2);border:1px solid var(--line);border-radius:12px;max-width:760px;width:100%;padding:18px 20px}
    .pop h2{margin:0 0 4px;font-size:17px}
    .pop .meta{color:var(--muted);font-size:13px;margin-bottom:12px}
    .pop table{width:100%}
    .pop .gh{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.4px;padding-top:10px}
    .pop .popbar{display:flex;justify-content:flex-end;gap:10px;margin-top:16px;flex-wrap:wrap}
  </style>
</head>
<body>
  <div class="wrap" id="app"><div class="muted" id="boot">Загрузка…</div></div>
  <div class="bar">
    <div class="tot" id="grand">—</div>
    <div style="display:flex;gap:10px">
      <button class="btn ghost" id="close" type="button">Закрыть</button>
      <button class="btn green" id="gen" type="button" disabled>Скачать PDF</button>
    </div>
  </div>

<script>
  // Встроенный режим (embed=1): окно счёта открыто как iframe поверх канбана «Ремонт»;
  // параметры — из URL, закрытие — postMessage родителю (возврат в карточку заявки).
  var EMBED_QS = new URLSearchParams(window.location.search);
  var EMBED = EMBED_QS.get('embed') === '1';
  var t = EMBED ? {
    arg: function(k){ return EMBED_QS.get(k) || ''; },
    closeModal: function(){ try { window.parent.postMessage({ metalshopEmbedClose: 1 }, '*'); } catch(e){} },
    member: function(){ return Promise.resolve({ id: EMBED_QS.get('memberId') || '' }); },
    board: function(){ return Promise.reject(new Error('embed')); },
    organization: function(){ return Promise.reject(new Error('embed')); },
    card: function(){ return Promise.reject(new Error('embed')); },
    get: function(){ return Promise.resolve(null); },
    set: function(){ return Promise.resolve(); }
  } : window.TrelloPowerUp.iframe();
  var WORKER = (window.CONFIG && window.CONFIG.WORKER_URL) || window.WORKER_URL || '';

  // ----- our two companies (Поставщик) -----
  var SUPPLIERS = {
    ip: { key:'ip', label:'ИП «MetalShop»',
      name:'Индивидуальный предприниматель "MetalShop"', bin:'820620350761',
      addr:'Республика Казахстан, 010000, г.Астана, район Сарыарка, улица Карталы, д1/1',
      bank:'АО "Банк ЦентрКредит"', iban:'KZ828562204151669993', bik:'KCJBKZKX', kbe:'19', paycode:'859',
      executor:'Жанбосинов А.Ж.' },
    too:{ key:'too', label:'ТОО «TTMS»',
      name:'Товарищество с ограниченной ответственностью "TTMS"', bin:'230940037731',
      addr:'Республика Казахстан, г. Астана, ул. Конаева 14',
      bank:'АО "Банк ЦентрКредит"', iban:'KZ318562203133118240', bik:'KCJBKZKX', kbe:'17', paycode:'859',
      executor:'Жанбосинов А.Ж.' }
  };

  var MONTHS=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
  function ruDate(d){ return d.getDate()+' '+MONTHS[d.getMonth()]+' '+d.getFullYear()+' г.'; }
  function isoDate(d){ var m=(d.getMonth()+1),day=d.getDate(); return d.getFullYear()+'-'+(m<10?'0'+m:m)+'-'+(day<10?'0'+day:day); }
  function fromIso(s){ var p=(s||'').split('-'); return p.length===3? new Date(+p[0],+p[1]-1,+p[2]) : new Date(); }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function money(v){ return window.INVOICE.money(v); }

  var ctx = { cardId:null, boardId:'', cardCompanyId:null, allCompanies:[], buyer:null };
  var selectedCompanyId = null;
  var ALL_ORDERS = [];   // every saved calc: {cardId, name, number, total, company_id, qty, checked}
  var supplierKey = 'ip';
  var invNumber = null;
  var showOrphans = false;
  var showPaid = false;
  // произвольные дополнительные строки счёта (монтаж по оплаченному заказу,
  // доставка, упаковка и т.п.) — попадают в PDF и в журнал, к карточкам не привязаны
  var EXTRA_LINES = [];
  function validExtras(){ return EXTRA_LINES.filter(function(x){ return (x.name||'').trim() && (+x.qty>0) && (+x.price>0); }); }
  function extrasTotal(){ return validExtras().reduce(function(s,x){ return s + (+x.qty)*(+x.price); },0); }
  var showHidden = false;
  // режим «ремонт»: окно открыто из панели «Ремонт» — карточка Trello не обязательна,
  // клиент и заявка могут быть предвыбраны аргументами
  var MODE_REPAIR = (t.arg('mode')==='repair');
  var PRESELECT_REPAIR = +t.arg('repairId')||null;
  var PRESELECT_COMPANY = t.arg('companyId')||null;
  var nameToId = {};

  function boot(msg){ var b=document.getElementById('boot'); if(b) b.textContent=msg; }

  function loadContext(){
    ctx.cardId = t.arg('cardId') || null;
    ctx.boardId = t.arg('boardId') || '';
    return Promise.resolve().then(function(){
      if(ctx.cardId && ctx.boardId) return;
      return t.card('id').then(function(c){ if(c&&c.id) ctx.cardId=ctx.cardId||c.id; }).catch(function(){})
        .then(function(){ return t.board('id').then(function(b){ ctx.boardId=ctx.boardId||(b&&b.id)||''; }).catch(function(){}); });
    });
  }

  // Привязка «эта карточка -> этот клиент» — по-прежнему маленькая метка в pluginData карточки
  // (не переносилась в D1, там нет проблемы объёма). А вот САМ справочник клиентов теперь
  // живёт в D1 (см. CRM) — берём его оттуда тем же способом, что окно CRM и карточка «Компания
  // и контакты», а не из старого board-pluginData /plugindata, которое CRM очищает при переносе.
  function loadDirectory(){
    var pdP = ctx.cardId
      ? fetch(WORKER+'/plugindata?cardId='+encodeURIComponent(ctx.cardId)+(ctx.boardId?'&boardId='+encodeURIComponent(ctx.boardId):''))
          .then(function(r){ ctx._http=r.status; return r.json(); }).catch(function(e){ return { _err:(e&&e.message||'сеть') }; })
      : Promise.resolve({ ok:true, cardData:{} }); // режим «ремонт»: карточки нет — pluginData не нужен
    return Promise.all([
      pdP,
      fetch(WORKER+'/companies-list').then(function(r){return r.json();}).catch(function(e){ return { ok:false, _err:(e&&e.message||'сеть') }; })
    ]).then(function(res){
      var j=res[0], j2=res[1];
      var cd=(j&&j.cardData)||{};
      ctx.cardCompanyId = cd.companyId||null;
      ctx.allCompanies = ((j2&&j2.ok&&j2.companies)||[]).slice().sort(function(a,b){ return String(a.name||'').localeCompare(String(b.name||'')); });
      ctx._diag = { http:ctx._http, ok:!!(j&&j.ok), d1ok:!!(j2&&j2.ok), companyId:ctx.cardCompanyId, companies:ctx.allCompanies.length };
      nameToId = {}; ctx.allCompanies.forEach(function(c){ if(c.name) nameToId[c.name]=c.id; });
      var want = (MODE_REPAIR && PRESELECT_COMPANY) ? PRESELECT_COMPANY : ctx.cardCompanyId;
      // default selected = card's company (или клиент ремонта) if it exists in the directory
      if(want && ctx.allCompanies.some(function(c){return c.id===want;})) {
        selectedCompanyId=want;
        ctx.linkProblem = null;
      } else {
        ctx.linkProblem = !want ? 'none' : 'missing'; // 'none' = карточка вообще не привязана; 'missing' = привязана, но такого клиента нет в списке
        if(ctx.allCompanies.length) selectedCompanyId=ctx.allCompanies[0].id;
      }
      setBuyerFromSelected();
    }).catch(function(e){ ctx._diag={ http:ctx._http||0, net:(e&&e.message||'сеть') }; });
  }
  function companyById(id){ return ctx.allCompanies.filter(function(c){return c.id===id;})[0]||null; }
  function setBuyerFromSelected(){
    var co=companyById(selectedCompanyId);
    ctx.buyer = co ? { name:co.name||'', bin:co.bin||'', addr:co.addr||'', phone:co.phone||'', kind:(co.type||co.kind||'company') } : null;
  }

  // load ALL saved calculations once; we split them into "this client" vs "unlinked".
  // Вместе с заказами подгружаем и заявки на РЕМОНТ с заданной ценой — они становятся
  // такими же строками счёта (Р-N), можно смешивать производство и ремонт в одном счёте.
  function loadAllOrders(){
    var pOrders = fetch(WORKER+'/calc-list?limit=500').then(function(r){return r.json();}).then(function(j){
      return ((j&&j.rows)||[]).map(function(row){
        return { cardId:row.id, name:row.card_name||'(без названия)', number:row.card_number||'', link:null, total:+row.total||0, company_id:row.company_id||null, paid:(+row.paid?1:0), paid_at:row.paid_at||null, hidden:(+row.hidden?1:0), qty:1, checked:false, personName:'' };
      });
    }).catch(function(){ return []; });
    var pRepairs = fetch(WORKER+'/repair-list?full=1').then(function(r){return r.json();}).then(function(j){
      return ((j&&j.requests)||[]).filter(function(r){ return +r.clientTotal>0 && r.status!=='rejected'; }).map(function(r){
        return { cardId:'R'+r.id, isRepair:true, repairId:r.id, name:r.title+(r.objectName?(' — '+r.objectName):''), number:r.number, link:null,
                 total:+r.clientTotal||0, company_id:r.companyId||null, company_name:r.companyName||'',
                 paid:(r.paid?1:0), paid_at:r.paidAt||null, hidden:0, qty:1, checked:false, personName:'',
                 _rTitle:r.title, _rCat:r.category||'', _rObj:r.objectName||'' };
      });
    }).catch(function(){ return []; });
    return Promise.all([pOrders, pRepairs]).then(function(res){ ALL_ORDERS = res[0].concat(res[1]); });
  }

  // Имя заказчика-человека (контакт, отмеченный на карточке в «Компания и контакты»):
  // подтягиваем для заказов ТЕКУЩЕГО клиента, чтобы дописать в счёте
  // «Изготовление стола… (Ануар)». Ошибки не критичны — просто без имени.
  function loadPersonNames(){
    var orders = clientOrders().filter(function(o){ return !o.isRepair && !o.personName && !o._personTried; });
    if(!orders.length) return Promise.resolve();
    var co = companyById(selectedCompanyId);
    var contactsById = {};
    ((co&&co.contacts)||[]).forEach(function(c){ contactsById[c.id]=c.name||''; });
    return Promise.all(orders.map(function(o){
      o._personTried = true;
      return fetch(WORKER+'/plugindata?cardId='+encodeURIComponent(o.cardId)).then(function(r){return r.json();}).then(function(j){
        var ids = (j && j.cardData && j.cardData.cardContacts) || [];
        var names = ids.map(function(id){ return contactsById[id]; }).filter(Boolean);
        o.personName = names[0] || ''; // первый отмеченный контакт; если несколько — берём первого
      }).catch(function(){});
    }));
  }

  function loadNumber(){
    return fetch(WORKER+'/invoice-peek').then(function(r){return r.json();}).then(function(j){
      if(j&&j.ok) invNumber=j.next;
    }).catch(function(){});
  }

  // fill missing card numbers (idShort) + open-links for displayed orders
  function loadCardNumbers(){
    var ids = ALL_ORDERS.filter(function(o){ return !o.isRepair && (!o.number || !o.link); }).map(function(o){ return o.cardId; });
    if(!ids.length) return Promise.resolve();
    return fetch(WORKER+'/card-numbers',{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ ids:ids }) })
      .then(function(r){return r.json();}).then(function(j){
        if(j&&j.ok){ ALL_ORDERS.forEach(function(o){
          if(!o.number && j.numbers && j.numbers[o.cardId]) o.number=j.numbers[o.cardId];
          if(!o.link && j.links && j.links[o.cardId]) o.link=j.links[o.cardId];
        }); }
      }).catch(function(){});
  }

  // open the full Trello card in a separate window (cover, photos, PDFs open directly).
  // a separate window keeps THIS invoice modal open underneath.
  function openCard(cardId){
    var o=ALL_ORDERS.filter(function(x){return x.cardId===cardId;})[0]||{};
    if(o.isRepair) return; // у ремонта нет карточки Trello
    var url=o.link || ('https://trello.com/c/'+cardId);
    window.open(url, '_blank', 'noopener,width=1100,height=850');
  }

  var validIds = {};
  // принадлежность заказа выбранному клиенту: по id, а для ремонтов без id — по совпадению имени
  function belongsToSelected(o){
    if(o.company_id===selectedCompanyId) return true;
    if(o.isRepair && !o.company_id && o.company_name){ return nameToId[o.company_name]===selectedCompanyId; }
    return false;
  }
  function clientOrders(){ return ALL_ORDERS.filter(function(o){ return belongsToSelected(o) && !o.paid && !o.hidden; }); }
  function clientPaid(){ return ALL_ORDERS.filter(function(o){ return belongsToSelected(o) && o.paid && !o.hidden; }); }
  function orphanOrders(){ return ALL_ORDERS.filter(function(o){
    if(o.paid || o.hidden) return false;
    if(o.isRepair){
      if(o.company_id && validIds[o.company_id]) return false;
      if(!o.company_id && o.company_name && nameToId[o.company_name]) return false;
      return true;
    }
    return (!o.company_id || !validIds[o.company_id]);
  }); }
  function hiddenOrders(){ return ALL_ORDERS.filter(function(o){ return o.hidden; }); }
  function selectedOrders(){ return clientOrders().filter(function(o){return o.checked;}); }
  function grandTotal(){ return selectedOrders().reduce(function(s,o){return s+o.total;},0) + extrasTotal(); }

  function render(){
    var sup = SUPPLIERS[supplierKey];
    var html='';

    // supplier
    html+='<div class="sec"><h3>Поставщик (наша компания)</h3><div class="row">';
    Object.keys(SUPPLIERS).forEach(function(k){
      html+='<label class="opt"><input type="radio" name="sup" value="'+k+'"'+(k===supplierKey?' checked':'')+'> '+esc(SUPPLIERS[k].label)+'</label>';
    });
    html+='</div><div class="small muted" style="margin-top:8px">'+esc(sup.bank)+' · IBAN '+esc(sup.iban)+' · Кбе '+esc(sup.kbe)+' · Исполнитель: '+esc(sup.executor)+'</div></div>';

    // buyer — selectable from the directory (default = card's company)
    html+='<div class="sec"><h3>Покупатель</h3>';
    if(ctx.allCompanies.length){
      html+='<div class="fld" style="max-width:520px"><label>Клиент-плательщик (из «Компания и контакты»)</label>'+
            '<select id="buyerSel">'+ctx.allCompanies.map(function(c){
              return '<option value="'+esc(c.id)+'"'+(c.id===selectedCompanyId?' selected':'')+'>'+esc(c.name||'(без имени)')+((c.type||c.kind)==='person'?' — физлицо':'')+'</option>';
            }).join('')+'</select></div>';
      if(ctx.buyer){
        var isP = ctx.buyer.kind==='person';
        html+='<div class="small muted" style="margin-top:8px">'+
              (isP?'Физлицо · ':'')+
              (ctx.buyer.bin?(isP?'ИИН ':'БИН/ИИН ')+esc(ctx.buyer.bin)+' · ':'')+
              (ctx.buyer.addr?esc(ctx.buyer.addr)+' · ':'')+
              (ctx.buyer.phone?'тел. '+esc(ctx.buyer.phone):'')+'</div>';
      }
      if(!MODE_REPAIR && selectedCompanyId!==ctx.cardCompanyId){
        var warnTxt = ctx.linkProblem==='none'
          ? 'На этой карточке клиент вообще не выбран — показан первый по алфавиту, просто чтобы не оставлять список пустым. Откройте «Компания и контакты» на карточке и выберите клиента, затем откройте это окно заново.'
          : 'Карточка привязана к клиенту, которого нет в текущем списке (возможно, старая или задвоенная запись) — показан первый по алфавиту вместо него. Откройте «Компания и контакты» на карточке и выберите клиента заново, затем откройте это окно заново.';
        html+='<div class="small" style="margin-top:6px;color:#e8c07d">⚠ '+warnTxt+'</div>';
      }
    } else {
      html+='<div class="warnbox">Справочник компаний пуст или не подгрузился'+(ctx._diag&&ctx._diag.net?(' ('+esc(ctx._diag.net)+')'):'')+'. Добавьте компанию в «Компания и контакты».</div>';
    }
    html+='</div>';

    // orders of the selected client (unpaid)
    var co = clientOrders();
    var paidList = clientPaid();
    html+='<div class="sec"><h3>Заказы и ремонты клиента — что включить в счёт</h3>';
    if(!co.length){
      html+='<div class="muted">У выбранного клиента нет неоплаченных заказов и ремонтов'+(paidList.length?' (оплаченные скрыты — см. ниже)':'')+'. Если заказ есть, но привязан к другому/пустому клиенту — разверните «Заказы без привязки» и привяжите. Ремонт без заданной цены здесь не показывается — сначала укажите цену клиенту в панели «Ремонт».</div>';
    } else {
      html+='<div class="small muted" style="margin-bottom:6px">Отметьте заказы — каждый станет строкой счёта. Ремонтные заявки (Р-N) можно включать в тот же счёт вместе с производством. «Кол-во» — сколько это продуктов; цена за единицу = сумма заказа ÷ кол-во. Когда клиент оплатит — нажмите «оплачен», и заказ уйдёт из списка.</div>';
      html+='<table><thead><tr><th></th><th>№</th><th>Наименование (заказ)</th><th class="num">Кол-во</th><th class="num">Сумма заказа</th><th></th></tr></thead><tbody>';
      co.forEach(function(o){
        var numCell = o.isRepair
          ? '<span style="display:inline-block;background:#2b1f45;color:#c9a8ff;border-radius:6px;padding:1px 8px;font-size:11.5px;font-weight:800">'+esc(o.number)+'</span>'
          : '<span class="lnk rev" data-id="'+esc(o.cardId)+'" title="Открыть карточку">'+esc(o.number||'—')+'</span>';
        html+='<tr>'+
          '<td><input type="checkbox" class="ck" data-id="'+esc(o.cardId)+'"'+(o.checked?' checked':'')+'></td>'+
          '<td class="small">'+numCell+'</td>'+
          '<td>'+esc(o.name)+(o.isRepair?' <span class="pill">ремонт</span>':'')+(o.personName?' <span class="muted">('+esc(o.personName)+')</span>':'')+'</td>'+
          '<td class="num"><input type="number" min="1" step="1" class="qty qn" data-id="'+esc(o.cardId)+'" value="'+(o.qty||1)+'"></td>'+
          '<td class="num">'+money(o.total)+' ₸</td>'+
          '<td style="white-space:nowrap"><button class="btn ghost paybtn" data-id="'+esc(o.cardId)+'" type="button" title="Клиент оплатил этот заказ">оплачен</button>'+(o.isRepair?'':' <button class="btn ghost hidebtn" data-id="'+esc(o.cardId)+'" type="button" title="Убрать заказ из списка (не оплата)">убрать</button>')+'</td>'+
        '</tr>';
      });
      html+='</tbody></table>';
    }
    // paid orders of this client (hidden by default)
    if(paidList.length){
      html+='<div style="margin-top:12px"><span class="lnk" id="paidToggle">'+(showPaid?'▾':'▸')+' Оплаченные заказы этого клиента ('+paidList.length+')</span></div>';
      if(showPaid){
        html+='<table style="margin-top:6px;opacity:.75"><thead><tr><th>№ карт.</th><th>Наименование (заказ)</th><th class="num">Сумма</th><th>Оплачен</th><th></th></tr></thead><tbody>';
        paidList.forEach(function(o){
          html+='<tr>'+
            '<td class="small">'+(o.isRepair?esc(o.number):'<span class="lnk rev" data-id="'+esc(o.cardId)+'" title="Открыть карточку">'+esc(o.number||'—')+'</span>')+'</td>'+
            '<td>'+esc(o.name)+(o.isRepair?' <span class="pill">ремонт</span>':'')+'</td>'+
            '<td class="num">'+money(o.total)+' ₸</td>'+
            '<td class="small muted">'+esc(o.paid_at?String(o.paid_at).slice(0,10):'да')+'</td>'+
            '<td><button class="btn ghost unpaybtn" data-id="'+esc(o.cardId)+'" type="button" title="Вернуть в неоплаченные">вернуть</button></td>'+
          '</tr>';
        });
        html+='</tbody></table>';
      }
    }
    // hidden orders (removed from the list) — restorable
    var hid = hiddenOrders();
    if(hid.length){
      html+='<div style="margin-top:12px"><span class="lnk" id="hiddenToggle">'+(showHidden?'▾':'▸')+' Убранные заказы ('+hid.length+')</span></div>';
      if(showHidden){
        html+='<table style="margin-top:6px;opacity:.75"><thead><tr><th>№ карт.</th><th>Наименование (заказ)</th><th class="num">Сумма</th><th></th></tr></thead><tbody>';
        hid.forEach(function(o){
          html+='<tr>'+
            '<td class="small"><span class="lnk rev" data-id="'+esc(o.cardId)+'" title="Открыть карточку">'+esc(o.number||'—')+'</span></td>'+
            '<td>'+esc(o.name)+'</td>'+
            '<td class="num">'+money(o.total)+' ₸</td>'+
            '<td><button class="btn ghost unhidebtn" data-id="'+esc(o.cardId)+'" type="button" title="Вернуть заказ в список">вернуть</button></td>'+
          '</tr>';
        });
        html+='</tbody></table>';
      }
    }
    html+='</div>';

    // --- дополнительные строки (доп. работы: монтаж, доставка и т.п.) ---
    html+='<div class="sec"><h3>Дополнительные строки счёта</h3>';
    html+='<div class="small muted" style="margin-bottom:6px">Для доп. работ, которых нет в заказах: монтаж по уже оплаченному заказу, доставка, упаковка. Строка попадает в PDF и в журнал счетов; к карточке заказа она не привязывается (двигать её не нужно), оплата по номеру счёта отобразится в журнале платежей.</div>';
    if(EXTRA_LINES.length){
      html+='<table><thead><tr><th>Наименование</th><th class="num">Кол-во</th><th class="num">Цена за ед., ₸</th><th class="num">Сумма</th><th></th></tr></thead><tbody>';
      EXTRA_LINES.forEach(function(x,i){
        html+='<tr>'+
          '<td><input type="text" class="exname" data-i="'+i+'" value="'+esc(x.name||'')+'" placeholder="например: Монтаж по заказу №77" style="width:100%;box-sizing:border-box"></td>'+
          '<td class="num"><input type="number" min="1" step="1" class="exqty qn" data-i="'+i+'" value="'+(x.qty||1)+'"></td>'+
          '<td class="num"><input type="number" min="0" step="any" class="exprice" data-i="'+i+'" value="'+(x.price!=null?x.price:'')+'" style="width:110px;text-align:right"></td>'+
          '<td class="num exsum" data-i="'+i+'">'+money((+x.qty||0)*(+x.price||0))+' ₸</td>'+
          '<td><button class="btn ghost exdel" data-i="'+i+'" type="button" title="Убрать строку">✕</button></td>'+
        '</tr>';
      });
      html+='</tbody></table>';
    }
    html+='<button class="btn ghost" id="exAdd" type="button" style="margin-top:6px">+ строка</button></div>';

    var orph = orphanOrders();
    if(orph.length && selectedCompanyId){
      var selName = (companyById(selectedCompanyId)||{}).name || 'клиента';
      html+='<div class="sec"><h3 style="cursor:pointer" id="orphToggle">'+(showOrphans?'▾':'▸')+' Заказы без привязки к клиенту ('+orph.length+')</h3>';
      html+='<div class="small muted"'+(showOrphans?'':' style="margin:0"')+'>Это заказы, которые в базе не привязаны ни к одному клиенту из справочника (старые заказы или те, где компанию в карточке не выбирали). Система не знает, чьи они — здесь могут быть заказы разных клиентов. Если среди них есть заказ клиента «'+esc(selName)+'», нажмите «привязать» — он поднимется в список выше. Проверить содержимое можно по номеру карточки.</div>';
      if(showOrphans){
        html+='<table style="margin-top:8px"><thead><tr><th>№ карт.</th><th>Наименование (заказ)</th><th class="num">Сумма</th><th></th></tr></thead><tbody>';
        orph.forEach(function(o){
          html+='<tr>'+
            '<td class="small">'+(o.isRepair?esc(o.number):'<span class="lnk rev" data-id="'+esc(o.cardId)+'" title="Открыть карточку">'+esc(o.number||'—')+'</span>')+'</td>'+
            '<td>'+esc(o.name)+(o.isRepair?' <span class="pill">ремонт</span>':'')+'</td>'+
            '<td class="num">'+money(o.total)+' ₸</td>'+
            '<td><button class="btn ghost relink" data-id="'+esc(o.cardId)+'" type="button">привязать к «'+esc(selName)+'»</button></td>'+
          '</tr>';
        });
        html+='</tbody></table>';
      }
      html+='</div>';
    }

    // invoice meta
    html+='<div class="sec"><h3>Реквизиты счёта</h3><div class="row">'+
      '<div class="fld"><label>Номер счёта</label><input type="text" id="inum" value="'+esc(invNumber!=null?invNumber:'')+'" style="width:120px"></div>'+
      '<div class="fld"><label>Дата</label><input type="date" id="idate" value="'+isoDate(new Date())+'"></div>'+
      '<div class="fld" style="flex:1;min-width:220px"><label>Договор</label><input type="text" id="icontract" value="Без договора"></div>'+
      '</div><div class="small muted" style="margin-top:8px">Номер предлагается автоматически (следующий по счёту). Можно изменить вручную.</div></div>';

    document.getElementById('app').innerHTML=html;

    // wire
    [].forEach.call(document.querySelectorAll('input[name=sup]'), function(r){ r.addEventListener('change', function(){ supplierKey=this.value; render(); }); });
    var bs=document.getElementById('buyerSel');
    if(bs) bs.addEventListener('change', function(){ selectedCompanyId=this.value; setBuyerFromSelected(); render(); loadPersonNames().then(render); });
    [].forEach.call(document.querySelectorAll('.ck'), function(c){ c.addEventListener('change', function(){ var id=this.getAttribute('data-id'), chk=this.checked; var o=ALL_ORDERS.filter(function(x){return x.cardId===id;})[0]; if(o) o.checked=chk; updateGrand(); }); });
    [].forEach.call(document.querySelectorAll('.qn'), function(q){ q.addEventListener('input', function(){ var id=this.getAttribute('data-id'), v=Math.max(1,+this.value||1); var o=ALL_ORDERS.filter(function(x){return x.cardId===id;})[0]; if(o) o.qty=v; }); });
    [].forEach.call(document.querySelectorAll('.relink'), function(b){ b.addEventListener('click', function(){ relink(this.getAttribute('data-id')); }); });
    var ot=document.getElementById('orphToggle');
    if(ot) ot.addEventListener('click', function(){ showOrphans=!showOrphans; render(); });
    var pt=document.getElementById('paidToggle');
    if(pt) pt.addEventListener('click', function(){ showPaid=!showPaid; render(); });
    var ht=document.getElementById('hiddenToggle');
    if(ht) ht.addEventListener('click', function(){ showHidden=!showHidden; render(); });
    [].forEach.call(document.querySelectorAll('.paybtn'), function(b){ b.addEventListener('click', function(){ markPaid(this.getAttribute('data-id'), true); }); });
    [].forEach.call(document.querySelectorAll('.unpaybtn'), function(b){ b.addEventListener('click', function(){ markPaid(this.getAttribute('data-id'), false); }); });
    [].forEach.call(document.querySelectorAll('.hidebtn'), function(b){ b.addEventListener('click', function(){ markHidden(this.getAttribute('data-id'), true); }); });
    [].forEach.call(document.querySelectorAll('.unhidebtn'), function(b){ b.addEventListener('click', function(){ markHidden(this.getAttribute('data-id'), false); }); });
    [].forEach.call(document.querySelectorAll('.rev'), function(s){ s.addEventListener('click', function(){ openCard(this.getAttribute('data-id')); }); });
    // доп. строки счёта: правки пишутся в состояние без перерисовки (не терять фокус),
    // сумма строки и общий итог обновляются на лету
    var exAdd=document.getElementById('exAdd');
    if(exAdd) exAdd.addEventListener('click', function(){ EXTRA_LINES.push({ name:'', qty:1, price:'' }); render(); });
    function exSync(i){
      var cell=document.querySelector('.exsum[data-i="'+i+'"]');
      if(cell){ var x=EXTRA_LINES[i]; cell.textContent=money((+x.qty||0)*(+x.price||0))+' ₸'; }
      updateGrand();
    }
    [].forEach.call(document.querySelectorAll('.exname'), function(inp){ inp.addEventListener('input', function(){ EXTRA_LINES[+this.getAttribute('data-i')].name=this.value; updateGrand(); }); });
    [].forEach.call(document.querySelectorAll('.exqty'), function(inp){ inp.addEventListener('input', function(){ var i=+this.getAttribute('data-i'); EXTRA_LINES[i].qty=Math.max(1,+this.value||1); exSync(i); }); });
    [].forEach.call(document.querySelectorAll('.exprice'), function(inp){ inp.addEventListener('input', function(){ var i=+this.getAttribute('data-i'); EXTRA_LINES[i].price=+this.value||0; exSync(i); }); });
    [].forEach.call(document.querySelectorAll('.exdel'), function(b){ b.addEventListener('click', function(){ EXTRA_LINES.splice(+this.getAttribute('data-i'),1); render(); }); });
    updateGrand();
  }

  function relink(cardId){
    var co=companyById(selectedCompanyId); if(!co) return;
    var o=ALL_ORDERS.filter(function(x){return x.cardId===cardId;})[0];
    if(o && o.isRepair){
      // привязка ремонта к клиенту — через /repair-update (title/категория/объект сохраняем как есть)
      fetch(WORKER+'/repair-update',{ method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({ id:o.repairId, title:o._rTitle, category:o._rCat, companyId:co.id, companyName:co.name||'', objectName:o._rObj }) })
        .then(function(r){return r.json();}).then(function(j){
          if(j&&j.ok){ o.company_id=co.id; o.company_name=co.name||''; o.checked=true; render(); }
          else alert('Не удалось привязать: '+((j&&j.error)||'?'));
        }).catch(function(e){ alert('Сеть: '+(e&&e.message||e)); });
      return;
    }
    fetch(WORKER+'/calc-relink',{ method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ cardId:cardId, companyId:co.id, companyName:co.name||'' }) })
      .then(function(r){return r.json();}).then(function(j){
        if(j&&j.ok && o){ o.company_id=co.id; o.checked=true; render(); }
        else alert('Не удалось привязать: '+((j&&j.error)||'?'));
      }).catch(function(e){ alert('Сеть: '+(e&&e.message||e)); });
  }

  function markPaid(cardId, paid){
    var o=ALL_ORDERS.filter(function(x){return x.cardId===cardId;})[0]; if(!o) return;
    var p = o.isRepair
      ? fetch(WORKER+'/repair-flags',{ method:'POST', headers:{'Content-Type':'application/json'},
          body:JSON.stringify({ id:o.repairId, field:'paid', value:paid?1:0 }) })
      : fetch(WORKER+'/calc-paid',{ method:'POST', headers:{'Content-Type':'application/json'},
          body:JSON.stringify({ cardId:cardId, paid:paid?1:0 }) });
    p.then(function(r){return r.json();}).then(function(j){
        if(j&&j.ok){ o.paid=paid?1:0; if(o.paid) o.checked=false; render(); }
        else alert('Не удалось изменить статус: '+((j&&j.error)||'?'));
      }).catch(function(e){ alert('Сеть: '+(e&&e.message||e)); });
  }

  function markHidden(cardId, hidden){
    var o=ALL_ORDERS.filter(function(x){return x.cardId===cardId;})[0]; if(!o||o.isRepair) return;
    fetch(WORKER+'/calc-hide',{ method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ cardId:cardId, hidden:hidden?1:0 }) })
      .then(function(r){return r.json();}).then(function(j){
        if(j&&j.ok){ o.hidden=hidden?1:0; if(o.hidden) o.checked=false; render(); }
        else alert('Не удалось изменить: '+((j&&j.error)||'?'));
      }).catch(function(e){ alert('Сеть: '+(e&&e.message||e)); });
  }

  function updateGrand(){
    var g=grandTotal();
    document.getElementById('grand').textContent='Итого по счёту: '+money(g)+' ₸';
    var ok = !!ctx.buyer && (selectedOrders().length>0 || validExtras().length>0);
    document.getElementById('gen').disabled=!ok;
  }

  function buildData(){
    var sup=SUPPLIERS[supplierKey];
    var numEl=document.getElementById('inum'), dEl=document.getElementById('idate'), cEl=document.getElementById('icontract');
    var items = selectedOrders().map(function(o){
      var qty=Math.max(1,o.qty||1);
      var nm = o.name + (o.personName ? ' ('+o.personName+')' : '');
      return { code:o.number||'', name:nm, qty:qty, unit:'Услуга', price:(o.total/qty), cardId:o.cardId };
    });
    validExtras().forEach(function(x){
      items.push({ code:'', name:String(x.name).trim(), qty:Math.max(1,+x.qty||1), unit:'Услуга', price:+x.price||0 });
    });
    return {
      supplier:sup, buyer:ctx.buyer,
      number:(numEl.value||'').trim(), date:ruDate(fromIso(dEl.value)), contract:(cEl.value||'Без договора').trim(),
      items:items, nds:null
    };
  }

  function setupFonts(){
    if(!window.pdfMake){ return false; }
    pdfMake.vfs = window.DEJAVU_VFS;
    pdfMake.fonts = { DejaVu: { normal:'DejaVuSans.ttf', bold:'DejaVuSans-Bold.ttf', italics:'DejaVuSans.ttf', bolditalics:'DejaVuSans-Bold.ttf' } };
    return true;
  }

  function generate(){
    if(!setupFonts()){ alert('Не удалось загрузить генератор PDF (pdfMake). Проверьте интернет.'); return; }
    var gen=document.getElementById('gen'); gen.disabled=true; gen.textContent='Готовлю…';
    // commit the invoice number (locks it so the next one is +1)
    fetch(WORKER+'/invoice-commit').then(function(r){return r.json();}).then(function(j){
      var data=buildData();
      if(j&&j.ok && (!document.getElementById('inum').value || +document.getElementById('inum').value===invNumber)){
        data.number=String(j.number); // use committed number unless user typed a custom one
      }
      var dd=window.INVOICE.buildInvoiceDoc(data);
      var fname='Счет_'+data.number+'_'+(ctx.buyer&&ctx.buyer.name?ctx.buyer.name.replace(/[^0-9A-Za-zА-Яа-яЁё]+/g,'_').slice(0,30):'клиент')+'.pdf';
      pdfMake.createPdf(dd).download(fname, function(){
        gen.textContent='Скачать PDF'; gen.disabled=false;
      });
      // сохранить счёт в журнал (D1) — чтобы он был виден внутри карточек заказов.
      // не блокирует скачивание PDF; если Worker ещё без маршрута /invoice-save — просто молча пропустится.
      try {
        var dEl2=document.getElementById('idate');
        fetch(WORKER+'/invoice-save',{ method:'POST', headers:{'Content-Type':'application/json'},
          body:JSON.stringify({
            number:String(data.number||''),
            dateIso:(dEl2&&dEl2.value)||'',
            dateText:data.date||'',
            contract:data.contract||'',
            supplier:data.supplier||null,
            buyer:data.buyer||null,
            items:data.items||[],
            total:grandTotal(),
            cardIds:selectedOrders().filter(function(o){ return !o.isRepair; }).map(function(o){ return o.cardId; }),
            repairIds:selectedOrders().filter(function(o){ return o.isRepair; }).map(function(o){ return o.repairId; })
          })
        }).catch(function(){});
      } catch(e){}
    }).catch(function(e){
      gen.textContent='Скачать PDF'; gen.disabled=false;
      alert('Ошибка: '+(e&&e.message||e));
    });
  }

  document.getElementById('close').onclick=function(){ t.closeModal(); };
  document.getElementById('gen').onclick=generate;

  loadContext()
    .then(function(){ if(!ctx.cardId && !MODE_REPAIR){ boot('Не удалось определить карточку.'); return Promise.reject('no card'); } })
    .then(loadDirectory).then(loadAllOrders).then(loadCardNumbers).then(loadNumber)
    .then(function(){
      validIds = {}; ctx.allCompanies.forEach(function(c){ validIds[c.id]=true; });
      // pre-check the current card's order if it belongs to the selected client
      var cur = ALL_ORDERS.filter(function(o){ return o.cardId===ctx.cardId; })[0];
      if(cur && cur.company_id===selectedCompanyId) cur.checked=true;
      // режим «ремонт»: предвыбрать заявку, из которой открыли окно, и её клиента
      if(PRESELECT_REPAIR){
        var rr = ALL_ORDERS.filter(function(o){ return o.isRepair && o.repairId===PRESELECT_REPAIR; })[0];
        if(rr){
          if(rr.company_id && validIds[rr.company_id]) selectedCompanyId=rr.company_id;
          else if(rr.company_name && nameToId[rr.company_name]) selectedCompanyId=nameToId[rr.company_name];
          setBuyerFromSelected();
          if(belongsToSelected(rr)) rr.checked=true;
        }
      }
    })
    .then(function(){
      // Имена заказчиков грузим независимо от успеха первого рендера — даже если
      // рендер упал по посторонней причине, имена не должны от этого пострадать.
      try { render(); } catch(e) { console.error('render:', e); }
      return loadPersonNames().then(function(){ try { render(); } catch(e){} });
    })
    .catch(function(e){ boot('Ошибка загрузки: '+(e&&e.message||e)); });
</script>
</body>
</html>
