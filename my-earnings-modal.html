<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Мой заработок</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="./config.js"></script>
  <style>
    :root{ --bg:#1d2125; --bg2:#22272b; --line:#3c444c; --txt:#e6edf3; --muted:#9fadbc; --accent:#4f7cff; --green:#3aa657; }
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--txt);font-size:14px}
    .wrap{padding:16px;max-width:840px;margin:0 auto}
    .sec{background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:14px}
    h3{margin:0 0 10px;font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
    .muted{color:var(--muted)}
    .small{font-size:12px}
    .period{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:14px}
    .period button{background:var(--bg2);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:8px 12px;cursor:pointer;font-size:16px}
    .period .lbl{min-width:190px;text-align:center;font-weight:600;font-size:15px}
    .total{font-size:30px;font-weight:800;color:var(--green)}
    table{width:100%;border-collapse:collapse;margin-top:6px}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:left}
    th{font-size:12px;color:var(--muted);font-weight:600}
    td.num,th.num{text-align:right}
    .bar{height:8px;background:var(--accent);border-radius:4px;min-width:2px}
    .barwrap{background:var(--bg);border-radius:4px;overflow:hidden;width:100%}
  </style>
</head>
<body>
  <div class="wrap" id="app"><div class="muted" id="boot">Загрузка…</div></div>

<script>
  var t = window.TrelloPowerUp.iframe();
  var WORKER = (window.CONFIG && window.CONFIG.WORKER_URL) || window.WORKER_URL || '';
  var MONTHS=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  var WD=['вс','пн','вт','ср','чт','пт','сб'];

  function money(v){ v=Math.round(+v||0); return v.toLocaleString('ru-RU'); }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function pad(n){ return n<10?'0'+n:''+n; }
  function iso(y,m,d){ return y+'-'+pad(m+1)+'-'+pad(d); }

  var memberId=null, memberName='';
  var now=new Date();
  var cur={ y:now.getFullYear(), m:now.getMonth() };  // viewed month

  function boot(msg){ var b=document.getElementById('boot'); if(b) b.textContent=msg; }

  function monthRange(){
    var y=cur.y, m=cur.m;
    var from=iso(y,m,1);
    var last=new Date(y,m+1,0).getDate();
    var isCurrent=(y===now.getFullYear() && m===now.getMonth());
    var toDay=isCurrent? now.getDate() : last;
    var to=iso(y,m,toDay);
    return { from:from, to:to, last:last, isCurrent:isCurrent };
  }

  function load(){
    boot('Загрузка…');
    var r=monthRange();
    var u=WORKER+'/my-earnings?memberId='+encodeURIComponent(memberId)+'&from='+r.from+'&to='+r.to;
    fetch(u).then(function(x){return x.json();}).then(function(j){
      if(!j || j.error){ render(null, 'Ошибка: '+((j&&j.error)||'?')); return; }
      if(!j.linked){ render(null, 'linked_false'); return; }
      render(j, null);
    }).catch(function(e){ render(null, 'Сеть недоступна: '+(e&&e.message||e)); });
  }

  function periodBar(){
    return '<div class="period">'+
      '<button id="prev" type="button">‹</button>'+
      '<div class="lbl">'+MONTHS[cur.m]+' '+cur.y+'</div>'+
      '<button id="next" type="button">›</button>'+
      '</div>';
  }

  function render(j, err){
    var html='';
    html+='<div class="sec" style="text-align:center"><h3>Мой заработок'+(memberName?(' · '+esc(memberName)):'')+'</h3>'+periodBar();
    if(err==='linked_false'){
      html+='<div class="muted">Ваш аккаунт Trello не привязан к работнику. Обратитесь к руководителю, чтобы он привязал ваш аккаунт в «Зарплата / Работники».</div></div>';
      document.getElementById('app').innerHTML=html; wirePeriod(); return;
    }
    if(err){ html+='<div class="muted">'+esc(err)+'</div></div>'; document.getElementById('app').innerHTML=html; wirePeriod(); return; }

    html+='<div class="total">'+money(j.total)+' ₸</div>';
    html+='<div class="small muted" style="margin-top:4px">за '+MONTHS[cur.m].toLowerCase()+' '+cur.y+'</div>';
    html+='</div>';

    // by day
    var days=j.days||[];
    html+='<div class="sec"><h3>По дням</h3>';
    if(!days.length){ html+='<div class="muted">В этом месяце начислений пока нет.</div>'; }
    else {
      var max=days.reduce(function(m,d){return Math.max(m,d.amount);},0)||1;
      html+='<table><tbody>';
      days.forEach(function(d){
        var dt=new Date(d.date+'T00:00:00');
        var w=Math.round(100*d.amount/max);
        html+='<tr>'+
          '<td style="width:120px">'+d.date.slice(8,10)+'.'+d.date.slice(5,7)+' <span class="small muted">'+WD[dt.getDay()]+'</span></td>'+
          '<td><div class="barwrap"><div class="bar" style="width:'+w+'%"></div></div></td>'+
          '<td class="num" style="width:120px">'+money(d.amount)+' ₸</td>'+
        '</tr>';
      });
      html+='</tbody></table>';
    }
    html+='</div>';

    // by order (my share only — no order cost)
    var orders=j.orders||[];
    html+='<div class="sec"><h3>По заказам (моя доля)</h3>';
    if(!orders.length){ html+='<div class="muted">Нет заказов с вашим участием в этом месяце.</div>'; }
    else {
      html+='<div class="small muted" style="margin-bottom:6px">Показана только ваша доля по каждому заказу. Стоимость самих заказов здесь не отображается.</div>';
      html+='<table><thead><tr><th>№ карт.</th><th>Заказ</th><th class="num">Моя доля</th></tr></thead><tbody>';
      orders.forEach(function(o){
        html+='<tr><td class="small">'+esc(o.number||'—')+'</td><td>'+esc(o.name||'(без названия)')+'</td><td class="num">'+money(o.amount)+' ₸</td></tr>';
      });
      html+='</tbody></table>';
    }
    html+='</div>';

    document.getElementById('app').innerHTML=html;
    wirePeriod();
  }

  function wirePeriod(){
    var p=document.getElementById('prev'), n=document.getElementById('next');
    if(p) p.onclick=function(){ cur.m--; if(cur.m<0){ cur.m=11; cur.y--; } load(); };
    if(n) n.onclick=function(){
      // don't go past the current month
      if(cur.y===now.getFullYear() && cur.m===now.getMonth()) return;
      cur.m++; if(cur.m>11){ cur.m=0; cur.y++; } load();
    };
  }

  t.member('id','fullName').then(function(m){
    memberId=(m&&m.id)||null; memberName=(m&&m.fullName)||'';
    if(!memberId){ boot('Не удалось определить ваш аккаунт.'); return; }
    load();
  }).catch(function(){ boot('Не удалось определить ваш аккаунт.'); });
</script>
</body>
</html>
