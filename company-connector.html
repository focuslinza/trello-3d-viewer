<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Компания и контакты - Connector</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
  <script>
    // This is a SEPARATE Power-Up from the 3D viewer.
    // It only adds the "Компания и контакты" panel to the back of cards.
    window.TrelloPowerUp.initialize({
      'card-back-section': function (t, options) {
        return {
          title: 'Компания и контакты',
          icon: t.signUrl('./company-icon.svg'),
          content: {
            type: 'iframe',
            url: t.signUrl('./company-section.html'),
            height: 120
          }
        };
      }
    });
  </script>
</body>
</html>
