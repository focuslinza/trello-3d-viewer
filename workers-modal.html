<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Зарплата и работники</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="./config.js"></script>
  <style>
    :root{
      --bg:#1d2125; --bg2:#22272b; --line:#3c444c; --txt:#e6edf3;
      --muted:#9fadbc; --accent:#4f8cff; --accent2:#2f6f4f; --danger:#b04a4a;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);
      font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;font-size:14px}
    #app{max-width:900px;margin:0 auto;padding:16px 16px 70px}
    .bottombar{position:fixed;left:0;right:0;bottom:0;background:var(--bg);border-top:1px solid var(--line);padding:12px 16px;display:flex;justify-content:flex-start;gap:10px;z-index:50}
    h2{margin:0 0 4px;font-size:18px}
    .sub{color:var(--muted);font-size:12px;margin-bottom:16px}
    .sec{background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:14px}
    .sec h3{margin:0 0 10px;font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted)}
    label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}
    input,select{background:var(--bg);color:var(--txt);border:1px solid var(--line);
      border-radius:8px;padding:8px 10px;font-size:14px;width:100%}
    input:focus,select:focus{outline:none;border-color:var(--accent)}
    .daysrow{display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap}
    .daysrow .group{min-width:160px}
    .hint{color:var(--muted);font-size:12px}
    .wage{color:#a8d5b5;white-space:nowrap;font-size:13px}
    /* карточка работника */
    .wcard{border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:10px;background:var(--bg)}
    .wtop{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .wtop .nm{flex:1;min-width:160px}
    .wtop .sal{width:130px;text-align:right}
    .wtop .mem{width:190px}
    .wrowlbl{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin:10px 0 5px}
    .chips{display:flex;flex-wrap:wrap;gap:5px 6px;align-items:center}
    .chipcb{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--line);border-radius:14px;
      padding:4px 10px;font-size:12px;cursor:pointer;user-select:none;background:var(--bg2);color:var(--muted)}
    .chipcb input{display:none}
    .chipcb.on{border-color:#2e5c44;background:#1c3329;color:#4bce97}
    .chipcb.on.warn{border-color:#5a4a2a;background:#3d321c;color:#e8c07d}
    .wcard.inactive{opacity:.65;border-style:dashed}
    .delbadge{font-size:11px;color:#e9b3b3;border:1px solid #5a3a3a;border-radius:10px;padding:2px 8px}
    .btn{border:1px solid var(--line);background:var(--bg);color:var(--txt);
      border-radius:8px;padding:7px 12px;cursor:pointer;font-size:13px}
    .btn:hover{border-color:var(--accent)}
    .btn.save{background:var(--accent2);border-color:var(--accent2)}
    .btn.del{color:#e9b3b3;border-color:#5a3a3a}
    .btn.add{border-style:dashed;color:var(--accent);width:100%;padding:10px}
    .actions{display:flex;gap:6px;justify-content:flex-end}
    .msg{font-size:12px;color:var(--muted);margin-top:8px;min-height:16px}
    .empty{color:var(--muted);padding:14px 0}
    .stagewrap{display:flex;flex-wrap:wrap;gap:6px 12px;max-width:280px}
    .chk.stg{font-size:12px;white-space:nowrap}
      .permwrap{display:grid;grid-template-columns:1fr;gap:3px;min-width:280px}
    .chk.pm{display:flex;align-items:baseline;gap:6px;font-size:12.5px;white-space:nowrap}
    .chk.pm .pmh{color:var(--muted, #9fadbc);font-size:11px;white-space:normal}
    .preset{font-size:11.5px;color:#579dff;text-decoration:none;margin-top:3px;display:inline-block}
    .preset:hover{text-decoration:underline}
  </style>
</head>
<body>
  <div class="bottombar">
    <button class="btn" id="backToDash" type="button" style="border-color:#4f7cff;color:#a9c2ff">← Назад к панели руководителя</button>
  </div>
  <div id="app">
    <h2>Зарплата и работники</h2>
    <div class="sub" id="meta">v5 · загрузка…</div>

    <div class="sec">
      <h3>Рабочие дни месяца</h3>
      <div class="daysrow">
        <div class="group">
          <label for="month">Месяц</label>
          <input type="month" id="month" />
        </div>
        <div class="group">
          <label for="workdays">Рабочих дней (будни)</label>
          <input type="number" id="workdays" min="1" max="31" step="1" />
        </div>
        <div class="hint" id="autoHint"></div>
      </div>
      <div class="hint" style="margin-top:8px">Дневная ставка = оклад ÷ рабочие дни. По умолчанию берутся будни месяца (пн–пт); можно поправить вручную.</div>
    </div>

    <div class="sec">
      <h3>Работники</h3>
      <div id="rows"></div>
      <div class="empty" id="emptyHint" style="display:none">Пока нет работников. Добавьте первого.</div>
      <div style="margin-top:12px"><button class="btn add" id="addBtn" type="button">+ добавить работника</button></div>
      <label class="hint" style="display:inline-flex;align-items:center;gap:6px;margin-top:8px;cursor:pointer"><input type="checkbox" id="showDeleted" style="width:auto"> показать удалённых работников</label>
      <div class="msg" id="msg"></div>
    </div>
  </div>

  <script>
    var t = window.TrelloPowerUp.iframe();
    document.getElementById('backToDash').onclick=function(){
      t.modal({ url:'./dashboard-modal.html?t='+Date.now(), fullscreen:true, title:'Панель руководителя' });
    };
    var WORKER = (window.WORKER_URL || '').replace(/\/+$/,'');
    var rowsEl = document.getElementById('rows');
    var msgEl = document.getElementById('msg');
    var BOARD_MEMBERS = [];

    function memberOptionsHtml(selectedId){
      var h = '<option value="">— не привязан —</option>';
      BOARD_MEMBERS.forEach(function(m){
        var nm = m.fullName || m.username || m.id;
        h += '<option value="'+m.id+'"'+(m.id===selectedId?' selected':'')+'>'+String(nm).replace(/</g,'&lt;')+'</option>';
      });
      return h;
    }
    function updateCount(){
      var n = [].filter.call(rowsEl.querySelectorAll('.wcard'), function(c){ return (c.getAttribute('data-id')||'')!==''; }).length;
      document.getElementById('meta').textContent = 'v5 · работников: '+n;
    }
    function showDenied(){
      document.getElementById('app').innerHTML =
        '<h2>Зарплата и работники</h2>'+
        '<div class="sec"><h3>Доступ ограничен</h3>'+
        '<div class="hint">Этот раздел с окладами доступен только администратору доски (директору). '+
        'Если вам нужен доступ к собственному заработку — он появится в отдельном разделе «Мой заработок».</div></div>';
    }

    function fmt(n){ return (Math.round(n||0)).toLocaleString('ru-RU'); }
    function workdaysInMonth(y, m){ // m: 1-12
      var d=new Date(y, m-1, 1), n=0;
      while(d.getMonth()===m-1){ var wd=d.getDay(); if(wd>=1&&wd<=5)n++; d.setDate(d.getDate()+1); }
      return n;
    }
    function currentWorkdays(){
      var v=parseInt(document.getElementById('workdays').value,10);
      return (v && v>0) ? v : 22;
    }
    function recalcWages(){
      var wd=currentWorkdays();
      [].forEach.call(rowsEl.querySelectorAll('.wcard'), function(c){
        var sal=parseFloat(c.querySelector('.sal').value)||0;
        c.querySelector('.wage').textContent = fmt(sal/wd)+' ₸/дн';
      });
    }

    var STAGE_GROUPS = [
      {key:'eng',label:'Инж'},{key:'cut',label:'Резка'},{key:'bend',label:'Гибка'},
      {key:'weld',label:'Сварка'},{key:'assembly',label:'Сборка'},{key:'montazh',label:'Монтаж'}
    ];
    function stagesHtml(sel){
      sel = sel || [];
      return STAGE_GROUPS.map(function(g){
        return '<label class="chk stg"><input type="checkbox" class="stgcb" value="'+g.key+'"'+(sel.indexOf(g.key)>=0?' checked':'')+'> '+g.label+'</label>';
      }).join('');
    }
    var PERMS = [
      {cls:'cantabel',  fld:'can_timesheet', label:'Табель',              hint:'заполняет посещаемость'},
      {cls:'candash',   fld:'can_dashboard', label:'Панель руководителя', hint:'выручка, прибыль, этапы, заработки, оплаты'},
      {cls:'canrepair', fld:'can_repair',    label:'Ремонт',              hint:'панель заявок на ремонт'},
      {cls:'cansup',    fld:'can_supply',    label:'Снабжение',           hint:'заявки, инструмент, наличные'},
      {cls:'canissue',  fld:'can_issue_invoice', label:'Выставлять счета', hint:'кнопка «Выставить счёт» на карточке заказа'},
      {cls:'caninv',    fld:'can_invoice',   label:'Бухгалтерия',         hint:'панель бухгалтера: статусы, счета на оплату, поступления из банка — только бухгалтеру'},
      {cls:'cancrm',    fld:'can_crm',       label:'CRM',                 hint:'клиенты, выручка, долги'},
      {cls:'cancost',   fld:'can_see_cost',  label:'Видит стоимость',     hint:'цены в калькуляторе'},
      {cls:'hidestats', fld:'hide_stats',    label:'Скрыт из аналитики',  hint:'не показывать в «Заработке по работникам»', warn:true},
      {cls:'salaried',  fld:'is_salaried',   label:'Окладник',            hint:'оклад автоматически идёт в постоянные расходы (страница «Финансы»)', warn:true},
      {cls:'agent',     fld:'is_repair_agent', label:'Агент ремонта',      hint:'бонус за каждую полностью оформленную заявку на ремонт (описание, фирма, контактное лицо, фото) — виден агенту в «Моём заработке»'}
    ];
    function chipCb(cls, label, hint, on, extra){
      return '<label class="chipcb'+(on?' on':'')+(extra||'')+'" title="'+hint.replace(/"/g,'&quot;')+'">'+
             '<input type="checkbox" class="'+cls+'"'+(on?' checked':'')+'>'+label+'</label>';
    }
    function makeRow(w){
      w = w || { id:'', name:'', salary:'', stages:[] };
      var inactive = (w.active===0 || w.active==='0');
      var card=document.createElement('div');
      card.className='wcard'+(inactive?' inactive':'');
      card.setAttribute('data-id', w.id||'');
      card.setAttribute('data-active', inactive?'0':'1');
      var stagesSel = w.stages||[];
      var h =
        '<div class="wtop">'+
          '<input class="nm" type="text" placeholder="Имя работника" value="'+(w.name?String(w.name).replace(/"/g,'&quot;'):'')+'">'+
          '<input class="sal" type="number" min="0" step="1000" placeholder="оклад ₸/мес" value="'+(w.salary!=null?w.salary:'')+'" title="Оклад, ₸/мес">'+
          '<span class="wage" title="Ставка в день = оклад ÷ рабочие дни">—</span>'+
          '<select class="mem" title="Trello-аккаунт">'+memberOptionsHtml(w.trello_member_id||'')+'</select>'+
          (inactive?'<span class="delbadge">удалён</span>':'')+
          '<span class="actions">'+
            '<button class="btn save" type="button">Сохранить</button>'+
            (inactive?'<button class="btn restore" type="button" style="color:#a8d5b5;border-color:#2e5c44">Вернуть</button>'
                     :'<button class="btn del" type="button">Удалить</button>')+
          '</span>'+
        '</div>';
      h+='<div class="wrowlbl">Этапы (что делает)</div><div class="chips">'+
        STAGE_GROUPS.map(function(g){
          var on = stagesSel.indexOf(g.key)>=0;
          return '<label class="chipcb'+(on?' on':'')+'"><input type="checkbox" class="stgcb" value="'+g.key+'"'+(on?' checked':'')+'>'+g.label+'</label>';
        }).join('')+'</div>';
      h+='<div class="wrowlbl">Права доступа <a href="#" class="preset" style="margin-left:8px;text-transform:none;letter-spacing:0">профиль: начальник цеха</a></div><div class="chips">'+
        PERMS.map(function(p){
          var on = (w[p.fld]==1||w[p.fld]===true);
          return chipCb(p.cls, p.label, p.hint, on, p.warn?' warn':'');
        }).join('')+'</div>';
      card.innerHTML=h;
      // чип переключается визуально вместе с чекбоксом
      [].forEach.call(card.querySelectorAll('.chipcb input'), function(cb){
        cb.addEventListener('change', function(){ this.parentNode.classList.toggle('on', this.checked); });
      });
      card.querySelector('.sal').addEventListener('input', recalcWages);
      card.querySelector('.save').addEventListener('click', function(){ saveRow(card); });
      var pr=card.querySelector('.preset');
      if(pr) pr.addEventListener('click', function(ev){
        ev.preventDefault();
        // профиль «начальник цеха»: табель + панель руководителя + ремонт + снабжение
        ['cantabel','candash','canrepair','cansup'].forEach(function(cls){
          var cb=card.querySelector('.'+cls); if(cb){ cb.checked=true; cb.parentNode.classList.add('on'); }
        });
      });
      var delBtn=card.querySelector('.del');
      if(delBtn) delBtn.addEventListener('click', function(){ delRow(card); });
      var rst=card.querySelector('.restore');
      if(rst) rst.addEventListener('click', function(){
        card.setAttribute('data-active','1');
        saveRow(card);
      });
      return card;
    }

    function setMsg(s){ msgEl.textContent = s||''; }

    function loadWorkers(){
      if(!WORKER){ setMsg('Не задан адрес сервера (config.js).'); return; }
      setMsg('Загрузка…');
      var showDel = document.getElementById('showDeleted') && document.getElementById('showDeleted').checked;
      return fetch(WORKER+'/workers-list?'+(showDel?'all=1&':'')+'cb='+Date.now())
        .then(function(r){ return r.json(); })
        .then(function(d){
          rowsEl.innerHTML='';
          var ws=(d&&d.workers)||[];
          ws.forEach(function(w){ rowsEl.appendChild(makeRow(w)); });
          document.getElementById('emptyHint').style.display = ws.length? 'none':'block';
          recalcWages();
          updateCount();
        })
        .catch(function(e){ setMsg('Ошибка загрузки: '+(e&&e.message||e)); });
    }

    function saveRow(tr){
      var name=tr.querySelector('.nm').value.trim();
      var salary=parseFloat(tr.querySelector('.sal').value)||0;
      var memberId=tr.querySelector('.mem').value||'';
      var stages=[].map.call(tr.querySelectorAll('.stgcb:checked'), function(c){ return c.value; });
      var canInvoice=tr.querySelector('.caninv')?tr.querySelector('.caninv').checked:false;
      var canIssueInvoice=tr.querySelector('.canissue')?tr.querySelector('.canissue').checked:false;
      var canSupply=tr.querySelector('.cansup')?tr.querySelector('.cansup').checked:false;
      var canCrm=tr.querySelector('.cancrm')?tr.querySelector('.cancrm').checked:false;
      var canSeeCost=tr.querySelector('.cancost')?tr.querySelector('.cancost').checked:false;
      var canTimesheet=tr.querySelector('.cantabel')?tr.querySelector('.cantabel').checked:false;
      var canDashboard=tr.querySelector('.candash')?tr.querySelector('.candash').checked:false;
      var canRepair=tr.querySelector('.canrepair')?tr.querySelector('.canrepair').checked:false;
      var hideStats=tr.querySelector('.hidestats')?tr.querySelector('.hidestats').checked:false;
      var isSalaried=tr.querySelector('.salaried')?tr.querySelector('.salaried').checked:false;
      var isRepairAgent=tr.querySelector('.agent')?tr.querySelector('.agent').checked:false;
      if(!name){ setMsg('Введите имя.'); tr.querySelector('.nm').focus(); tr.querySelector('.nm').style.borderColor='#5a3a3a'; setTimeout(function(){tr.querySelector('.nm').style.borderColor='';},2000); return; }
      if(!salary){ setMsg('Введите оклад.'); tr.querySelector('.sal').focus(); tr.querySelector('.sal').style.borderColor='#5a3a3a'; setTimeout(function(){tr.querySelector('.sal').style.borderColor='';},2000); return; }
      var id=tr.getAttribute('data-id')||'';
      var active=(tr.getAttribute('data-active')==='0')?0:1; // сохранение удалённого не возвращает его в активные
      var btn=tr.querySelector('.save');
      var btn0=btn.textContent;
      btn.disabled=true; btn.textContent='Сохраняю…';
      setMsg('Сохранение…');
      fetch(WORKER+'/workers-save', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ id:id||undefined, name:name, salary:salary, active:active, trelloMemberId:memberId||undefined, stages:stages, canInvoice:canInvoice, canSeeCost:canSeeCost, canSupply:canSupply, canCrm:canCrm, canTimesheet:canTimesheet, canDashboard:canDashboard, canRepair:canRepair, hideStats:hideStats, isSalaried:isSalaried, canIssueInvoice:canIssueInvoice, isRepairAgent:isRepairAgent })
      }).then(function(r){ return r.json(); })
        .then(function(d){
          if(d&&d.ok){
            tr.setAttribute('data-id', d.id);
            setMsg('Сохранено: '+name);
            // явное подтверждение: кнопка зеленеет с галочкой, карточка мигает зелёной рамкой
            btn.textContent='✓ Сохранено';
            btn.style.background='#1c3329'; btn.style.borderColor='#2e5c44'; btn.style.color='#4bce97';
            tr.style.transition='border-color .3s'; tr.style.borderColor='#2e5c44';
            setTimeout(function(){
              btn.disabled=false; btn.textContent=btn0;
              btn.style.background=''; btn.style.borderColor=''; btn.style.color='';
              tr.style.borderColor='';
            }, 2000);
            document.getElementById('emptyHint').style.display='none'; updateCount();
            if(tr.classList.contains('inactive') && tr.getAttribute('data-active')==='1') loadWorkers();
          } else {
            btn.disabled=false; btn.textContent='⚠ Ошибка';
            btn.style.borderColor='#5a3a3a'; btn.style.color='#e9b3b3';
            setTimeout(function(){ btn.textContent=btn0; btn.style.borderColor=''; btn.style.color=''; }, 3000);
            setMsg('Не удалось сохранить: '+(d&&d.error||'?'));
            alert('Не сохранилось: '+(d&&d.error||'сервер не подтвердил'));
          }
        }).catch(function(e){
          btn.disabled=false; btn.textContent='⚠ Ошибка';
          btn.style.borderColor='#5a3a3a'; btn.style.color='#e9b3b3';
          setTimeout(function(){ btn.textContent=btn0; btn.style.borderColor=''; btn.style.color=''; }, 3000);
          setMsg('Ошибка: '+(e&&e.message||e));
          alert('Не сохранилось (нет связи с сервером): '+(e&&e.message||e));
        });
    }

    function delRow(tr){
      var id=tr.getAttribute('data-id')||'';
      var name=tr.querySelector('.nm').value.trim()||'работника';
      if(!id){ tr.remove(); updateCount(); return; } // unsaved row — just drop
      if(!confirm('Удалить '+name+'? (записи в заказах сохранятся)')) return;
      setMsg('Удаление…');
      fetch(WORKER+'/workers-delete', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ id:id })
      }).then(function(r){ return r.json(); })
        .then(function(d){
          if(d&&d.ok){ tr.remove(); setMsg('Удалён: '+name); updateCount(); if(!rowsEl.children.length) document.getElementById('emptyHint').style.display='block'; }
          else setMsg('Не удалось удалить: '+(d&&d.error||'?'));
        }).catch(function(e){ setMsg('Ошибка: '+(e&&e.message||e)); });
    }

    // month / workdays controls
    (function initMonth(){
      var now=new Date();
      var mEl=document.getElementById('month');
      mEl.value = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
      function applyAuto(){
        var parts=mEl.value.split('-'); var y=+parts[0], m=+parts[1];
        var auto=workdaysInMonth(y,m);
        document.getElementById('workdays').value = auto;
        document.getElementById('autoHint').textContent = 'авто: '+auto+' будних дней';
        recalcWages();
      }
      mEl.addEventListener('change', applyAuto);
      document.getElementById('workdays').addEventListener('input', recalcWages);
      applyAuto();
    })();

    document.getElementById('showDeleted').addEventListener('change', function(){ loadWorkers(); });
    document.getElementById('addBtn').addEventListener('click', function(){
      var card=makeRow(); rowsEl.appendChild(card); document.getElementById('emptyHint').style.display='none';
      card.querySelector('.nm').focus();
    });

    // access control: only a director (admin of the board OR the workspace) may view/edit salaries
    Promise.all([
      t.member('id','fullName','username'),
      t.board('memberships','members'),
      t.organization('memberships').catch(function(){ return null; })
    ]).then(function(res){
      var me=res[0]||{}, board=res[1]||{}, org=res[2]||{};
      BOARD_MEMBERS = board.members || [];
      function adminIn(o){
        var ms=((o&&o.memberships)||[]).filter(function(x){ return x.idMember===me.id; })[0];
        return !!(ms && ms.memberType==='admin');
      }
      if(!(adminIn(board) || adminIn(org))){ showDenied(); return; }
      loadWorkers();
    }).catch(function(e){
      showDenied();
    });
  </script>
</body>
</html>
