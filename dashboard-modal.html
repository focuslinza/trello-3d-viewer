<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Панель руководителя</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="./config.js"></script>
  <script src="./calc-engine.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.5.0/chart.umd.min.js"></script>
  <style>
    :root{ --bg:#1d2125; --bg2:#22272b; --line:#3c444c; --txt:#e6edf3; --muted:#9fadbc; --accent:#4f7cff; --green:#3aa657; --red:#d4574e; --amber:#c99a3a; }
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--txt);font-size:14px}
    .wrap{padding:16px;max-width:1000px;margin:0 auto}
    .sec{background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:14px}
    h3{margin:0 0 10px;font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
    .muted{color:var(--muted)} .small{font-size:12px}
    .period{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:14px}
    .period button{background:var(--bg2);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:8px 12px;cursor:pointer;font-size:16px}
    .period .lbl{min-width:190px;text-align:center;font-weight:600;font-size:15px}
    .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
    .kpi{background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:14px}
    .kpi .k{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
    .kpi .v{font-size:24px;font-weight:800;margin-top:4px}
    .kpi.green .v{color:var(--green)} .kpi.red .v{color:var(--red)} .kpi.amber .v{color:var(--amber)}
    .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
    .tab{background:var(--bg2);border:1px solid var(--line);border-radius:8px;padding:8px 14px;cursor:pointer;color:var(--txt)}
    .tab.active{border-color:var(--accent);background:#2b3a63;color:#fff}
    table{width:100%;border-collapse:collapse;margin-top:4px}
    th,td{padding:8px 8px;border-bottom:1px solid var(--line);text-align:left;font-size:13px}
    th{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px}
    td.num,th.num{text-align:right;white-space:nowrap}
    .pill{display:inline-block;border-radius:20px;padding:1px 9px;font-size:11px}
    .pill.paid{background:#173a26;color:#7ee0a1;border:1px solid #2c6b45}
    .pill.unpaid{background:#3a2320;color:#e8a59d;border:1px solid #7a3a32}
    .chartbox{position:relative;height:220px}
    .chartbox2{position:relative;height:200px;margin-top:10px}
    .bar{position:sticky;bottom:0;background:var(--bg);border-top:1px solid var(--line);padding:12px 16px;display:flex;justify-content:space-between;gap:10px}
    .btn{background:transparent;border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:10px 16px;font-size:14px;cursor:pointer}
    .barw{background:var(--bg);border-radius:4px;overflow:hidden;min-width:60px}
    .barf{height:8px;background:var(--accent);border-radius:4px}
    .prgroup{margin-bottom:14px}
    .prgroup h4{margin:14px 0 8px;font-size:13px;color:#cdd6df}
    .prgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:8px}
    .prf{display:flex;align-items:center;justify-content:space-between;gap:8px;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:7px 10px}
    .prf label{font-size:12px;color:var(--muted);flex:1;line-height:1.2}
    .prf input{width:96px;background:var(--bg2);border:1px solid var(--line);border-radius:6px;color:var(--txt);padding:6px 8px;font-size:13px;text-align:right}
    .secrow{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin-bottom:8px}
    .secrow .sn{flex:1;min-width:160px;font-size:12.5px;color:#cdd6df}
    .secrow label{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--muted)}
    .secrow input{width:64px;background:var(--bg2);border:1px solid var(--line);border-radius:6px;color:var(--txt);padding:5px 6px;font-size:12.5px;text-align:right}
    .rtwrap{overflow-x:auto;border:1px solid var(--line);border-radius:8px;margin-bottom:10px}
    table.rtable{width:auto;min-width:100%;border-collapse:collapse;margin:0}
    table.rtable th,table.rtable td{padding:5px 6px;border:1px solid var(--line);text-align:center;font-size:12px;white-space:nowrap}
    table.rtable thead th{background:var(--bg);color:var(--muted);font-weight:600;font-size:10.5px;text-transform:uppercase}
    table.rtable td.thc{background:var(--bg);color:#cdd6df;font-weight:700;text-align:left}
    table.rtable input{width:62px;background:transparent;border:1px solid transparent;border-radius:4px;color:var(--txt);padding:3px 4px;font-size:12px;text-align:center}
    table.rtable input:hover,table.rtable input:focus{background:var(--bg2);border-color:var(--line)}
    table.rtable input.ov{background:#2b3a1f;border-color:#4a6b2c;color:#c8e6a0}
    .rtlegend{display:flex;align-items:center;gap:14px;font-size:11.5px;color:var(--muted);margin:2px 0 10px}
    .rtlegend .sw{display:inline-block;width:12px;height:12px;border-radius:3px;vertical-align:-2px;margin-right:5px}
    .prf .un{font-size:11px;color:var(--muted);width:22px}
    .savebar{display:flex;gap:10px;align-items:center;margin-top:14px}
    .btnp{background:var(--green);color:#fff;border:none;border-radius:8px;padding:10px 18px;font-size:14px;cursor:pointer}
    .btnp.ghost{background:transparent;border:1px solid var(--line);color:var(--txt)}
    #prmsg{font-size:13px;color:var(--green)}
  </style>
</head>
<body>
  <div class="wrap" id="app"><div class="muted" id="boot">Загрузка…</div></div>
  <div class="bar">
    <div style="display:flex;gap:10px">
      <button class="btn" id="pricingBtn" type="button" style="border-color:#4f7cff;color:#a9c2ff">💲 Цены и коэффициенты</button>
      <button class="btn" id="workers" type="button" style="border-color:#4f7cff;color:#a9c2ff">⚙ Зарплата / Работники</button>
      <button class="btn" id="financeBtn" type="button" style="border-color:#4f7cff;color:#a9c2ff">₸ Финансы</button>
    </div>
    <button class="btn" id="close" type="button">Закрыть</button>
  </div>

<script>
  var t = window.TrelloPowerUp.iframe();
  var WORKER = (window.CONFIG && window.CONFIG.WORKER_URL) || window.WORKER_URL || '';
  var MONTHS=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  var now=new Date();
  function pad(n){ return n<10?'0'+n:''+n; }
  function fmtDate(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
  function startOfWeek(d){ var x=new Date(d); var wd=(x.getDay()+6)%7; x.setDate(x.getDate()-wd); return x; } // неделя с понедельника
  var RANGE = { from: fmtDate(new Date(now.getFullYear(), now.getMonth(), 1)), to: fmtDate(now), presetKey:'month' };
  var EXCL_WEEKENDS = false;
  var tab='people';
  var DATA=null;
  var CHARTS={};
  var PRICING_EDIT={ mat:{}, cmp:{}, coef:{}, matOstBySec:{}, matRahBySec:{}, cmpOstBySec:{}, cmpRahBySec:{}, opOstBySec:{}, opRahBySec:{}, rates:{} };
  var CALC=window.CALC||{};

  function money(v){ v=Math.round(+v||0); return v.toLocaleString('ru-RU'); }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function boot(m){ var b=document.getElementById('boot'); if(b) b.textContent=m; }

  function calendarDays(){ var a=new Date(RANGE.from+'T00:00:00'), b=new Date(RANGE.to+'T00:00:00'); return Math.max(1, Math.round((b-a)/86400000)+1); }
  function periodLabel(){ return RANGE.from===RANGE.to ? RANGE.from : (RANGE.from+' — '+RANGE.to); }
  function applyPreset(key){
    var n=new Date(), s;
    if(key==='today') s=new Date(n);
    else if(key==='week') s=startOfWeek(n);
    else if(key==='month') s=new Date(n.getFullYear(), n.getMonth(), 1);
    else if(key==='quarter') s=new Date(n.getFullYear(), Math.floor(n.getMonth()/3)*3, 1);
    else if(key==='year') s=new Date(n.getFullYear(), 0, 1);
    else s=new Date(2020,0,1); // "всё время" — достаточно давняя точка отсчёта
    RANGE.from=fmtDate(s); RANGE.to=fmtDate(n); RANGE.presetKey=key;
    load();
  }
  // группируем дневные точки в недели/месяцы, если диапазон длинный — иначе график станет нечитаемым
  function bucketDaily(daily){
    daily = daily||[];
    var n=daily.length;
    if(n<=45) return { labels:daily.map(function(d){return d.date.slice(5);}), rev:daily.map(function(d){return d.revenue;}), prof:daily.map(function(d){return d.profit;}) };
    var byKey={}, keyFn;
    if(n<=200) keyFn=function(d){ return fmtDate(startOfWeek(new Date(d.date+'T00:00:00'))); };
    else keyFn=function(d){ return d.date.slice(0,7); };
    daily.forEach(function(d){ var k=keyFn(d); var b=byKey[k]||(byKey[k]={revenue:0,profit:0}); b.revenue+=d.revenue; b.profit+=d.profit; });
    var keys=Object.keys(byKey).sort();
    return { labels:keys, rev:keys.map(function(k){return byKey[k].revenue;}), prof:keys.map(function(k){return byKey[k].profit;}) };
  }
  function destroyChart(id){ if(CHARTS[id]){ CHARTS[id].destroy(); delete CHARTS[id]; } }
  function makeLineChart(id, labels, datasets){
    destroyChart(id); var el=document.getElementById(id); if(!el || !window.Chart) return;
    CHARTS[id]=new Chart(el.getContext('2d'), { type:'line', data:{ labels:labels, datasets:datasets },
      options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ labels:{ color:'#c7d1db' } } },
        scales:{ x:{ ticks:{ color:'#9fadbc', maxRotation:0 }, grid:{ color:'#2c333a' } }, y:{ ticks:{ color:'#9fadbc' }, grid:{ color:'#2c333a' } } } } });
  }
  function makeBarChart(id, labels, values, color, horizontal){
    destroyChart(id); var el=document.getElementById(id); if(!el || !window.Chart) return;
    CHARTS[id]=new Chart(el.getContext('2d'), { type:'bar', data:{ labels:labels, datasets:[{ data:values, backgroundColor: color||'#4f7cff', borderRadius:4 }] },
      options:{ indexAxis: horizontal?'y':'x', responsive:true, maintainAspectRatio:false, plugins:{ legend:{ display:false } },
        scales:{ x:{ ticks:{ color:'#9fadbc' }, grid:{ color:'#2c333a' } }, y:{ ticks:{ color:'#9fadbc' }, grid:{ color:'#2c333a' } } } } });
  }

  function isDirector(){
    return Promise.all([ t.member('id'), t.board('memberships'), t.organization('memberships').catch(function(){return null;}) ])
      .then(function(res){ var me=res[0]||{};
        function adminIn(o){ var ms=((o&&o.memberships)||[]).filter(function(x){return x.idMember===me.id;})[0]; return !!(ms&&ms.memberType==='admin'); }
        return adminIn(res[1])||adminIn(res[2]);
      }).catch(function(){ return false; });
  }

  function range(){ return { from: RANGE.from, to: RANGE.to }; }

  var PROFIT=null; // точная прибыль по оплате (страница /profit) за тот же период
  function load(){
    boot('Считаю показатели за '+periodLabel()+'…');
    var r=range();
    Promise.all([
      fetch(WORKER+'/dashboard?from='+r.from+'&to='+r.to).then(function(x){return x.json();}),
      fetch(WORKER+'/profit-summary?from='+r.from+'&to='+r.to).then(function(x){return x.json();}).catch(function(){return null;})
    ]).then(function(res){
      var j=res[0];
      if(!j||j.error){ boot('Ошибка: '+((j&&j.error)||'?')); return; }
      DATA=j; PROFIT=(res[1]&&res[1].ok)?res[1]:null; render();
    }).catch(function(e){ boot('Сеть недоступна: '+(e&&e.message||e)); });
  }

  function periodBar(){
    var presets=[['today','Сегодня'],['week','Неделя'],['month','Месяц'],['quarter','Квартал'],['year','Год'],['all','Всё время']];
    var h='<div class="tabs" style="margin-bottom:10px">';
    presets.forEach(function(p){ h+='<div class="tab'+(RANGE.presetKey===p[0]?' active':'')+'" data-preset="'+p[0]+'">'+p[1]+'</div>'; });
    h+='</div>';
    h+='<div class="period" style="justify-content:flex-start;flex-wrap:wrap;margin-bottom:8px">'+
       '<input type="date" id="fromD" value="'+RANGE.from+'" style="background:var(--bg2);border:1px solid var(--line);color:var(--txt);border-radius:6px;padding:6px 8px;font-size:13px">'+
       '<span class="muted">—</span>'+
       '<input type="date" id="toD" value="'+RANGE.to+'" style="background:var(--bg2);border:1px solid var(--line);color:var(--txt);border-radius:6px;padding:6px 8px;font-size:13px">'+
       '<button type="button" id="applyRange" class="btn" style="padding:6px 14px">Применить</button>'+
       '<label class="small muted" style="display:flex;align-items:center;gap:6px;margin-left:8px;cursor:pointer"><input type="checkbox" id="exclWeekends"'+(EXCL_WEEKENDS?' checked':'')+'> без выходных (для средних)</label>'+
       '</div>';
    h+='<div class="lbl" style="text-align:left;font-weight:700;font-size:15px">'+esc(periodLabel())+'</div>';
    return h;
  }
  function kpi(k,v,cls){ return '<div class="kpi '+(cls||'')+'"><div class="k">'+esc(k)+'</div><div class="v">'+v+'</div></div>'; }

  function ci(f,ph,val,w){ return '<input data-f="'+f+'" placeholder="'+esc(ph)+'" value="'+esc(val==null?'':val)+'" style="width:'+(w||90)+'px">'; }
  function custRow(t, it, knownSections){
    it=it||{}; knownSections=knownSections||[];
    var pct=function(v,def){ return (v!=null&&v!=='')?Math.round(+v*1000)/10:def; };
    var IST='background:var(--bg2);border:1px solid var(--line);border-radius:6px;color:var(--txt);padding:6px 8px';
    // fld = a stacked field: tiny caption above the input
    function fld(cap, inner, wrapStyle){
      return '<div style="display:flex;flex-direction:column;gap:2px;'+(wrapStyle||'')+'">'+
             '<span style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;white-space:nowrap">'+esc(cap)+'</span>'+inner+'</div>';
    }
    function txt(f,val,w){ return '<input data-f="'+f+'" value="'+esc(val==null?'':val)+'" style="'+IST+';'+(w||'')+'">'; }
    function num(f,val,w){ return '<input data-f="'+f+'" type="number" step="any" value="'+(val==null||val===''?'':val)+'" style="'+IST+';text-align:right;'+(w||'width:80px')+'">'; }
    // Раздел выбирается из уже существующих (чтобы "Другие компоненты" и "другие
    // компоненты" не разъезжались в два разных раздела) — либо, если ни один не
    // подходит, выбирается "+ новый раздел…" и рядом появляется поле для ввода.
    function secPicker(val, known){
      var match = known.indexOf(val) >= 0;
      var isNew = !match; // текущее значение не входит в список — либо совсем новое, либо ранее свободно введённое
      var selHtml = '<select class="secsel" style="'+IST+';width:100%">';
      known.forEach(function(s){ selHtml += '<option value="'+esc(s)+'"'+(match&&s===val?' selected':'')+'>'+esc(s)+'</option>'; });
      selHtml += '<option value="__new__"'+(isNew||!known.length?' selected':'')+'>+ новый раздел…</option>';
      selHtml += '</select>';
      var txtHtml = '<input data-f="sec" value="'+esc(val||'')+'" placeholder="Название раздела" style="'+IST+';width:100%;margin-top:4px;'+((isNew||!known.length)?'':'display:none')+'">';
      return '<div class="secwrap">'+selHtml+txtHtml+'</div>';
    }

    var h='<div class="custrow" data-t="'+t+'" data-code="'+esc(it.code||'')+'" style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin-bottom:6px">';
    h+=fld('Название', txt('lbl', it.lbl, 'width:100%'), 'flex:1;min-width:170px');
    h+=fld('Раздел', secPicker(it.sec, knownSections), 'width:190px');
    if(t==='op'){
      h+=fld('Ставка, ₸/ед', num('rate', it.rate, 'width:100px'));
    } else if(t==='mat'){
      h+=fld('Цена, ₸', num('u', it.u, 'width:100px'));
      h+=fld('Отходы, %', num('ost', pct(it.ost,15), 'width:80px'));
      h+=fld('Расходники, %', num('rah', pct(it.rah,4), 'width:110px'));
    } else {
      h+=fld('Цена, ₸', num('u', it.u, 'width:100px'));
      h+=fld('Расходники, %', num('rah', pct(it.rah,7), 'width:110px'));
      h+=fld('Работа, ×', num('m', (it.m!=null?it.m:1), 'width:80px'));
    }
    h+='<button class="delcust btnp ghost" data-t="'+t+'" data-code="'+esc(it.code||'')+'" type="button" style="padding:7px 10px" title="Удалить">✕</button>';
    h+='</div>';
    return h;
  }
  function newCode(t){ return (t==='mat'?'CUSTM_':t==='cmp'?'CUSTC_':'CUSTO_')+Date.now().toString(36)+Math.floor(Math.random()*1000); }
  function addCustom(t){
    PRICING_EDIT=collectPricing();
    if(t==='mat')(PRICING_EDIT.customMat=PRICING_EDIT.customMat||[]).push({code:newCode('mat'),lbl:'',sec:'',u:'',ost:0.15,rah:0.04});
    if(t==='cmp')(PRICING_EDIT.customCmp=PRICING_EDIT.customCmp||[]).push({code:newCode('cmp'),lbl:'',sec:'',u:'',rah:0.07,m:1});
    if(t==='op')(PRICING_EDIT.customOp=PRICING_EDIT.customOp||[]).push({code:newCode('op'),lbl:'',sec:'',rate:''});
    render();
  }
  function delCustom(t, code){
    PRICING_EDIT=collectPricing();
    var arr = t==='mat'?'customMat':t==='cmp'?'customCmp':'customOp';
    PRICING_EDIT[arr]=(PRICING_EDIT[arr]||[]).filter(function(x){ return x.code!==code; });
    render();
  }

  function pnum(v){ if(v==null||v==='') return ''; var n=+v; return Math.round(n*10000)/10000; }
  function coefField(label, key, val, un){
    return '<div class="prf"><label>'+esc(label)+'</label><input type="number" step="any" class="cf" data-key="'+key+'" value="'+pnum(val)+'"><span class="un">'+esc(un||'')+'</span></div>';
  }
  // --- отступление секций материалов/компонентов: список секций в порядке появления + заводские ost/rah первого кода секции ---
  function sectionsOf(CAT){
    var order=[], seen={};
    Object.keys(CAT).forEach(function(code){ var it=CAT[code]; if(!seen[it.sec]){ seen[it.sec]=1; order.push({sec:it.sec, ost:it.ost, rah:it.rah}); } });
    return order;
  }
  function secOstRahRow(bucketOst, bucketRah, secInfo, overOst, overRah, opts){
    opts=opts||{};
    var vOst=(overOst&&overOst[secInfo.sec]!=null&&overOst[secInfo.sec]!=='')?+overOst[secInfo.sec]*100:secInfo.ost*100;
    var vRah=(overRah&&overRah[secInfo.sec]!=null&&overRah[secInfo.sec]!=='')?+overRah[secInfo.sec]*100:secInfo.rah*100;
    var h='<div class="secrow"><div class="sn">'+esc(secInfo.sec)+'</div>';
    if(!opts.noOst) h+='<label>Остатки <input type="number" step="any" class="so" data-bucket="'+bucketOst+'" data-sec="'+esc(secInfo.sec)+'" value="'+pnum(vOst)+'">%</label>';
    h+='<label>Расходники <input type="number" step="any" class="so" data-bucket="'+bucketRah+'" data-sec="'+esc(secInfo.sec)+'" value="'+pnum(vRah)+'">%</label>';
    h+='</div>';
    return h;
  }
  var TIER_LABELS_CB=['от 1','от 20','от 100','от 500'];
  var TIER_LABELS_W =['от 1','от 6','от 11','от 16','от 21','от 51','от 101','от 301'];
  function renderRateTable(tableCode, table, tiers, tierLabels, overrides){
    var ths=Object.keys(table).map(Number).sort(function(a,b){return a-b;});
    var h='<div class="rtwrap"><table class="rtable"><thead><tr><th>Толщина, мм</th>';
    tierLabels.forEach(function(lb){ h+='<th>'+esc(lb)+'<br>шт/м</th>'; });
    h+='</tr></thead><tbody>';
    ths.forEach(function(th){
      h+='<tr><td class="thc">'+th+'</td>';
      table[th].forEach(function(def,idx){
        var ov=overrides&&overrides[th]&&overrides[th][idx];
        var val=(ov!=null&&ov!=='')?ov:def;
        var isOv=(ov!=null&&ov!==''&&+ov!==def);
        h+='<td><input type="number" step="any" class="rt'+(isOv?' ov':'')+'" data-table="'+tableCode+'" data-th="'+th+'" data-idx="'+idx+'" data-def="'+def+'" value="'+pnum(val)+'"></td>';
      });
      h+='</tr>';
    });
    h+='</tbody></table></div>';
    return h;
  }
  function renderPricing(){
    var MAT=CALC.MAT||{}, CMP=CALC.CMP||{};

    h+='<h3 style="margin-top:16px">Цены материалов (₸ за м²/п.м)</h3>'+priceRows(MAT, pm, 'mp');
    h+='<h3 style="margin-top:6px">Цены компонентов (₸ за шт / краска за м²)</h3>'+priceRows(CMP, pc, 'cp');

    return h;

  function collectPricing(){
    var P={ mat:{}, cmp:{}, coef:{}, customMat:[], customCmp:[], customOp:[],
            matOstBySec:{}, matRahBySec:{}, cmpOstBySec:{}, cmpRahBySec:{}, opOstBySec:{}, opRahBySec:{}, rates:{} };
    [].forEach.call(document.querySelectorAll('.cf'), function(el){
      var k=el.getAttribute('data-key'), v=el.value;
      if(v===''){ return; }
      v=+v;
      if(k==='taxRate'||k==='shleifRate'||k==='opRah'||k==='shareShop'||k==='shareAssembly'||k==='shareMontazh') P.coef[k]=v/100;
      else P.coef[k]=v;
    });
    [].forEach.call(document.querySelectorAll('.mp'), function(el){ if(el.value!=='') P.mat[el.getAttribute('data-code')]=+el.value; });
    [].forEach.call(document.querySelectorAll('.cp'), function(el){ if(el.value!=='') P.cmp[el.getAttribute('data-code')]=+el.value; });
    // проценты по разделам (остатки/расходники для материалов, компонентов, работ)
    [].forEach.call(document.querySelectorAll('.so'), function(el){
      var v=el.value; if(v==='') return;
      var bucket=el.getAttribute('data-bucket'), sec=el.getAttribute('data-sec');
      P[bucket][sec]=(+v)/100;
    });
    // ячейки таблиц ставок — сохраняем только те, что реально отличаются от заводского значения
    [].forEach.call(document.querySelectorAll('.rt'), function(el){
      var v=el.value; if(v==='') return;
      var def=+el.getAttribute('data-def');
      if(+v===def) return; // не изменено — не засоряем сохранение
      var tbl=el.getAttribute('data-table'), th=el.getAttribute('data-th'), idx=+el.getAttribute('data-idx');
      P.rates[tbl]=P.rates[tbl]||{};
      P.rates[tbl][th]=P.rates[tbl][th]||[];
      P.rates[tbl][th][idx]=+v;
    });
    // custom items
    function fv(row,f){ var el=row.querySelector('[data-f="'+f+'"]'); return el?el.value:''; }
    [].forEach.call(document.querySelectorAll('.custrow'), function(row){
      var t=row.getAttribute('data-t'), code=row.getAttribute('data-code');
      var lbl=fv(row,'lbl').trim(); if(!lbl) return;
      var sec=fv(row,'sec').trim();
      if(t==='mat') P.customMat.push({ code:code, lbl:lbl, sec:sec||'ДРУГИЕ МАТЕРИАЛЫ', u:+fv(row,'u')||0, ost:(+fv(row,'ost')||0)/100, rah:(+fv(row,'rah')||0)/100 });
      else if(t==='cmp') P.customCmp.push({ code:code, lbl:lbl, sec:sec||'ДРУГИЕ КОМПОНЕНТЫ', u:+fv(row,'u')||0, ost:0, rah:(+fv(row,'rah')||0)/100, m:(fv(row,'m')!==''?+fv(row,'m'):1) });
      else if(t==='op') P.customOp.push({ code:code, lbl:lbl, sec:sec||'РАБОТЫ', rate:+fv(row,'rate')||0 });
    });
    return P;
  }
  function savePricing(){
    var P=collectPricing();
    var msg=document.getElementById('prmsg'); msg.textContent='Сохранение…';
    fetch(WORKER+'/pricing-save',{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({pricing:P}) })
      .then(function(r){return r.json();}).then(function(j){
        if(j&&j.ok){ PRICING_EDIT=P; msg.textContent='Сохранено ✓ Новые расчёты будут по этим ценам.'; }
        else msg.textContent='Ошибка: '+((j&&j.error)||'?');
      }).catch(function(e){ msg.textContent='Сеть: '+(e&&e.message||e); });
  }
  function resetPricing(){
    if(!confirm('Сбросить все цены и коэффициенты к заводским (исходным)? Ваши изменения удалятся.')) return;
    fetch(WORKER+'/pricing-save',{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({pricing:{}}) })
      .then(function(r){return r.json();}).then(function(j){ if(j&&j.ok){ PRICING_EDIT={mat:{},cmp:{},coef:{},matOstBySec:{},matRahBySec:{},cmpOstBySec:{},cmpRahBySec:{},opOstBySec:{},opRahBySec:{},rates:{}}; render(); } });
  }

    if(tab==='clients'){
      var c=(DATA.byClient||[]).slice(0,8);
      if(c.length) makeBarChart('chartClients', c.map(function(x){return x.name;}), c.map(function(x){return x.revenue;}), '#c99a3a', true);
    }
  }

  function renderTab(){
    if(tab==='people'){
      var a=DATA.byWorker||[]; if(!a.length) return '<div class="muted">Нет начислений за период.</div>';
      var max=a[0].earned||1;
      var h='<h3>Заработок по работникам</h3><table><thead><tr><th>Работник</th><th class="num">Заработал</th><th class="num">Заказов</th><th class="num">Часов</th><th class="num">₸/час</th><th>Доля</th></tr></thead><tbody>';
      a.forEach(function(w){ h+='<tr><td>'+esc(w.name)+'</td><td class="num">'+money(w.earned)+' ₸</td><td class="num">'+w.orders+'</td><td class="num">'+(w.hours||'—')+'</td><td class="num">'+(w.perHour?money(w.perHour)+' ₸':'—')+'</td><td style="width:140px">'+barCell(w.earned,max)+'</td></tr>'; });
      h+='</tbody></table><div class="chartbox2"><canvas id="chartWorkers"></canvas></div>';
      return h;
    }
    if(tab==='stages'){
      var a=DATA.byStage||[]; if(!a.length) return '<div class="muted">Нет данных.</div>';
      var max=a[0].earned||1;
      var h='<h3>Зарплата по этапам</h3><table><thead><tr><th>Этап</th><th class="num">Сумма</th><th>Доля</th></tr></thead><tbody>';
      a.forEach(function(s){ h+='<tr><td>'+esc(s.name)+'</td><td class="num">'+money(s.earned)+' ₸</td><td style="width:200px">'+barCell(s.earned,max)+'</td></tr>'; });
      h+='</tbody></table><div class="chartbox2"><canvas id="chartStages"></canvas></div>';
      var st=DATA.stageTime||[];
      if(st.length){
        h+='<h3 style="margin-top:18px">Время на этап (авто-отслеживание по движению карточек)</h3>';
        h+='<table><thead><tr><th>Этап</th><th class="num">Заказов</th><th class="num">Часов всего</th><th class="num">Часов на заказ (в среднем)</th></tr></thead><tbody>';
        st.forEach(function(s){ h+='<tr><td>'+esc(s.label)+'</td><td class="num">'+s.orders+'</td><td class="num">'+s.totalHours+'</td><td class="num" style="'+(s===st[0]?'color:#e8c07d;font-weight:700':'')+'">'+s.avgHours+'</td></tr>'; });
        h+='</tbody></table><div class="small muted" style="margin-top:8px">Самый долгий этап в среднем на заказ подсвечен — это ваше текущее «узкое место» (bottleneck).</div>';
      }
      return h;
    }
    if(tab==='clients'){
      var a=DATA.byClient||[]; if(!a.length) return '<div class="muted">Нет данных.</div>';
      var h='<h3>Выручка по клиентам</h3><table><thead><tr><th>Клиент</th><th class="num">Выручка</th><th class="num">Заказов</th><th class="num">Оплачено</th><th class="num">Не оплачено</th></tr></thead><tbody>';
      a.forEach(function(c){ h+='<tr><td>'+esc(c.name)+'</td><td class="num">'+money(c.revenue)+' ₸</td><td class="num">'+c.orders+'</td><td class="num">'+money(c.paidRev)+'</td><td class="num">'+money(c.unpaidRev)+'</td></tr>'; });
      h+='</tbody></table><div class="chartbox2"><canvas id="chartClients"></canvas></div>';
      return h;
    }
    if(tab==='pricing'){ return renderPricing(); }
    // orders
    var a=DATA.byOrder||[]; if(!a.length) return '<div class="muted">Нет заказов за период.</div>';
    var h='<h3>Аналитика по заказам</h3><table><thead><tr><th>№</th><th>Заказ</th><th>Клиент</th><th class="num">Выручка</th><th class="num">Зарплата</th><th class="num">Материалы</th><th class="num">Прибыль</th><th>Оплата</th></tr></thead><tbody>';
    a.forEach(function(o){
      h+='<tr><td class="small">'+esc(o.number||'—')+'</td><td>'+esc(o.name)+'</td><td class="small muted">'+esc(o.client)+'</td>'+
         '<td class="num">'+money(o.revenue)+'</td><td class="num">'+money(o.payroll)+'</td><td class="num">'+money(o.materials)+'</td>'+
         '<td class="num" style="color:'+(o.profit>=0?'#7ee0a1':'#e8a59d')+'">'+money(o.profit)+'</td>'+
         '<td>'+(o.paid?'<span class="pill paid">оплачен'+(o.paidAt?' '+o.paidAt.slice(0,10):'')+'</span>':'<span class="pill unpaid">не оплачен</span>')+'</td></tr>';
    });
    return h+'</tbody></table>';
  }

  document.getElementById('close').onclick=function(){ t.closeModal(); };
  document.getElementById('workers').onclick=function(){
    t.modal({ url:'./workers-modal.html?t='+Date.now(), fullscreen:true, title:'Зарплата и работники' });
  };
  document.getElementById('financeBtn').onclick=function(){
    var r=range();
    // открываем страницу «Финансы» в этом же окне: оверлей с iframe поверх панели
    var old=document.getElementById('finOverlay'); if(old) old.remove();
    var ov=document.createElement('div');
    ov.id='finOverlay';
    ov.style.cssText='position:fixed;inset:0;background:var(--bg,#1d2125);z-index:100;display:flex;flex-direction:column';
    ov.innerHTML='<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #3a414a">'+
      '<button class="btn" id="finBack" type="button">← Назад к панели</button>'+
      '<div style="font-weight:700">₸ Финансы: чистая прибыль</div></div>'+
      '<iframe src="'+WORKER+'/profit?from='+r.from+'&to='+r.to+'" style="flex:1;border:0;width:100%"></iframe>';
    document.body.appendChild(ov);
    document.getElementById('finBack').onclick=function(){
      ov.remove();
      load(); // вернувшись, пересчитать плитки — настройки финансов могли измениться
    };
  };
  document.getElementById('pricingBtn').onclick=function(){
    tab='pricing'; render();
  };

  isDirector().then(function(admin){
    if(admin){
      fetch(WORKER+'/pricing-get').then(function(r){return r.json();}).then(function(j){
        if(j&&j.ok&&j.pricing){ var p=j.pricing; PRICING_EDIT={ mat:p.mat||{}, cmp:p.cmp||{}, coef:p.coef||{}, customMat:p.customMat||[], customCmp:p.customCmp||[], customOp:p.customOp||[],
          matOstBySec:p.matOstBySec||{}, matRahBySec:p.matRahBySec||{}, cmpOstBySec:p.cmpOstBySec||{}, cmpRahBySec:p.cmpRahBySec||{}, opOstBySec:p.opOstBySec||{}, opRahBySec:p.opRahBySec||{}, rates:p.rates||{} }; }
      }).catch(function(){}).then(load);
      return;
    }
    // не админ: проверяем право «Панель руководителя» (начальник цеха и т.п.)
    var wb=document.getElementById('workers'); if(wb) wb.style.display='none';
    var pb=document.getElementById('pricingBtn'); if(pb) pb.style.display='none';
    var fb=document.getElementById('financeBtn'); if(fb) fb.style.display='none';
    t.member('id').then(function(me){
      return fetch(WORKER+'/worker-perms?memberId='+encodeURIComponent((me&&me.id)||''))
        .then(function(r){return r.json();});
    }).then(function(j){
      if(j && j.canDashboard){ load(); }
      else boot('Панель доступна руководителю и сотрудникам с правом «Панель руководителя» (включается в «Зарплата / Работники»).');
    }).catch(function(){ boot('Панель доступна только руководителю (администратору доски).'); });
  });
</script>
</body>
</html>
