<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Заказать снабжение</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="./config.js"></script>
  <style>
    :root{ --bg:#1d2125; --bg2:#22272b; --line:#3a414a; --txt:#c7d1db; --muted:#9fadbc; --blue:#4f7cff; --green:#4bce97; --red:#f28b82; --amber:#e8c07d; }
    html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;font-size:14px}
    #app{max-width:640px;margin:0 auto;padding:16px 16px 70px}
    h2{margin:0 0 6px;font-size:18px}
    h3{margin:18px 0 8px;font-size:14px;color:#e6edf3}
    .muted{color:var(--muted);font-size:12.5px}
    input[type=text]{width:100%;box-sizing:border-box;background:var(--bg2);border:1px solid var(--line);border-radius:8px;color:var(--txt);padding:10px 12px;font-size:14px;margin-top:6px}
    label.f{display:flex;align-items:center;gap:8px;font-size:13px;margin-top:10px;cursor:pointer}
    .btn{background:#274469;border:1px solid var(--blue);border-radius:8px;color:#cfe1ff;padding:10px 18px;font-size:14px;font-weight:600;cursor:pointer;margin-top:14px}
    .btn:disabled{opacity:.5}
    .req{background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:10px 14px;margin-bottom:8px}
    .req .nm{font-weight:700}
    .req .sub{font-size:12px;color:var(--muted);margin-top:2px}
    .pill{display:inline-block;border-radius:10px;padding:2px 9px;font-size:11.5px;font-weight:700}
    .pill.new{background:#2b3a55;color:#a9c2ff}
    .pill.bought{background:#1c3329;color:var(--green)}
    .pill.given{background:#223;color:var(--muted)}
    .pill.rejected{background:#42221f;color:var(--red)}
    .pill.urgent{background:#42221f;color:var(--red)}
    #msg{font-size:13px;margin-left:10px}
    .bar{position:fixed;left:0;right:0;bottom:0;background:var(--bg);border-top:1px solid var(--line);padding:12px 16px;display:flex;justify-content:flex-end;z-index:50}
    .btn2{background:var(--bg2);border:1px solid var(--line);border-radius:8px;color:var(--txt);padding:8px 14px;font-size:13px;cursor:pointer}
  </style>
</head>
<body>
  <div id="app">
    <h2>Заказать снабжение</h2>
    <div class="muted">Что нужно купить для работы — заявка сразу попадёт к снабженцу.</div>
    <input type="text" id="fName" placeholder="Что нужно (например: диски отрезные 125мм)">
    <input type="text" id="fQty" placeholder="Сколько (например: 20 шт)">
    <input type="text" id="fComment" placeholder="Комментарий (для какого заказа, почему)">
    <input type="text" id="fLink" placeholder="Ссылка (пример товара в магазине, 2ГИС и т.п.)">
    <div style="margin-top:12px">
      <div class="muted" style="margin-bottom:6px">📷 Фото / PDF (чтобы снабженец сразу понял):</div>
      <button type="button" class="btn2" id="pCam" style="margin:0">📷 Камера</button>
      <button type="button" class="btn2" id="pGal" style="margin:0 0 0 6px">📁 Файл</button>
      <input type="file" id="pCamI" accept="image/*" capture="environment" style="display:none">
      <input type="file" id="pGalI" accept="image/*,application/pdf" multiple style="display:none">
      <div id="pList" class="muted" style="margin-top:6px"></div>
    </div>
    <label class="f"><input type="checkbox" id="fUrgent"> 🔥 Срочно — работа стоит</label>
    <button class="btn" id="send" type="button">Отправить заявку</button><span id="msg"></span>
    <h3>Мои заявки</h3>
    <div id="mine"><div class="muted">Загрузка…</div></div>
  </div>
  <div class="bar"><button class="btn2" id="close" type="button">Закрыть</button></div>
  <script>
    var t = window.TrelloPowerUp.iframe();
    function fileToB64(file){
      return new Promise(function(res,rej){
        var fr=new FileReader();
        fr.onload=function(){ res(String(fr.result).split(',')[1]); };
        fr.onerror=rej; fr.readAsDataURL(file);
      });
    }
    function compressImage(file){
      return new Promise(function(resolve,reject){
        var fr=new FileReader();
        fr.onload=function(){
          var img=new Image();
          img.onload=function(){
            var maxSide=1280, w=img.width, hgt=img.height;
            var k=Math.min(1, maxSide/Math.max(w,hgt));
            var cnv=document.createElement('canvas');
            cnv.width=Math.round(w*k); cnv.height=Math.round(hgt*k);
            cnv.getContext('2d').drawImage(img,0,0,cnv.width,cnv.height);
            resolve(cnv.toDataURL('image/jpeg',0.72).split(',')[1]);
          };
          img.onerror=reject;
          img.src=fr.result;
        };
        fr.onerror=reject;
        fr.readAsDataURL(file);
      });
    }
    // возвращает {b64, mime, filename} — фото жмём, PDF отправляем как есть
    function prepFile(file){
      if(file.type==='application/pdf'){
        if(file.size > 650000) return Promise.reject(new Error('PDF «'+file.name+'» слишком большой (макс ~650 КБ)'));
        return fileToB64(file).then(function(b64){ return { b64:b64, mime:'application/pdf', filename:file.name||'файл.pdf' }; });
      }
      return compressImage(file).then(function(b64){ return { b64:b64, mime:'image/jpeg', filename:file.name||'фото.jpg' }; });
    }
    var WORKER = (window.CONFIG && window.CONFIG.WORKER_URL) || window.WORKER_URL || '';
    var ME = { id:'', name:'' };
    var PFILES = [];
    function drawPend(){
      var el=document.getElementById('pList');
      el.innerHTML = PFILES.length
        ? PFILES.map(function(f,i){ return '<span style="margin-right:10px">'+(f.type==='application/pdf'?'📄':'📷')+' '+String(f.name||'файл').replace(/[<>&"]/g,'')+' <a href="#" data-rm="'+i+'" style="color:#f28b82;text-decoration:none">✕</a></span>'; }).join('')
        : '';
      [].forEach.call(el.querySelectorAll('[data-rm]'), function(a){
        a.onclick=function(ev){ ev.preventDefault(); PFILES.splice(+this.getAttribute('data-rm'),1); drawPend(); };
      });
    }
    (function(){
      var camI=document.getElementById('pCamI'), galI=document.getElementById('pGalI');
      document.getElementById('pCam').onclick=function(){ camI.click(); };
      document.getElementById('pGal').onclick=function(){ galI.click(); };
      function add(inp){ [].forEach.call(inp.files||[], function(f){ PFILES.push(f); }); inp.value=''; drawPend(); }
      camI.onchange=function(){ add(this); };
      galI.onchange=function(){ add(this); };
    })();
    var STATUS_LBL = { new:'ждёт', bought:'куплено', given:'выдано', rejected:'отклонена' };
    function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
    document.getElementById('close').onclick=function(){ t.closeModal(); };

    function loadMine(){
      return fetch(WORKER+'/supply-list?memberId='+encodeURIComponent(ME.id))
        .then(function(r){return r.json();})
        .then(function(j){
          var el=document.getElementById('mine');
          var list=(j&&j.ok&&j.requests)||[];
          if(!list.length){ el.innerHTML='<div class="muted">Заявок пока нет.</div>'; return; }
          var h='';
          list.forEach(function(r){
            h+='<div class="req" data-req="'+r.id+'"><div class="nm">'+esc(r.name)+(r.qty?(' · '+esc(r.qty)):'')+
               (r.urgent?' <span class="pill urgent">срочно</span>':'')+
               ' <span class="pill '+esc(r.status)+'">'+(STATUS_LBL[r.status]||r.status)+'</span>'+
               (r.status==='new'?' <button class="btn2" data-edit="'+r.id+'" type="button" style="padding:2px 8px;font-size:11px">✎</button>':'')+'</div>'+
               '<div class="sub">'+esc((r.createdAt||'').slice(0,10))+(r.comment?(' · '+esc(r.comment)):'')+(r.note?(' · ответ: '+esc(r.note)):'')+
               (r.link?(' · <a href="'+esc(r.link)+'" target="_blank" style="color:#8ab4ff">ссылка ↗</a>'):'')+
               ' <span class="rfiles" data-id="'+r.id+'"></span></div>'+
               '<div class="editReq" id="editReq_'+r.id+'" style="display:none"></div></div>';
          });
          el.innerHTML=h;
          [].forEach.call(el.querySelectorAll('[data-edit]'), function(b){
            b.onclick=function(){ toggleReqEdit(this.getAttribute('data-edit'), list); };
          });
          [].forEach.call(el.querySelectorAll('.rfiles'), function(sp){
            fetch(WORKER+'/receipts-list?kind=req&refId='+encodeURIComponent(sp.getAttribute('data-id')))
              .then(function(r){return r.json();}).then(function(j){
                var list=(j&&j.receipts)||[];
                sp.innerHTML=list.map(function(x){
                  var pdf=/\.pdf$/i.test(x.filename||'');
                  return '<a href="'+WORKER+'/receipt-get?id='+x.id+'" target="_blank" title="'+esc(x.filename)+'">'+(pdf?'📄':'📷')+'</a>';
                }).join(' ');
              }).catch(function(){});
          });
        }).catch(function(){ document.getElementById('mine').innerHTML='<div class="muted">Не удалось загрузить.</div>'; });
    }

    function toggleReqEdit(id, list){
      var box=document.getElementById('editReq_'+id);
      if(box.style.display==='none'){ box.style.display=''; drawReqEdit(id, list); }
      else box.style.display='none';
    }
    function drawReqEdit(id, list){
      var r=list.filter(function(x){return String(x.id)===String(id);})[0]; if(!r) return;
      var box=document.getElementById('editReq_'+id);
      var h='<label>Что нужно<br><input type="text" class="rName" value="'+esc(r.name)+'" style="width:200px"></label> ';
      h+='<label>Кол-во<br><input type="text" class="rQty" value="'+esc(r.qty||'')+'" style="width:100px"></label> ';
      h+='<label>Ссылка<br><input type="text" class="rLink" value="'+esc(r.link||'')+'" style="width:160px"></label> ';
      h+='<label style="display:inline-flex;align-items:center;gap:5px;margin-top:16px"><input type="checkbox" class="rUrgent"'+(r.urgent?' checked':'')+'> срочно</label> ';
      h+='<button class="btn2" data-savereq="'+id+'" type="button" style="margin-top:14px">Сохранить</button>';
      h+='<span class="rMsg" style="font-size:12px;margin-left:8px"></span>';
      box.innerHTML=h;
      box.querySelector('[data-savereq]').onclick=function(){ saveReqEdit(id); };
    }
    function saveReqEdit(id){
      var box=document.getElementById('editReq_'+id);
      var name=box.querySelector('.rName').value.trim();
      if(!name){ alert('Напишите, что нужно купить.'); return; }
      var msg=box.querySelector('.rMsg'); msg.textContent='Сохранение…'; msg.style.color='var(--muted)';
      fetch(WORKER+'/supply-request-update',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
        id:id, name:name, qty:box.querySelector('.rQty').value.trim(), link:box.querySelector('.rLink').value.trim(),
        urgent:box.querySelector('.rUrgent').checked
      })}).then(function(r){return r.json();}).then(function(j){
        if(!j||!j.ok) throw new Error((j&&j.error)||'не удалось сохранить');
        msg.textContent='Сохранено ✓'; msg.style.color='var(--green)';
        setTimeout(loadMine, 800);
      }).catch(function(e){ msg.textContent='Ошибка: '+(e&&e.message||e); msg.style.color='var(--red)'; });
    }

    document.getElementById('send').onclick=function(){
      var name=document.getElementById('fName').value.trim();
      if(!name){ alert('Напишите, что нужно купить.'); return; }
      var btn=this; btn.disabled=true;
      var msg=document.getElementById('msg'); msg.textContent='Отправка…'; msg.style.color='var(--muted)';
      var files=PFILES.slice();
      fetch(WORKER+'/supply-request',{ method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ name:name, qty:document.getElementById('fQty').value.trim(),
          comment:document.getElementById('fComment').value.trim(),
          link:document.getElementById('fLink').value.trim(),
          urgent:document.getElementById('fUrgent').checked?1:0,
          byMemberId:ME.id, byName:ME.name })
      }).then(function(r){return r.json();}).then(function(j){
        if(!j||!j.ok) throw new Error((j&&j.error)||'сервер не подтвердил');
        var reqId=j.id;
        // файлы — по одному, с прогрессом
        var chain=Promise.resolve();
        files.forEach(function(f,i){
          chain=chain.then(function(){
            msg.textContent='Файл '+(i+1)+' из '+files.length+'…'; msg.style.color='var(--muted)';
            return prepFile(f).then(function(p){
              return fetch(WORKER+'/receipt-save',{ method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({ kind:'req', refId:String(reqId), filename:p.filename, mime:p.mime, dataB64:p.b64 }) })
                .then(function(r){return r.json();})
                .then(function(jr){ if(!jr||!jr.ok) throw new Error((jr&&jr.error)||'файл не сохранился'); });
            });
          });
        });
        return chain;
      }).then(function(){
        msg.textContent='Отправлено ✓'; msg.style.color='var(--green)';
        document.getElementById('fName').value=''; document.getElementById('fQty').value='';
        document.getElementById('fComment').value=''; document.getElementById('fLink').value='';
        document.getElementById('fUrgent').checked=false;
        PFILES=[]; drawPend();
        btn.disabled=false;
        loadMine();
      }).catch(function(e){ msg.textContent='Ошибка: '+(e&&e.message||e); msg.style.color='var(--red)'; btn.disabled=false; });
    };

    t.member('id','fullName','username').then(function(m){
      ME.id=(m&&m.id)||''; ME.name=(m&&(m.fullName||m.username))||'';
      loadMine();
    }).catch(function(){ loadMine(); });
  </script>
</body>
</html>
