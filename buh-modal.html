<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Бухгалтерия</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="./config.js"></script>
  <style>
    :root{ --bg:#1d2125; --bg2:#22272b; --line:#3a414a; --txt:#c7d1db; --muted:#9fadbc; --blue:#4f7cff; --green:#4bce97; --red:#f28b82; --amber:#e8c07d; }
    html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;font-size:14px}
    #app{max-width:1100px;margin:0 auto;padding:16px 16px 70px}
    h2{margin:0 0 12px;font-size:18px}
    .muted{color:var(--muted);font-size:12.5px}
    .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
    .tab{background:var(--bg2);border:1px solid var(--line);border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer}
    .tab.active{border-color:var(--blue);color:#cfe1ff;background:#274469}
    .filters{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
    input[type=date],input[type=text]{background:var(--bg2);border:1px solid var(--line);border-radius:6px;color:var(--txt);padding:7px 9px;font-size:13px}
    input[type=text]{flex:1;min-width:180px}
    .btn{background:var(--bg2);border:1px solid var(--line);border-radius:8px;color:var(--txt);padding:7px 14px;font-size:13px;cursor:pointer}
    .btn:hover{border-color:var(--blue)}
    .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin:10px 0 14px}
    .kpi{background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:10px 12px}
    .kpi .k{font-size:11px;color:var(--muted);text-transform:uppercase}
    .kpi .v{font-size:16px;font-weight:800;margin-top:4px}
    .kpi.green .v{color:var(--green)} .kpi.red .v{color:var(--red)} .kpi.amber .v{color:var(--amber)}
    table{width:100%;border-collapse:collapse}
    th,td{padding:7px 8px;border-bottom:1px solid var(--line);text-align:left;font-size:13px;vertical-align:middle}
    th{color:var(--muted);font-size:11px;text-transform:uppercase;white-space:nowrap}
    td.num{text-align:right;white-space:nowrap}
    .chip{display:inline-block;border:1px solid var(--line);background:var(--bg2);color:var(--muted);border-radius:12px;padding:3px 10px;font-size:11.5px;font-weight:700;cursor:pointer;white-space:nowrap;user-select:none}
    .chip.on{background:#1c3329;color:var(--green);border-color:#2e5c44}
    .chip.busy{opacity:.5;pointer-events:none}
    .pdfmark{font-size:11px;color:var(--muted)}
    .rowclosed td{opacity:.55}
    .empty{color:var(--muted);padding:14px 4px}
    .bar{position:fixed;left:0;right:0;bottom:0;background:var(--bg);border-top:1px solid var(--line);padding:12px 16px;display:flex;justify-content:flex-end;z-index:50}
    label.f{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--muted);cursor:pointer}
  </style>
</head>
<body>
  <div id="app"><div class="empty" id="boot">Загрузка…</div></div>
  <div id="invOvlHost"></div>
  <div class="bar"><button class="btn" id="close" type="button">Закрыть</button></div>
  <script>
    var t = window.TrelloPowerUp.iframe();
    var WORKER = (window.CONFIG && window.CONFIG.WORKER_URL) || window.WORKER_URL || '';
    document.getElementById('close').onclick=function(){ t.closeModal(); };

    var now=new Date();
    function pad(n){ return n<10?'0'+n:''+n; }
    function fmtDate(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
    var RANGE={ from: fmtDate(new Date(now.getFullYear(), now.getMonth(), 1)), to: fmtDate(now), preset:'month' };
    var ROWS=[], TOTALS={}, FILTER='', ONLY_OPEN=false;
    var VIEW='orders'; // orders | invoices | payroll | repairs
    // просмотр счёта в поп-апе (iframe поверх бухгалтерии)
    function openInvView(qs){
      var h='<div style="position:fixed;inset:0;background:rgba(0,0,0,.62);z-index:70;display:flex;flex-direction:column">'+
        '<div style="background:var(--bg2,#22272b);border-bottom:1px solid var(--line,#3a414a);padding:8px 14px;display:flex;justify-content:space-between;align-items:center">'+
        '<b style="font-size:13px">Счёт на оплату</b><button class="btn" id="invOvlClose" type="button" style="padding:4px 12px">✕ Закрыть</button></div>'+
        '<iframe src="./invoice-view.html?'+qs+'&t='+Date.now()+'" style="flex:1;border:0;background:var(--bg,#1d2125)"></iframe></div>';
      document.getElementById('invOvlHost').innerHTML=h;
      document.getElementById('invOvlClose').onclick=closeInvView;
    }
    function closeInvView(){ document.getElementById('invOvlHost').innerHTML=''; }
    window.addEventListener('message', function(e){
      if(e && e.data && e.data.metalshopEmbedClose) closeInvView();
    });
    var INV_ROWS=[], INV_TOTALS={}, INV_SHARE=0.5;
    var REP_ROWS=[], REP_TOTALS={};
    var PAY=null, PAY_OPEN={};
    var INV_EDIT=null; // id счёта в режиме правки

    function money(v){ return Math.round(+v||0).toLocaleString('ru-RU'); }
    function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

    function isDirector(){
      return Promise.all([ t.member('id'), t.board('memberships'), t.organization('memberships').catch(function(){return null;}) ])
        .then(function(res){ var me=res[0]||{};
          function adminIn(o){ var ms=((o&&o.memberships)||[]).filter(function(x){return x.idMember===me.id;})[0]; return !!(ms&&ms.memberType==='admin'); }
          return adminIn(res[1])||adminIn(res[2]);
        }).catch(function(){ return false; });
    }
    var IS_ADMIN=false;
    function canUse(){
      return isDirector().then(function(admin){
        IS_ADMIN=admin;
        if(admin) return true;
        return t.member('id').then(function(me){
          return fetch(WORKER+'/worker-perms?memberId='+encodeURIComponent(me.id||''))
            .then(function(r){return r.json();}).then(function(j){ return !!(j&&j.canInvoice); })
            .catch(function(){ return false; });
        });
      });
    }

    function applyPreset(key){
      var n=new Date(), s;
      if(key==='month') s=new Date(n.getFullYear(), n.getMonth(), 1);
      else if(key==='quarter') s=new Date(n.getFullYear(), Math.floor(n.getMonth()/3)*3, 1);
      else if(key==='year') s=new Date(n.getFullYear(), 0, 1);
      else s=new Date(2020,0,1);
      RANGE.from=fmtDate(s); RANGE.to=fmtDate(n); RANGE.preset=key;
      load();
    }

    function load(){
      if(VIEW==='invoices') return loadInvoices();
      if(VIEW==='payroll') return loadPayroll();
      if(VIEW==='repairs') return loadRepairs();
      var b=document.getElementById('boot'); if(b) b.textContent='Загружаю заказы…';
      fetch(WORKER+'/acct-list?from='+RANGE.from+'&to='+RANGE.to)
        .then(function(r){return r.json();})
        .then(function(j){
          if(!j||!j.ok) throw new Error((j&&j.error)||'сервер не ответил');
          ROWS=j.rows||[]; TOTALS=j.totals||{};
          render();
        })
        .catch(function(e){ document.getElementById('app').innerHTML='<div class="empty">Ошибка: '+esc(e&&e.message||e)+'</div>'; });
    }

    function loadPayroll(){
      var b=document.getElementById('boot'); if(b) b.textContent='Считаю зарплаты…';
      var app=document.getElementById('app');
      app.innerHTML='<div class="empty">Считаю зарплаты за период… (собираю заработки по заказам, может занять до минуты)</div>';
      fetch(WORKER+'/payroll-summary?from='+RANGE.from+'&to='+RANGE.to)
        .then(function(r){return r.json();})
        .then(function(j){
          if(!j||!j.ok) throw new Error((j&&j.error)||'сервер не ответил');
          PAY=j; render();
        })
        .catch(function(e){ app.innerHTML='<div class="empty">Ошибка: '+esc(e&&e.message||e)+'</div>'; });
    }

    function loadInvoices(){
      var b=document.getElementById('boot'); if(b) b.textContent='Загружаю счета…';
      fetch(WORKER+'/invoice-payments-list?from='+RANGE.from+'&to='+RANGE.to)
        .then(function(r){return r.json();})
        .then(function(j){
          if(!j||!j.ok) throw new Error((j&&j.error)||'сервер не ответил');
          INV_ROWS=j.rows||[]; INV_TOTALS=j.totals||{}; INV_SHARE=j.minShare||0.5;
          render();
        })
        .catch(function(e){ document.getElementById('app').innerHTML='<div class="empty">Ошибка: '+esc(e&&e.message||e)+'</div>'; });
    }

    function loadRepairs(){
      var b=document.getElementById('boot'); if(b) b.textContent='Загружаю ремонты…';
      fetch(WORKER+'/repair-acct-list?from='+RANGE.from+'&to='+RANGE.to)
        .then(function(r){return r.json();})
        .then(function(j){
          if(!j||!j.ok) throw new Error((j&&j.error)||'сервер не ответил');
          REP_ROWS=j.rows||[]; REP_TOTALS=j.totals||{};
          render();
        })
        .catch(function(e){ document.getElementById('app').innerHTML='<div class="empty">Ошибка: '+esc(e&&e.message||e)+'</div>'; });
    }

    function chip(r, field, label){
      var on=r[field];
      return '<span class="chip'+(on?' on':'')+'" data-card="'+esc(r.cardId)+'" data-f="'+field+'">'+(on?'✓ ':'')+label+'</span>';
    }

    function visibleRows(){
      var f=FILTER.toLowerCase();
      return ROWS.filter(function(r){
        if(ONLY_OPEN && r.invoiceSent && r.paid && r.delivered && r.actSigned) return false;
        if(!f) return true;
        return (r.number+' '+r.name+' '+r.client).toLowerCase().indexOf(f)>=0;
      });
    }

    function render(){
      var app=document.getElementById('app');
      var h='<h2>Бухгалтерия <span class="muted" style="font-weight:400">· '+RANGE.from+' — '+RANGE.to+'</span></h2>';
      h+='<div class="tabs" style="margin-bottom:6px">'+
         '<div class="tab'+(VIEW==='orders'?' active':'')+'" data-view="orders">Заказы</div>'+
         '<div class="tab'+(VIEW==='invoices'?' active':'')+'" data-view="invoices">Счета на оплату</div>'+
         '<div class="tab'+(VIEW==='payroll'?' active':'')+'" data-view="payroll">Зарплаты</div>'+
         '<div class="tab'+(VIEW==='repairs'?' active':'')+'" data-view="repairs">Ремонт</div>'+
         '</div>';
      h+='<div class="tabs">';
      [['month','Месяц'],['quarter','Квартал'],['year','Год'],['all','Всё время']].forEach(function(p){
        h+='<div class="tab'+(RANGE.preset===p[0]?' active':'')+'" data-preset="'+p[0]+'">'+p[1]+'</div>';
      });
      h+='</div>';
      h+='<div class="filters">'+
         '<input type="date" id="fromD" value="'+RANGE.from+'"><span class="muted">—</span>'+
         '<input type="date" id="toD" value="'+RANGE.to+'">'+
         '<button class="btn" id="applyR" type="button">Применить</button>'+
         '<input type="text" id="q" placeholder="Поиск: №, заказ, клиент…" value="'+esc(FILTER)+'">'+
         '<label class="f"><input type="checkbox" id="onlyOpen"'+(ONLY_OPEN?' checked':'')+'> только незакрытые</label>'+
         '</div>';
      if(VIEW==='invoices'){
        h+=renderInvoicesBody();
        app.innerHTML=h;
        bindCommon();
        return;
      }
      if(VIEW==='payroll'){
        h+=renderPayrollBody();
        app.innerHTML=h;
        bindCommon();
        return;
      }
      if(VIEW==='repairs'){
        h+=renderRepairsBody();
        app.innerHTML=h;
        bindCommon();
        return;
      }
      var T=TOTALS;
      h+='<div class="kpis">';
      h+='<div class="kpi"><div class="k">Заказов</div><div class="v">'+(T.orders||0)+'</div></div>';
      h+='<div class="kpi"><div class="k">На сумму</div><div class="v">'+money(T.revenue)+' ₸</div></div>';
      h+='<div class="kpi green"><div class="k">Оплачено</div><div class="v">'+money(T.paidRev)+' ₸</div></div>';
      h+='<div class="kpi red"><div class="k">Не оплачено</div><div class="v">'+money(T.unpaidRev)+' ₸</div></div>';
      h+='<div class="kpi amber"><div class="k">Полностью закрыто</div><div class="v">'+(T.closed||0)+' из '+(T.orders||0)+'</div></div>';
      h+='</div>';
      var rows=visibleRows();
      if(!rows.length){ h+='<div class="empty">Нет заказов по выбранным условиям.</div>'; }
      else{
        h+='<table><thead><tr><th>№</th><th>Заказ</th><th>Клиент</th><th class="num">Сумма</th><th>Счёт</th><th>Оплата</th><th>Сдали</th><th>Акт</th><th>Дата</th>'+(IS_ADMIN?'<th></th>':'')+'</tr></thead><tbody>';
        rows.forEach(function(r){
          var closed=r.invoiceSent&&r.paid&&r.delivered&&r.actSigned;
          h+='<tr'+(closed?' class="rowclosed"':'')+'><td><a href="#" class="onum" data-card="'+esc(r.cardId)+'" title="Показать счёт по этому заказу" style="color:#579dff;text-decoration:none">'+esc(r.number)+'</a></td>'+
             '<td>'+esc(r.name)+(r.hasInvoicePdf?' <span class="pdfmark" title="PDF-счёт сформирован в системе">· PDF</span>':'')+'</td>'+
             '<td>'+esc(r.client)+'</td><td class="num">'+money(r.total)+' ₸</td>'+
             '<td>'+chip(r,'invoiceSent','выслан')+'</td>'+
             '<td>'+chip(r,'paid','оплачен')+'</td>'+
             '<td>'+chip(r,'delivered','сдали')+'</td>'+
             '<td>'+chip(r,'actSigned','акт')+'</td>'+
             '<td class="muted">'+esc(r.date)+'</td>'+
             (IS_ADMIN?('<td><button class="btn ohide" data-card="'+esc(r.cardId)+'" type="button" title="Скрыть тестовый заказ из бухгалтерии и аналитики (расчёт останется в базе)" style="padding:2px 8px;font-size:11px">🗄</button></td>'):'')+
             '</tr>';
        });
        h+='</tbody></table>';
      }
      app.innerHTML=h;
      bindCommon();
    }
    function _bindChipsBody(){
      [].forEach.call(document.querySelectorAll('.onum'), function(el){
        el.addEventListener('click', function(e){ e.preventDefault(); openInvView('cardId='+encodeURIComponent(this.getAttribute('data-card'))); });
      });
      [].forEach.call(document.querySelectorAll('.chip'), function(c){
        c.onclick=function(){
          var cardId=this.getAttribute('data-card'), field=this.getAttribute('data-f');
          var r=ROWS.filter(function(x){return x.cardId===cardId;})[0]; if(!r) return;
          var newVal=!r[field]; var el=this; el.classList.add('busy');
          var p = (field==='paid')
            ? fetch(WORKER+'/calc-paid',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cardId:cardId,paid:newVal})})
            : fetch(WORKER+'/acct-set',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cardId:cardId,field:field,value:newVal?1:0})});
          p.then(function(x){return x.json();}).then(function(j){
            if(!j||!j.ok) throw new Error((j&&j.error)||'сервер не подтвердил');
            r[field]=newVal;
            if(field==='paid'){ r.paidAt=newVal?new Date().toISOString():null; }
            // пересчитать итоги локально
            var T={orders:0,revenue:0,paidRev:0,unpaidRev:0,closed:0};
            ROWS.forEach(function(x){ T.orders++; T.revenue+=x.total; if(x.paid)T.paidRev+=x.total; else T.unpaidRev+=x.total;
              if(x.invoiceSent&&x.paid&&x.delivered&&x.actSigned)T.closed++; });
            TOTALS=T; render();
          }).catch(function(e){ alert('Не удалось сохранить: '+(e&&e.message||e)); el.classList.remove('busy'); });
        };
      });
    }

    function renderPayrollBody(){
      if(!PAY) return '<div class="empty">Загрузка…</div>';
      var T=PAY.totals||{};
      var h='<div class="kpis">'+
        '<div class="kpi"><div class="k">Сдельная за период</div><div class="v">'+money(T.piece)+' ₸</div></div>'+
        '<div class="kpi"><div class="k">Окладникам начислено</div><div class="v">'+money(T.salaried)+' ₸</div></div>'+
        '<div class="kpi green"><div class="k">Итого ФОТ</div><div class="v">'+money(T.all)+' ₸</div></div>'+
        '<div class="kpi"><div class="k">Рабочих дней (Пн–Пт)</div><div class="v">'+(PAY.workdays||0)+'</div></div>'+
        '</div>';
      var f=FILTER.toLowerCase();
      // --- сдельщики ---
      var ps=(PAY.piece||[]).filter(function(p){ return !f || p.name.toLowerCase().indexOf(f)>=0; });
      h+='<h3 style="margin:14px 0 6px">Сдельная зарплата</h3>';
      if(!ps.length) h+='<div class="empty">Нет сдельных заработков за период.</div>';
      else {
        h+='<table><thead><tr><th></th><th>Работник</th><th class="num">Заработал</th><th class="num">Заказов</th></tr></thead><tbody>';
        ps.forEach(function(p){
          var open=!!PAY_OPEN[p.id];
          h+='<tr class="prow" data-w="'+esc(p.id)+'" style="cursor:pointer">'+
             '<td style="width:24px;color:#579dff">'+(p.ordersCount?(open?'▾':'▸'):'')+'</td>'+
             '<td>'+esc(p.name)+(p.agentBonus?' <span style="display:inline-block;background:#1c3329;color:var(--green);border-radius:10px;padding:1px 8px;font-size:11px;font-weight:700" title="Бонус агента за оформленные заявки на ремонт: '+p.agentBonus.count+' шт × '+p.agentBonus.perItem+' ₸">агент +'+money(p.agentBonus.total)+' ₸</span>':'')+'</td>'+
             '<td class="num"><b>'+money(p.earned)+' ₸</b></td>'+
             '<td class="num">'+p.ordersCount+'</td></tr>';
          if(open && p.orders && p.orders.length){
            p.orders.forEach(function(o){
              h+='<tr class="osub"><td></td>'+
                 '<td class="muted" style="padding-left:18px">'+(o.number?('№'+esc(o.number)+' · '):'')+esc(o.name)+
                 (o.stages&&o.stages.length?(' <span style="font-size:11px;color:#7a8794">('+esc(o.stages.join(', '))+')</span>'):'')+'</td>'+
                 '<td class="num">'+money(o.earned)+' ₸</td><td></td></tr>';
            });
          }
        });
        h+='</tbody></table>';
      }
      // --- правила оплаты статусов табеля ---
      var AP=(PAY.attPay)||{p:100,n:0,b:0,o:0,v:0};
      h+='<h3 style="margin:18px 0 6px">Правила оплаты статусов табеля <span class="muted" style="font-weight:400;font-size:12px">— сколько % дневной ставки начисляется за день</span></h3>';
      h+='<div class="row" style="display:flex;gap:14px;flex-wrap:wrap;align-items:center;margin-bottom:8px">'+
         '<label>Я явка <input class="ap" data-k="p" value="'+AP.p+'" style="width:56px;text-align:right"> %</label>'+
         '<label>Б больничный <input class="ap" data-k="b" value="'+AP.b+'" style="width:56px;text-align:right"> %</label>'+
         '<label>О отпуск <input class="ap" data-k="o" value="'+AP.o+'" style="width:56px;text-align:right"> %</label>'+
         '<label>Н неявка <input class="ap" data-k="n" value="'+AP.n+'" style="width:56px;text-align:right"> %</label>'+
         '<label>В выходной <input class="ap" data-k="v" value="'+AP.v+'" style="width:56px;text-align:right"> %</label>'+
         '<button class="btn" id="apSave" type="button">Сохранить правила</button><span id="apMsg" class="muted"></span></div>';
      // --- окладники ---
      var ss=(PAY.salaried||[]).filter(function(p){ return !f || p.name.toLowerCase().indexOf(f)>=0; });
      h+='<h3 style="margin:14px 0 6px">Фиксированная зарплата (по табелю)</h3>';
      if(!ss.length) h+='<div class="empty">Нет окладников. Чип «Окладник» ставится в «Зарплата / Работники».</div>';
      else {
        h+='<div class="muted" style="margin-bottom:6px">Начислено = оклад ÷ рабочие дни периода ('+(PAY.workdays||0)+') × оплачиваемые дни. Оплачиваемые дни = Σ(дни статуса × его %). Выход в выходной с отметкой «Я» оплачивается сверх нормы.</div>';
        h+='<table><thead><tr><th>Работник</th><th class="num">Оклад/мес</th><th class="num">Явок</th><th class="num">Б/О/Н/В</th><th class="num">Оплач. дней</th><th class="num">Начислено</th></tr></thead><tbody>';
        ss.forEach(function(p){
          h+='<tr><td>'+esc(p.name)+(p.noTimesheet?' <span style="font-size:11px;color:#e8c07d" title="В табеле за период нет ни одной отметки — начисление нулевое">⚠ табель пуст</span>':'')+'</td>'+
             '<td class="num">'+money(p.salary)+' ₸</td>'+
             '<td class="num"><b>'+p.present+'</b> / '+p.workdays+'</td>'+
             '<td class="num muted">'+p.sick+' / '+p.vacation+' / '+p.absent+' / '+(p.dayoff||0)+'</td>'+
             '<td class="num">'+(p.payDays!=null?p.payDays:p.present)+'</td>'+
             '<td class="num"><b>'+money(p.accrued)+' ₸</b></td></tr>';
        });
        h+='</tbody></table>';
      }
      return h;
    }

    function rchip(r, field, label){
      var on=r[field];
      return '<span class="chip rchip'+(on?' on':'')+'" data-id="'+r.id+'" data-f="'+field+'">'+(on?'✓ ':'')+label+'</span>';
    }

    function renderRepairsBody(){
      var T=REP_TOTALS||{};
      var h='<div class="kpis">';
      h+='<div class="kpi"><div class="k">Ремонтов</div><div class="v">'+(T.orders||0)+'</div></div>';
      h+='<div class="kpi"><div class="k">На сумму</div><div class="v">'+money(T.revenue)+' ₸</div></div>';
      h+='<div class="kpi green"><div class="k">Оплачено</div><div class="v">'+money(T.paidRev)+' ₸</div></div>';
      h+='<div class="kpi red"><div class="k">Не оплачено</div><div class="v">'+money(T.unpaidRev)+' ₸</div></div>';
      h+='<div class="kpi amber"><div class="k">Полностью закрыто</div><div class="v">'+(T.closed||0)+' из '+(T.orders||0)+'</div></div>';
      h+='</div>';
      h+='<div class="muted" style="margin:-6px 0 10px">Заявки на ремонт с их статусами — вместо колонки «Внесен в гугл» на доске «Ремонт». Цену клиенту задаёт руководитель в разделе «Ремонт» панели руководителя.</div>';
      var f=FILTER.toLowerCase();
      var rows=(REP_ROWS||[]).filter(function(r){
        if(ONLY_OPEN && r.invoiceSent && r.paid && r.delivered && r.actSigned) return false;
        if(!f) return true;
        return (r.number+' '+r.title+' '+(r.client||'')+' '+(r.category||'')).toLowerCase().indexOf(f)>=0;
      });
      if(!rows.length) return h+'<div class="empty">Нет заявок на ремонт по выбранным условиям.</div>';
      h+='<table><thead><tr><th>№</th><th>Заявка</th><th>Клиент</th><th class="num">Сумма</th><th>Счёт</th><th>Оплата</th><th>Сдали</th><th>Акт</th><th>Дата</th></tr></thead><tbody>';
      rows.forEach(function(r){
        var closed=r.invoiceSent&&r.paid&&r.delivered&&r.actSigned;
        var titleCell=esc(r.title)
          +(r.hasInvoicePdf?' <span class="pdfmark" title="PDF-счёт сформирован в системе">· PDF</span>':'')
          +(r.urgent?' <span title="срочная" style="font-size:11px">🔥</span>':'')
          +(r.category?' <span class="muted" style="font-size:11px">· '+esc(r.category)+'</span>':'')
          +(r.status==='new'?' <span style="font-size:11px;color:var(--amber)" title="Работа ещё не отмечена выполненной">· в работе</span>':'')
          +(r.status==='sent'?' <span style="font-size:11px;color:#8ab4ff" title="Изделие отправлено/возвращено клиенту">· отправлен</span>':'')
          +(r.status==='rejected'?' <span style="font-size:11px;color:var(--red)">· отклонена</span>':'');
        h+='<tr'+(closed?' class="rowclosed"':'')+'><td>'+esc(r.number)+'</td>'+
           '<td>'+titleCell+'</td>'+
           '<td>'+esc(r.client)+'</td>'+
           '<td class="num">'+(r.priced?money(r.total)+' ₸':'<span class="muted" title="Цена клиенту ещё не задана в разделе «Ремонт» панели руководителя">—</span>')+'</td>'+
           '<td>'+rchip(r,'invoiceSent','выслан')+'</td>'+
           '<td>'+rchip(r,'paid','оплачен')+'</td>'+
           '<td>'+rchip(r,'delivered','сдали')+'</td>'+
           '<td>'+rchip(r,'actSigned','акт')+'</td>'+
           '<td class="muted">'+esc(r.date)+'</td></tr>';
      });
      h+='</tbody></table>';
      return h;
    }

    function _bindRepairChips(){
      [].forEach.call(document.querySelectorAll('.rchip'), function(c){
        c.onclick=function(){
          var id=+this.getAttribute('data-id'), field=this.getAttribute('data-f');
          var r=REP_ROWS.filter(function(x){return x.id===id;})[0]; if(!r) return;
          var newVal=!r[field]; var el=this; el.classList.add('busy');
          if(field==='invoiceSent' && newVal && !r.priced){
            if(!confirm('У заявки '+r.number+' ещё не задана цена клиенту. Отметить счёт высланным всё равно?')){ el.classList.remove('busy'); return; }
          }
          fetch(WORKER+'/repair-flags',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:id,field:field,value:newVal?1:0})})
            .then(function(x){return x.json();}).then(function(j){
              if(!j||!j.ok) throw new Error((j&&j.error)||'сервер не подтвердил');
              r[field]=newVal;
              if(field==='paid'){ r.paidAt=newVal?new Date().toISOString():null; }
              var T={orders:0,revenue:0,paidRev:0,unpaidRev:0,closed:0};
              REP_ROWS.forEach(function(x){ T.orders++; T.revenue+=x.total; if(x.paid)T.paidRev+=x.total; else T.unpaidRev+=x.total;
                if(x.invoiceSent&&x.paid&&x.delivered&&x.actSigned)T.closed++; });
              REP_TOTALS=T; render();
            }).catch(function(e){ alert('Не удалось сохранить: '+(e&&e.message||e)); el.classList.remove('busy'); });
        };
      });
    }

    function invStatusLabel(r){
      if(r.status==='full') return ['оплачен полностью','var(--green)'];
      if(r.status==='launched') return ['аванс '+(r.pct!=null?r.pct+'%':'')+' — в производстве','#579dff'];
      if(r.status==='partial') return ['частично '+(r.pct!=null?r.pct+'%':''),'var(--amber)'];
      return ['не оплачен','var(--muted)'];
    }
    function renderInvoicesBody(){
      var T=INV_TOTALS||{};
      var h='<div class="kpis">';
      h+='<div class="kpi"><div class="k">Счетов</div><div class="v">'+(T.count||0)+'</div></div>';
      h+='<div class="kpi"><div class="k">Выставлено</div><div class="v">'+money(T.total)+' ₸</div></div>';
      h+='<div class="kpi green"><div class="k">Поступило</div><div class="v">'+money(T.received)+' ₸</div></div>';
      h+='<div class="kpi"><div class="k">Не оплачено</div><div class="v">'+(T.unpaid||0)+'</div></div>';
      h+='<div class="kpi amber"><div class="k">Частично</div><div class="v">'+(T.partial||0)+'</div></div>';
      h+='<div class="kpi"><div class="k">Аванс, в работе</div><div class="v" style="color:#579dff">'+(T.launched||0)+'</div></div>';
      h+='<div class="kpi green"><div class="k">Оплачено</div><div class="v">'+(T.full||0)+'</div></div>';
      h+='</div>';
      h+='<div class="muted" style="margin:-6px 0 10px">Поступления подтягиваются из выписки БЦК автоматически. Порог запуска в производство: '+Math.round((INV_SHARE||0.5)*100)+'% суммы счёта. Статусы счетов не зависят от галочек по заказам.</div>';
      var f=FILTER.toLowerCase();
      var rows=(INV_ROWS||[]).filter(function(r){
        if(!f) return true;
        return (String(r.number)+' '+(r.buyer||'')).toLowerCase().indexOf(f)>=0;
      });
      if(!rows.length) return h+'<div class="empty">Счетов не найдено. Счета появляются после формирования через журнал счетов.</div>';
      h+='<table><thead><tr><th>Счёт</th><th>Дата</th><th>Покупатель</th><th class="num">Заказов</th><th class="num">Сумма</th><th class="num">Поступило</th><th class="num">%</th><th>Статус</th><th>Последний платёж</th>'+(IS_ADMIN?'<th></th>':'')+'</tr></thead><tbody>';
      rows.forEach(function(r){
        var st=invStatusLabel(r);
        if(INV_EDIT===r.id){
          h+='<tr style="background:#22272b">'+
             '<td><input class="ie-num" value="'+esc(r.number)+'" style="width:64px"></td>'+
             '<td><input type="date" class="ie-date" value="'+esc(r.dateIso||'')+'" style="width:135px"></td>'+
             '<td><input class="ie-buyer" value="'+esc(r.buyer)+'" style="width:100%;min-width:140px"></td>'+
             '<td class="num">'+(r.cards||0)+'</td>'+
             '<td><input class="ie-total" value="'+(r.total||0)+'" style="width:100px;text-align:right"></td>'+
             '<td class="num">'+money(r.received)+' ₸</td>'+
             '<td class="num">'+(r.pct!=null?r.pct+'%':'—')+'</td>'+
             '<td colspan="2"><button class="btn iesave" data-id="'+r.id+'" type="button" style="color:#4bce97;border-color:#2e5c44">Сохранить</button> '+
             '<button class="btn iecancel" type="button">Отмена</button>'+
             '<div class="muted" style="font-size:11px;margin-top:4px">Номер и сумма влияют на автопривязку оплат из банка'+(r.received>0?'; по счёту уже есть поступления — правьте осознанно':'')+'.</div></td>'+
             (IS_ADMIN?'<td></td>':'')+
             '</tr>';
          return;
        }
        h+='<tr><td><a href="#" class="invnum" data-num="'+esc(r.number)+'" title="Показать счёт" style="color:#579dff;text-decoration:none"><b>№'+esc(r.number)+'</b></a>'+
           (r.sentAt?('<div style="font-size:10.5px;color:var(--green);white-space:nowrap" title="Счёт отправлен клиенту'+(r.sentTo?(' на '+esc(r.sentTo)):'')+'">📤 выслан '+esc((r.sentAt||'').slice(0,10))+'</div>'):
                     ('<div style="font-size:10.5px;color:var(--muted)">не выслан</div>'))+
           '</td><td>'+esc(r.date)+'</td><td>'+esc(r.buyer)+'</td>'+
           '<td class="num">'+(r.cards||0)+(r.repairs?' <span style="color:#c9a8ff" title="ремонтных заявок в счёте">+'+r.repairs+'Р</span>':'')+'</td>'+
           '<td class="num">'+money(r.total)+' ₸</td>'+
           '<td class="num">'+money(r.received)+' ₸</td>'+
           '<td class="num">'+(r.pct!=null?r.pct+'%':'—')+'</td>'+
           '<td style="color:'+st[1]+'">'+esc(st[0])+'</td>'+
           '<td class="muted">'+esc(r.lastPayment||'')+
           ' <button class="btn iedit" data-id="'+r.id+'" type="button" title="Исправить счёт: номер, дата, покупатель, сумма" style="padding:2px 8px;font-size:11px">✎</button></td>'+
           (IS_ADMIN?('<td><button class="btn idel" data-id="'+r.id+'" data-num="'+esc(r.number)+'" type="button" title="Удалить тестовый счёт из журнала безвозвратно" style="padding:2px 8px;font-size:11px;color:#e9b3b3;border-color:#5a3a3a">✕</button></td>'):'')+
           '</tr>';
      });
      h+='</tbody></table>';
      return h;
    }

    function bindCommon(){
      [].forEach.call(document.querySelectorAll('[data-view]'), function(el){ el.onclick=function(){ var v=this.getAttribute('data-view'); if(v!==VIEW){ VIEW=v; load(); } }; });
      [].forEach.call(document.querySelectorAll('[data-preset]'), function(el){ el.onclick=function(){ applyPreset(this.getAttribute('data-preset')); }; });
      var ap=document.getElementById('applyR');
      if(ap) ap.onclick=function(){
        var f=document.getElementById('fromD').value, t2=document.getElementById('toD').value;
        if(!f||!t2) return; if(f>t2){ var tmp=f; f=t2; t2=tmp; }
        RANGE.from=f; RANGE.to=t2; RANGE.preset='custom'; load();
      };
      var q=document.getElementById('q');
      if(q) q.oninput=function(){ FILTER=this.value; render(); var el=document.getElementById('q'); el.focus(); var v=el.value; el.value=''; el.value=v; };
      var oo=document.getElementById('onlyOpen');
      if(oo) oo.onchange=function(){ ONLY_OPEN=this.checked; render(); };
      var apBtn=document.getElementById('apSave');
      if(apBtn) apBtn.onclick=function(){
        var coef={};
        [].forEach.call(document.querySelectorAll('.ap'), function(i){ coef[i.getAttribute('data-k')]=+String(i.value).replace(',','.')||0; });
        var btn=this, msg=document.getElementById('apMsg');
        btn.disabled=true; btn.textContent='Сохраняю…';
        fetch(WORKER+'/att-pay-save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({coef:coef})})
          .then(function(r){return r.json();})
          .then(function(j){ if(!j||!j.ok) throw new Error((j&&j.error)||'?');
            btn.textContent='✓ Сохранено'; btn.style.color='#4bce97'; btn.style.borderColor='#2e5c44';
            msg.textContent='Начисления пересчитываются…';
            setTimeout(function(){ loadPayroll(); }, 600);
          })
          .catch(function(e){ btn.disabled=false; btn.textContent='Сохранить правила'; alert('Не сохранилось: '+(e&&e.message||e)); });
      };
      [].forEach.call(document.querySelectorAll('.iedit'), function(b){
        b.onclick=function(){ INV_EDIT=+this.getAttribute('data-id'); render(); };
      });
      [].forEach.call(document.querySelectorAll('.iecancel'), function(b){
        b.onclick=function(){ INV_EDIT=null; render(); };
      });
      [].forEach.call(document.querySelectorAll('.iesave'), function(b){
        b.onclick=function(){
          var id=+this.getAttribute('data-id'); var btn=this;
          var num=document.querySelector('.ie-num').value.trim();
          var dateIso=document.querySelector('.ie-date').value;
          var buyer=document.querySelector('.ie-buyer').value.trim();
          var total=+String(document.querySelector('.ie-total').value).replace(/[^\d.]/g,'');
          if(!num){ alert('Номер счёта не может быть пустым.'); return; }
          if(!(total>=0)){ alert('Сумма должна быть числом.'); return; }
          btn.disabled=true; btn.textContent='Сохраняю…';
          fetch(WORKER+'/invoice-update',{method:'POST',headers:{'Content-Type':'application/json'},
            body:JSON.stringify({id:id,number:num,dateIso:dateIso,buyer:buyer,total:total})})
            .then(function(r){return r.json();})
            .then(function(j){ if(!j||!j.ok) throw new Error((j&&j.error)||'сервер не подтвердил'); INV_EDIT=null; loadInvoices(); })
            .catch(function(e){ btn.disabled=false; btn.textContent='Сохранить'; alert('Не сохранилось: '+(e&&e.message||e)); });
        };
      });
      [].forEach.call(document.querySelectorAll('.prow'), function(row){
        row.onclick=function(){ var w=this.getAttribute('data-w'); PAY_OPEN[w]=!PAY_OPEN[w]; render(); };
      });
      [].forEach.call(document.querySelectorAll('.ohide'), function(b){
        b.onclick=function(){ var cardId=this.getAttribute('data-card');
          if(!confirm('Скрыть этот заказ из бухгалтерии, панели руководителя и финансов? Расчёт останется в базе; вернуть можно будет через Claude.')) return;
          fetch(WORKER+'/calc-hide',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cardId:cardId,hidden:1})})
            .then(function(r){return r.json();}).then(function(j){ if(!j.ok) throw new Error(j.error||'?'); load(); })
            .catch(function(e){ alert('Не удалось: '+(e&&e.message||e)); });
        };
      });
      [].forEach.call(document.querySelectorAll('.invnum'), function(el){
        el.addEventListener('click', function(e){ e.preventDefault(); openInvView('number='+encodeURIComponent(this.getAttribute('data-num'))); });
      });
      [].forEach.call(document.querySelectorAll('.idel'), function(b){
        b.onclick=function(){ var id=+this.getAttribute('data-id'); var num=this.getAttribute('data-num');
          if(!confirm('УДАЛИТЬ счёт №'+num+' из журнала безвозвратно? Автопривязка банковских платежей к этому номеру перестанет работать. Для тестовых счетов — то, что нужно.')) return;
          fetch(WORKER+'/invoice-delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:id})})
            .then(function(r){return r.json();}).then(function(j){ if(!j.ok) throw new Error(j.error||'?'); load(); })
            .catch(function(e){ alert('Не удалось: '+(e&&e.message||e)); });
        };
      });
      bindChips();
    }

    function bindChips(){
      _bindChipsBody();
      _bindRepairChips();
    }

        canUse().then(function(allowed){
      if(!allowed){
        document.getElementById('boot').textContent='Раздел доступен руководителю и сотрудникам с правом «выставлять счета» (включается в «Зарплата / Работники»).';
        return;
      }
      load();
    }).catch(function(e){
      document.getElementById('boot').textContent='Ошибка: '+(e&&e.message||e);
    });
  </script>
</body>
</html>
