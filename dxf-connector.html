<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>DXF / Раскрой - Connector</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
  <script>
    // Shows a section on the card listing the card's .dxf files with a
    // "Расчёт" button. This does NOT claim the files, so they stay as normal
    // Trello attachments with their usual download / edit / delete menu.
    window.TrelloPowerUp.initialize({
      'card-back-section': function (t, options) {
        return {
          title: 'DXF / Раскрой',
          icon: t.signUrl('./dxf-icon.svg'),
          content: {
            type: 'iframe',
            url: t.signUrl('./dxf-section.html'),
            height: 120
          }
        };
      }
    });
  </script>
</body>
</html>
