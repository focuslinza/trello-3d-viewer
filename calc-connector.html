<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Калькулятор стоимости - Connector</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="./config.js"></script>
</head>
<body>
  <script>
    // Adds a "Калькулятор стоимости" section to the card back with a button
    // that opens the full calculator modal. Stores results on the card and
    // logs every order to the central D1 database via the Worker.
    window.TrelloPowerUp.initialize({
      'card-detail-badges': function (t, options) {
        // фишка «QR-этикетка» в одном ряду и стиле с «Метки» и «Card Number»
        return [{
          title: 'Этикетка',
          text: '▦ QR / печать',
          color: null,
          callback: function (t) {
            return Promise.all([ t.card('id'), t.board('id') ]).then(function (r) {
              var c = r[0], b = r[1];
              return t.modal({
                url: './label-modal.html?t=' + Date.now(),
                fullscreen: true,
                title: 'Этикетка со штрих-кодом',
                args: { cardId: (c && c.id) || '', boardId: (b && b.id) || '' }
              });
            });
          }
        }];
      },
      'card-back-section': function (t, options) {
        return {
          title: 'Калькулятор стоимости',
          icon: t.signUrl('./calc-icon.svg'),
          content: {
            type: 'iframe',
            url: t.signUrl('./calc-section.html'),
            height: 96
          }
        };
      },
      'board-buttons': function (t, options) {
        // «Мой заработок» видят все; «CRM» и «Панель руководителя» — только руководитель (админ доски/пространства)
        function isAdmin(){
          return Promise.all([
            t.member('id'),
            t.board('memberships'),
            t.organization('memberships').catch(function(){ return null; })
          ]).then(function(res){
            var me = res[0] || {};
            function adminIn(o){
              var ms = ((o && o.memberships) || []).filter(function(x){ return x.idMember === me.id; })[0];
              return !!(ms && ms.memberType === 'admin');
            }
            return adminIn(res[1]) || adminIn(res[2]);
          }).catch(function(){ return false; });
        }
        var earnBtn = {
          icon: { dark: t.signUrl('./ic-earnings-w.png'), light: t.signUrl('./ic-earnings-b.png') },
          text: 'Мой заработок',
          callback: function (t) {
            return t.modal({
              url: t.signUrl('./my-earnings-modal.html') + '?t=' + Date.now(),
              fullscreen: true,
              title: 'Мой заработок'
            });
          }
        };
        var crmBtn = {
          icon: { dark: t.signUrl('./ic-crm-w.png'), light: t.signUrl('./ic-crm-b.png') },
          text: 'CRM / Клиенты',
          callback: function (t) {
            return t.modal({
              url: './crm-modal.html?t=' + Date.now(),
              fullscreen: true,
              title: 'CRM — Клиенты'
            });
          }
        };
        var buhBtn = {
          icon: { dark: t.signUrl('./ic-buh-w.png'), light: t.signUrl('./ic-buh-b.png') },
          text: 'Бухгалтерия',
          callback: function (t) {
            return t.modal({
              url: './buh-modal.html?t=' + Date.now(),
              fullscreen: true,
              title: 'Бухгалтерия'
            });
          }
        };
        var reqBtn = {
          icon: { dark: t.signUrl('./ic-supplyreq-w.png'), light: t.signUrl('./ic-supplyreq-b.png') },
          text: 'Заказать снабжение',
          callback: function (t) {
            return t.modal({
              url: './supply-request-modal.html?t=' + Date.now(),
              fullscreen: true,
              title: 'Заказать снабжение'
            });
          }
        };
        var supBtn = {
          icon: { dark: t.signUrl('./ic-supply-w.png'), light: t.signUrl('./ic-supply-b.png') },
          text: 'Снабжение',
          callback: function (t) {
            return t.modal({
              url: './supply-modal.html?t=' + Date.now(),
              fullscreen: true,
              title: 'Снабжение'
            });
          }
        };
        var dashBtn = {
          icon: { dark: t.signUrl('./ic-dashboard-w.png'), light: t.signUrl('./ic-dashboard-b.png') },
          text: 'Панель руководителя',
          callback: function (t) {
            return t.modal({
              url: t.signUrl('./dashboard-modal.html') + '?t=' + Date.now(),
              fullscreen: true,
              title: 'Панель руководителя'
            });
          }
        };
        function perms(){
          var W = (window.CONFIG && window.CONFIG.WORKER_URL) || window.WORKER_URL || '';
          return t.member('id').then(function(me){
            return fetch(W + '/worker-perms?memberId=' + encodeURIComponent((me && me.id) || ''))
              .then(function(r){ return r.json(); })
              .then(function(j){ return { canInvoice: !!(j && j.canInvoice), canSupply: !!(j && j.canSupply) }; });
          }).catch(function(){ return { canInvoice:false, canSupply:false }; });
        }
        return isAdmin().then(function(admin){
          if (admin) return [earnBtn, reqBtn, supBtn, buhBtn, crmBtn, dashBtn];
          return perms().then(function(p){
            var out = [earnBtn, reqBtn];             // заявку на снабжение может подать любой работник
            if (p.canSupply) out.push(supBtn);       // панель снабжения — только снабженцу
            if (p.canInvoice) out.push(buhBtn);
            return out;
          });
        });
      }
    });
  </script>
</body>
</html>
