<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Калькулятор стоимости - Connector</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
  <script>
    // Adds a "Калькулятор стоимости" section to the card back with a button
    // that opens the full calculator modal. Stores results on the card and
    // logs every order to the central D1 database via the Worker.
    window.TrelloPowerUp.initialize({
      'card-back-section': function (t, options) {
        return {
          title: 'Калькулятор стоимости',
          icon: t.signUrl('./calc-icon.svg'),
          content: {
            type: 'iframe',
            url: t.signUrl('./calc-section.html'),
            height: 96
          }
        };
      },
      'board-buttons': function (t, options) {
        return [{
          icon: { dark: t.signUrl('./calc-icon.svg'), light: t.signUrl('./calc-icon.svg') },
          text: 'Зарплата / Работники',
          callback: function (t) {
            return t.modal({
              url: t.signUrl('./workers-modal.html') + '?t=' + Date.now(),
              fullscreen: true,
              title: 'Зарплата и работники'
            });
          }
        }];
      },
      'card-buttons': function (t, options) {
        // earnings report — visible only to the director (admin of the board OR the workspace)
        return Promise.all([
          t.member('id'),
          t.board('memberships'),
          t.organization('memberships').catch(function () { return null; })
        ]).then(function (res) {
          var me = res[0] || {}, board = res[1] || {}, org = res[2] || {};
          function adminIn(o) {
            var ms = ((o && o.memberships) || []).filter(function (x) { return x.idMember === me.id; })[0];
            return !!(ms && ms.memberType === 'admin');
          }
          if (!(adminIn(board) || adminIn(org))) return [];
          return [{
            icon: t.signUrl('./calc-icon.svg'),
            text: 'Заработок по заказу',
            callback: function (t) {
              return t.card('id').then(function (c) {
                return t.modal({
                  url: t.signUrl('./earnings-modal.html') + '?t=' + Date.now(),
                  fullscreen: true,
                  title: 'Заработок по заказу',
                  args: { cardId: c && c.id }
                });
              });
            }
          }];
        }).catch(function () { return []; });
      }
    });
  </script>
</body>
</html>
