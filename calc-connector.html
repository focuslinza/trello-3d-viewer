<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Калькулятор стоимости - Connector</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
  <script>
    // Adds a "Калькулятор стоимости" section to the card back with a button
    // that opens the full calculator modal. Stores results on the card and
    // logs every order to the central D1 database via the Worker.
    window.TrelloPowerUp.initialize({
      'card-buttons': function (t, options) {
        // "Этикетка" is always available; ".zzx" only when such an attachment exists
        var labelBtn = {
          icon: t.signUrl('./label-icon.svg'),
          text: 'Этикетка (штрих-код)',
          callback: function (t) {
            return t.card('id').then(function (c) {
              return t.modal({
                url: t.signUrl('./label-modal.html') + '?t=' + Date.now(),
                fullscreen: true,
                title: 'Этикетка со штрих-кодом',
                args: { cardId: (c && c.id) || '' }
              });
            });
          }
        };
        return t.card('attachments').then(function (c) {
          var has = ((c && c.attachments) || []).some(function (a) { return /\.zzx$/i.test(a.name || ''); });
          var btns = [labelBtn];
          if (has) btns.push({
            icon: t.signUrl('./calc-icon.svg'),
            text: 'Чертёж .zzx',
            callback: function (t) {
              return t.modal({
                url: t.signUrl('./zzx-modal.html') + '?t=' + Date.now(),
                fullscreen: true,
                title: 'Просмотр .zzx'
              });
            }
          });
          return btns;
        }).catch(function () { return [labelBtn]; });
      },
      'card-back-section': function (t, options) {
        return {
          title: 'Калькулятор стоимости',
          icon: t.signUrl('./calc-icon.svg'),
          content: {
            type: 'iframe',
            url: t.signUrl('./calc-section.html'),
            height: 96
          }
        };
      },
      'board-buttons': function (t, options) {
        return [{
          icon: { dark: t.signUrl('./ic-label.png'), light: t.signUrl('./ic-label.png') },
          text: 'Этикетки',
          callback: function (t) {
            return t.modal({
              url: t.signUrl('./label-modal.html') + '?t=' + Date.now(),
              fullscreen: true,
              title: 'Печать этикеток со штрих-кодом'
            });
          }
        }, {
          icon: { dark: t.signUrl('./ic-earnings.png'), light: t.signUrl('./ic-earnings.png') },
          text: 'Мой заработок',
          callback: function (t) {
            return t.modal({
              url: t.signUrl('./my-earnings-modal.html') + '?t=' + Date.now(),
              fullscreen: true,
              title: 'Мой заработок'
            });
          }
        }, {
          icon: { dark: t.signUrl('./ic-dashboard.png'), light: t.signUrl('./ic-dashboard.png') },
          text: 'Панель руководителя',
          callback: function (t) {
            return t.modal({
              url: t.signUrl('./dashboard-modal.html') + '?t=' + Date.now(),
              fullscreen: true,
              title: 'Панель руководителя'
            });
          }
        }];
      }
    });
  </script>
</body>
</html>
