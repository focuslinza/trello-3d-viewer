<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Калькулятор стоимости - Connector</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
  <script>
    // Adds a "Калькулятор стоимости" section to the card back with a button
    // that opens the full calculator modal. Stores results on the card and
    // logs every order to the central D1 database via the Worker.
    window.TrelloPowerUp.initialize({
      'card-buttons': function (t, options) {
        return t.card('attachments').then(function (c) {
          var has = ((c && c.attachments) || []).some(function (a) { return /\.zzx$/i.test(a.name || ''); });
          if (!has) return [];
          return [{
            icon: t.signUrl('./calc-icon.svg'),
            text: 'Чертёж .zzx',
            callback: function (t) {
              return t.modal({
                url: t.signUrl('./zzx-modal.html') + '?t=' + Date.now(),
                fullscreen: true,
                title: 'Просмотр .zzx'
              });
            }
          }];
        }).catch(function () { return []; });
      },
      'card-back-section': function (t, options) {
        return {
          title: 'Калькулятор стоимости',
          icon: t.signUrl('./calc-icon.svg'),
          content: {
            type: 'iframe',
            url: t.signUrl('./calc-section.html'),
            height: 96
          }
        };
      },
      'board-buttons': function (t, options) {
        return [{
          icon: { dark: t.signUrl('./calc-icon.svg'), light: t.signUrl('./calc-icon.svg') },
          text: 'Зарплата / Работники',
          callback: function (t) {
            return t.modal({
              url: t.signUrl('./workers-modal.html') + '?t=' + Date.now(),
              fullscreen: true,
              title: 'Зарплата и работники'
            });
          }
        }, {
          icon: { dark: t.signUrl('./calc-icon.svg'), light: t.signUrl('./calc-icon.svg') },
          text: 'Мой заработок',
          callback: function (t) {
            return t.modal({
              url: t.signUrl('./my-earnings-modal.html') + '?t=' + Date.now(),
              fullscreen: true,
              title: 'Мой заработок'
            });
          }
        }, {
          icon: { dark: t.signUrl('./calc-icon.svg'), light: t.signUrl('./calc-icon.svg') },
          text: 'Панель руководителя',
          callback: function (t) {
            return t.modal({
              url: t.signUrl('./dashboard-modal.html') + '?t=' + Date.now(),
              fullscreen: true,
              title: 'Панель руководителя'
            });
          }
        }];
      }
    });
  </script>
</body>
</html>
