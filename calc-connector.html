<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Калькулятор стоимости - Connector</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
  <script>
    // Adds a "Калькулятор стоимости" section to the card back with a button
    // that opens the full calculator modal. Stores results on the card and
    // logs every order to the central D1 database via the Worker.
    window.TrelloPowerUp.initialize({
      'card-detail-badges': function (t, options) {
        // фишка «QR-этикетка» в одном ряду и стиле с «Метки» и «Card Number»
        return [{
          title: 'Этикетка',
          text: '▦ QR / печать',
          color: null,
          callback: function (t) {
            return Promise.all([ t.card('id'), t.board('id') ]).then(function (r) {
              var c = r[0], b = r[1];
              return t.modal({
                url: './label-modal.html?t=' + Date.now(),
                fullscreen: true,
                title: 'Этикетка со штрих-кодом',
                args: { cardId: (c && c.id) || '', boardId: (b && b.id) || '' }
              });
            });
          }
        }];
      },
      'card-back-section': function (t, options) {
        return {
          title: 'Калькулятор стоимости',
          icon: t.signUrl('./calc-icon.svg'),
          content: {
            type: 'iframe',
            url: t.signUrl('./calc-section.html'),
            height: 96
          }
        };
      },
      'board-buttons': function (t, options) {
        return [{
          icon: { dark: t.signUrl('./ic-earnings.png'), light: t.signUrl('./ic-earnings.png') },
          text: 'Мой заработок',
          callback: function (t) {
            return t.modal({
              url: t.signUrl('./my-earnings-modal.html') + '?t=' + Date.now(),
              fullscreen: true,
              title: 'Мой заработок'
            });
          }
        }, {
          icon: { dark: t.signUrl('./ic-crm.png'), light: t.signUrl('./ic-crm.png') },
          text: 'CRM / Клиенты',
          callback: function (t) {
            return t.modal({
              url: './crm-modal.html?t=' + Date.now(),
              fullscreen: true,
              title: 'CRM — Клиенты'
            });
          }
        }, {
          icon: { dark: t.signUrl('./ic-dashboard.png'), light: t.signUrl('./ic-dashboard.png') },
          text: 'Панель руководителя',
          callback: function (t) {
            return t.modal({
              url: t.signUrl('./dashboard-modal.html') + '?t=' + Date.now(),
              fullscreen: true,
              title: 'Панель руководителя'
            });
          }
        }];
      }
    });
  </script>
</body>
</html>
