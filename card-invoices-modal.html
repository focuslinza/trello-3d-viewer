<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Счета по заказу</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="./config.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.72/pdfmake.min.js"></script>
  <script src="./dejavu-vfs.js"></script>
  <script src="./invoice-doc.js"></script>
  <style>
    :root{ --bg:#1d2125; --bg2:#22272b; --line:#3c444c; --txt:#e6edf3; --muted:#9fadbc; --accent:#4f7cff; --green:#3aa657; --red:#d4574e; }
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--txt);font-size:14px}
    .wrap{padding:16px;max-width:900px;margin:0 auto}
    .sec{background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:14px}
    h3{margin:0 0 10px;font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
    .muted{color:var(--muted)} .small{font-size:12px}
    table{width:100%;border-collapse:collapse;margin-top:6px}
    th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:left;vertical-align:middle;font-size:13px}
    th{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px}
    td.num,th.num{text-align:right;white-space:nowrap}
    .btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 12px;font-size:13px;cursor:pointer}
    .btn.green{background:var(--green)}
    .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--txt)}
    .btn.red{background:transparent;border:1px solid #7a3a32;color:#e8a59d}
    .bar{position:sticky;bottom:0;background:var(--bg);border-top:1px solid var(--line);padding:12px 16px;display:flex;justify-content:flex-end;gap:10px}
    .lockbox{background:#3a2320;border:1px solid #7a3a32;border-radius:10px;padding:16px;color:#e8a59d;text-align:center;margin-top:24px}
  </style>
</head>
<body>
  <div class="wrap" id="app"><div class="muted" id="boot">Проверка доступа…</div></div>
  <div class="bar"><button class="btn ghost" id="close" type="button">Закрыть</button></div>

<script>
  var t = window.TrelloPowerUp.iframe();
  var WORKER = (window.CONFIG && window.CONFIG.WORKER_URL) || window.WORKER_URL || '';
  var cardId = t.arg('cardId') || null;
  var ROWS = [];
  var IS_DIRECTOR = false;

  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function money(v){ return (window.INVOICE&&window.INVOICE.money)?window.INVOICE.money(v):(Math.round(+v||0)).toLocaleString('ru-RU'); }
  function boot(m){ var b=document.getElementById('boot'); if(b) b.textContent=m; }

  function isDirector(){
    return Promise.all([ t.member('id'), t.board('memberships'), t.organization('memberships').catch(function(){return null;}) ])
      .then(function(res){ var me=res[0]||{};
        function adminIn(o){ var ms=((o&&o.memberships)||[]).filter(function(x){return x.idMember===me.id;})[0]; return !!(ms&&ms.memberType==='admin'); }
        return adminIn(res[1])||adminIn(res[2]);
      }).catch(function(){ return false; });
  }
  // доступ: директор ИЛИ работник с правом «может выставлять счёт» (тот же лёгкий endpoint, без зарплатных данных)
  function checkAccess(){
    return isDirector().then(function(admin){
      IS_DIRECTOR = admin;
      if (admin) return true;
      return t.member('id').then(function(me){
        return fetch(WORKER+'/worker-perms?memberId='+encodeURIComponent((me&&me.id)||''))
          .then(function(r){return r.json();})
          .then(function(j){ return !!(j&&j.canInvoice); })
          .catch(function(){ return false; });
      });
    });
  }

  function parse(s, d){ try{ var v=JSON.parse(s); return v==null?d:v; }catch(e){ return d; } }
  function ruDateFromIso(s){
    var M=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
    var p=String(s||'').split('-'); if(p.length!==3) return s||'';
    return (+p[2])+' '+M[(+p[1]||1)-1]+' '+p[0]+' г.';
  }

  function load(){
    boot('Загружаю счета…');
    return fetch(WORKER+'/invoice-list?cardId='+encodeURIComponent(cardId||''))
      .then(function(r){ if(r.status===404) throw {code:404}; return r.json(); })
      .then(function(j){
        if(!j||!j.ok) throw new Error((j&&j.error)||'неизвестная ошибка');
        ROWS=(j.rows||[]).map(function(r){
          return { id:r.id, number:r.number, dateIso:r.date_iso||'', dateText:r.date_text||'', contract:r.contract||'Без договора',
                   supplier:parse(r.supplier_json,null), buyer:parse(r.buyer_json,null), items:parse(r.items_json,[]),
                   total:+r.total||0, createdAt:r.created_at||'' };
        });
        render();
      })
      .catch(function(e){
        if(e&&e.code===404){ boot(''); document.getElementById('app').innerHTML=
          '<div class="sec"><div class="muted">Журнал счетов ещё не подключён на сервере (Worker не обновлён). Обновите Worker — и здесь появятся все счета, в которые входит этот заказ.</div></div>'; return; }
        boot('Ошибка загрузки: '+(e&&e.message||e));
      });
  }

  function setupFonts(){
    if(!window.pdfMake) return false;
    pdfMake.vfs = window.DEJAVU_VFS;
    pdfMake.fonts = { DejaVu: { normal:'DejaVuSans.ttf', bold:'DejaVuSans-Bold.ttf', italics:'DejaVuSans.ttf', bolditalics:'DejaVuSans-Bold.ttf' } };
    return true;
  }
  function downloadPdf(row){
    if(!setupFonts()){ alert('Не удалось загрузить генератор PDF (pdfMake). Проверьте интернет.'); return; }
    if(!row.supplier || !row.buyer){ alert('В этом счёте не сохранены реквизиты (старый формат) — скачать нельзя.'); return; }
    var data={ supplier:row.supplier, buyer:row.buyer, number:String(row.number||''),
               date:row.dateText||ruDateFromIso(row.dateIso), contract:row.contract||'Без договора',
               items:row.items||[], nds:null };
    var dd=window.INVOICE.buildInvoiceDoc(data);
    var fname='Счет_'+data.number+'_'+(row.buyer&&row.buyer.name?String(row.buyer.name).replace(/[^0-9A-Za-zА-Яа-яЁё]+/g,'_').slice(0,30):'клиент')+'.pdf';
    pdfMake.createPdf(dd).download(fname);
  }
  function delInvoice(row){
    if(!IS_DIRECTOR) return;
    if(!confirm('Удалить счёт № '+row.number+' из журнала? PDF-файлы, скачанные ранее, останутся у вас.')) return;
    fetch(WORKER+'/invoice-delete',{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ id:row.id }) })
      .then(function(r){return r.json();}).then(function(j){
        if(j&&j.ok){ ROWS=ROWS.filter(function(x){return x.id!==row.id;}); render(); }
        else alert('Не удалось удалить: '+((j&&j.error)||'?'));
      }).catch(function(e){ alert('Сеть: '+(e&&e.message||e)); });
  }

  function render(){
    var h='<div class="sec"><h3>Счета, в которые входит этот заказ</h3>';
    if(!ROWS.length){
      h+='<div class="muted">По этому заказу счета ещё не выставлялись. Нажмите «Счёт на оплату» в карточке, скачайте PDF — и счёт появится здесь автоматически.</div>';
    } else {
      h+='<table><thead><tr><th>№ счёта</th><th>Дата</th><th>Покупатель</th><th class="num">Сумма</th><th>Поставщик</th><th></th></tr></thead><tbody>';
      ROWS.forEach(function(r,i){
        var supLbl=(r.supplier&&(r.supplier.label||r.supplier.name))||'—';
        h+='<tr>'+
          '<td><b>'+esc(r.number)+'</b></td>'+
          '<td class="small">'+esc(r.dateIso?String(r.dateIso).slice(0,10):String(r.createdAt||'').slice(0,10))+'</td>'+
          '<td>'+esc((r.buyer&&r.buyer.name)||'—')+'</td>'+
          '<td class="num">'+money(r.total)+' ₸</td>'+
          '<td class="small muted">'+esc(supLbl)+'</td>'+
          '<td style="white-space:nowrap;text-align:right">'+
            '<button class="btn green dl" data-i="'+i+'" type="button">Скачать PDF</button>'+
            (IS_DIRECTOR?' <button class="btn red del" data-i="'+i+'" type="button" title="Удалить из журнала">✕</button>':'')+
          '</td>'+
        '</tr>';
      });
      h+='</tbody></table>';
      h+='<div class="small muted" style="margin-top:10px">PDF собирается заново из сохранённых данных счёта — он идентичен тому, что скачивался при выставлении.</div>';
    }
    h+='</div>';
    document.getElementById('app').innerHTML=h;
    [].forEach.call(document.querySelectorAll('.dl'), function(b){ b.onclick=function(){ downloadPdf(ROWS[+this.getAttribute('data-i')]); }; });
    [].forEach.call(document.querySelectorAll('.del'), function(b){ b.onclick=function(){ delInvoice(ROWS[+this.getAttribute('data-i')]); }; });
  }

  document.getElementById('close').onclick=function(){ t.closeModal(); };

  if(!cardId){ boot('Не удалось определить карточку.'); }
  else checkAccess().then(function(ok){
    if(!ok){
      boot('');
      document.getElementById('app').innerHTML='<div class="lockbox">Доступ к счетам ограничен.<br><span class="small">Счета видят только руководитель и работники с правом «может выставлять счёт».</span></div>';
      return;
    }
    return load();
  });
</script>
</body>
</html>
