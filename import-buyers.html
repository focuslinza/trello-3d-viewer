    function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

    function renderRows(){
      var h='';
      RECORDS.forEach(function(r){
        h+='<tr id="row_'+r.num+'"><td>'+r.num+'</td><td>'+esc(r.name)+'</td><td>'+esc(r.bin)+'</td><td>'+esc(r.phone||'—')+'</td><td><span class="pill wait" id="st_'+r.num+'">…</span></td></tr>';
      });
      document.getElementById('rows').innerHTML = h;
      document.getElementById('tbl').style.display = '';
    }
    function setStatus(num, cls, text){
      var el = document.getElementById('st_'+num);
      if (el){ el.className='pill '+cls; el.textContent=text; }
    }

    document.getElementById('runBtn').onclick = function(){
      var btn=this; btn.disabled=true; btn.textContent='Загрузка…';
      renderRows();
      fetch(WORKER+'/companies-list').then(function(r){return r.json();}).then(function(j){
        var existing = (j&&j.ok&&j.companies)||[];
        var byBin = {};
        existing.forEach(function(c){ if(c.bin) byBin[String(c.bin).trim()] = c; });

        var created=0, skipped=0, failed=0;
        var chain = Promise.resolve();
        RECORDS.forEach(function(r){
          chain = chain.then(function(){
            var dup = byBin[r.bin];
            if (dup){
              skipped++; setStatus(r.num,'dup','уже есть: '+ (dup.name||'').slice(0,30));
              return;
            }
            var company = {
              id: 'imp_'+Date.now().toString(36)+Math.random().toString(36).slice(2,8),
              type: 'company', name: r.name, bin: r.bin, addr: r.addr||'', phone: r.phone||'',
              contacts: [], objects: []
            };
            return fetch(WORKER+'/company-save', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ company: company }) })
              .then(function(rr){ return rr.json(); })
              .then(function(jj){
                if (jj && jj.ok){ created++; byBin[r.bin]=company; setStatus(r.num,'new','создан'); }
                else { failed++; setStatus(r.num,'err','ошибка: '+((jj&&jj.error)||'?')); }
              }).catch(function(e){ failed++; setStatus(r.num,'err','сеть: '+(e&&e.message||e)); });
          });
        });
        chain.then(function(){
          btn.textContent='Готово';
          document.getElementById('summary').innerHTML =
            '<b>Итог:</b> создано <span style="color:var(--green)">'+created+'</span>, '+
            'уже было в CRM (пропущено) <span style="color:var(--muted)">'+skipped+'</span>, '+
            'ошибок <span style="color:var(--red)">'+failed+'</span>.';
        });
      }).catch(function(e){
        document.getElementById('summary').innerHTML = '<span style="color:var(--red)">Не удалось получить список текущих клиентов: '+esc(e&&e.message||e)+'</span>';
        btn.disabled=false; btn.textContent='Проверить и загрузить';
      });
    };
