<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Снабжение</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="./config.js"></script>
  <script src="./calc-engine.js"></script>
  <style>
    :root{ --bg:#1d2125; --bg2:#22272b; --line:#3a414a; --txt:#c7d1db; --muted:#9fadbc; --blue:#4f7cff; --green:#4bce97; --red:#f28b82; --amber:#e8c07d; }
    html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;font-size:14px}
    #app{max-width:1000px;margin:0 auto;padding:16px 16px 70px}
    h2{margin:0 0 12px;font-size:18px}
    h3{margin:14px 0 8px;font-size:14px;color:#e6edf3}
    .muted{color:var(--muted);font-size:12.5px}
    .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
    .tab{background:var(--bg2);border:1px solid var(--line);border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer}
    .tab.active{border-color:var(--blue);color:#cfe1ff;background:#274469}
    .tab .cnt{display:inline-block;background:#42221f;color:var(--red);border-radius:9px;padding:0 7px;font-size:11px;font-weight:700;margin-left:5px}
    .btn{background:var(--bg2);border:1px solid var(--line);border-radius:8px;color:var(--txt);padding:7px 13px;font-size:13px;cursor:pointer}
    .btn:hover{border-color:var(--blue)}
    .btn.primary{background:#274469;border-color:var(--blue);color:#cfe1ff}
    .btn.danger{border-color:#7a3a32;color:#e8a59d}
    input,select{background:var(--bg2);border:1px solid var(--line);border-radius:6px;color:var(--txt);padding:7px 9px;font-size:13px}
    table{width:100%;border-collapse:collapse}
    th,td{padding:7px 8px;border-bottom:1px solid var(--line);text-align:left;font-size:13px;vertical-align:middle}
    th{color:var(--muted);font-size:11px;text-transform:uppercase;white-space:nowrap}
    td.num{text-align:right;white-space:nowrap}
    .pill{display:inline-block;border-radius:10px;padding:2px 9px;font-size:11.5px;font-weight:700;white-space:nowrap}
    .pill.new{background:#2b3a55;color:#a9c2ff}
    .pill.bought{background:#1c3329;color:var(--green)}
    .pill.given{background:#223;color:var(--muted)}
    .pill.rejected{background:#42221f;color:var(--red)}
    .pill.urgent{background:#42221f;color:var(--red)}
    .pill.overdue{background:#42221f;color:var(--red)}
    .pill.soon{background:#3d321c;color:var(--amber)}
    .pill.ok{background:#1c3329;color:var(--green)}
    .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin:6px 0 12px}
    .kpi{background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:10px 12px}
    .kpi .k{font-size:11px;color:var(--muted);text-transform:uppercase}
    .kpi .v{font-size:16px;font-weight:800;margin-top:4px}
    .kpi.red .v{color:var(--red)} .kpi.amber .v{color:var(--amber)}
    .grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:8px 14px;margin:8px 0}
    .grid2 .lbl{color:var(--muted);font-size:11px;text-transform:uppercase;margin-bottom:3px}
    .grid2 input{width:100%;box-sizing:border-box}
    .empty{color:var(--muted);padding:12px 4px}
    .daterow td{background:var(--bg2);font-weight:700;color:#e6edf3}
    .filters{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
    a{color:#8ab4ff;text-decoration:none} a:hover{text-decoration:underline}
    .bar{position:fixed;left:0;right:0;bottom:0;background:var(--bg);border-top:1px solid var(--line);padding:12px 16px;display:flex;justify-content:flex-end;z-index:50}
  </style>
</head>
<body>
  <div id="app"><div class="empty" id="boot">Загрузка…</div></div>
  <div class="bar"><button class="btn" id="close" type="button">Закрыть</button></div>
  <script>
    var t = window.TrelloPowerUp.iframe();
    var WORKER = (window.CONFIG && window.CONFIG.WORKER_URL) || window.WORKER_URL || '';
    document.getElementById('close').onclick=function(){ t.closeModal(); };

    var TAB='req', REQS=[], OPEN=0, TOOLS=[], DUE=0, CASH=null, TOOL_EDIT=null;
    var now=new Date();
    function pad(n){ return n<10?'0'+n:''+n; }
    function fmtDate(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
    var CASH_RANGE={ from: fmtDate(new Date(now.getFullYear(), now.getMonth(), 1)), to: fmtDate(now) };
    function money(v){ return Math.round(+v||0).toLocaleString('ru-RU'); }
    function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
    var STATUS_LBL = { new:'новая', bought:'куплено', given:'выдано', rejected:'отклонена' };

    function isDirector(){
      return Promise.all([ t.member('id'), t.board('memberships'), t.organization('memberships').catch(function(){return null;}) ])
        .then(function(res){ var me=res[0]||{};
          function adminIn(o){ var ms=((o&&o.memberships)||[]).filter(function(x){return x.idMember===me.id;})[0]; return !!(ms&&ms.memberType==='admin'); }
          return adminIn(res[1])||adminIn(res[2]);
        }).catch(function(){ return false; });
    }
    var IS_ADMIN=false;
    function canUse(){
      return isDirector().then(function(admin){
        IS_ADMIN=admin;
        if(admin) return true;
        return t.member('id').then(function(me){
          return fetch(WORKER+'/worker-perms?memberId='+encodeURIComponent(me.id||''))
            .then(function(r){return r.json();}).then(function(j){ return !!(j&&j.canSupply); })
            .catch(function(){ return false; });
        });
      });
    }

    function loadAll(){
      return Promise.all([
        fetch(WORKER+'/supply-list').then(function(r){return r.json();}).catch(function(){return {};}),
        fetch(WORKER+'/tools-list').then(function(r){return r.json();}).catch(function(){return {};}),
        fetch(WORKER+'/cash-list?from='+CASH_RANGE.from+'&to='+CASH_RANGE.to).then(function(r){return r.json();}).catch(function(){return {};})
      ]).then(function(res){
        if(res[0]&&res[0].ok){ REQS=res[0].requests||[]; OPEN=res[0].openCount||0; }
        if(res[1]&&res[1].ok){ TOOLS=res[1].tools||[]; DUE=res[1].dueCount||0; }
        if(res[2]&&res[2].ok){ CASH=res[2]; }
        render();
      });
    }

    // ---------- ЗАЯВКИ ----------
    function renderReq(){
      if(!REQS.length) return '<div class="empty">Заявок нет.</div>';
      var h='<table><thead><tr><th>Что</th><th>Кол-во</th><th>Кто просил</th><th>Дата</th><th>Статус</th><th>Действия</th></tr></thead><tbody>';
      REQS.forEach(function(r){
        h+='<tr><td>'+(r.urgent?'<span class="pill urgent">срочно</span> ':'')+esc(r.name)+
           ' <button class="btn" data-reqedit="'+r.id+'" type="button" style="padding:2px 8px;font-size:11px">✎</button>'+
           (r.comment?('<div class="muted">'+esc(r.comment)+'</div>'):'')+
           (r.link?('<div><a href="'+esc(r.link)+'" target="_blank">ссылка от работника ↗</a></div>'):'')+
           '<div class="rqfiles" data-id="'+r.id+'"></div>'+
           (r.note?('<div class="muted">ответ: '+esc(r.note)+'</div>'):'')+'</td>'+
           '<td>'+esc(r.qty)+'</td><td>'+esc(r.byName)+'</td><td class="muted">'+esc((r.createdAt||'').slice(0,10))+'</td>'+
           '<td><span class="pill '+esc(r.status)+'">'+(STATUS_LBL[r.status]||r.status)+'</span></td>'+
           '<td style="white-space:nowrap">';
        if(r.status==='new') h+='<button class="btn rq" data-id="'+r.id+'" data-st="bought" type="button">Куплено</button> '+
                                '<button class="btn danger rq" data-id="'+r.id+'" data-st="rejected" type="button">Отклонить</button>';
        else if(r.status==='bought') h+='<button class="btn rq" data-id="'+r.id+'" data-st="given" type="button">Выдано</button>';
        if(IS_ADMIN) h+=' <button class="btn sarch" data-id="'+r.id+'" type="button" title="В архив: скрыть из списка, данные останутся" style="padding:3px 8px;font-size:11px">🗄</button>'+
                        ' <button class="btn danger sdel" data-id="'+r.id+'" type="button" title="Удалить безвозвратно (для тестовых заявок)" style="padding:3px 8px;font-size:11px">✕</button>';
        h+='</td></tr>';
        h+='<tr class="reqEditRow" id="reqEditRow_'+r.id+'" style="display:none"><td colspan="6"><div id="reqEditBox_'+r.id+'"></div></td></tr>';
      });
      return h+'</tbody></table>';
    }
    function toggleReqEditRow(id){
      var row=document.getElementById('reqEditRow_'+id);
      if(row.style.display==='none'){ row.style.display=''; drawReqEditBox(id); } else row.style.display='none';
    }
    function drawReqEditBox(id){
      var r=REQS.filter(function(x){return x.id===id;})[0]; if(!r) return;
      var box=document.getElementById('reqEditBox_'+id);
      var h='';
      if(r.status!=='new') h+='<div class="muted" style="color:var(--amber);margin-bottom:6px">⚠ Заявка уже не новая — правьте, только если это исправление ошибки.</div>';
      h+='<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end">';
      h+='<label>Что<br><input type="text" class="rqName" value="'+esc(r.name)+'" style="width:200px"></label>';
      h+='<label>Кол-во<br><input type="text" class="rqQty" value="'+esc(r.qty||'')+'" style="width:100px"></label>';
      h+='<label>Ссылка<br><input type="text" class="rqLink" value="'+esc(r.link||'')+'" style="width:180px"></label>';
      h+='<label style="display:inline-flex;align-items:center;gap:5px"><input type="checkbox" class="rqUrgent"'+(r.urgent?' checked':'')+'> срочно</label>';
      h+='<button class="btn primary" data-savereqedit="'+id+'" type="button">Сохранить</button>';
      h+='<span class="rqeMsg muted"></span></div>';
      box.innerHTML=h;
      box.querySelector('[data-savereqedit]').onclick=function(){ saveReqEditBox(id); };
    }
    function saveReqEditBox(id){
      var box=document.getElementById('reqEditBox_'+id);
      var r=REQS.filter(function(x){return x.id===id;})[0];
      var name=box.querySelector('.rqName').value.trim();
      if(!name){ alert('Укажите, что нужно.'); return; }
      var msg=box.querySelector('.rqeMsg'); msg.textContent='Сохранение…';
      fetch(WORKER+'/supply-request-update',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
        id:id, name:name, qty:box.querySelector('.rqQty').value.trim(), link:box.querySelector('.rqLink').value.trim(),
        urgent:box.querySelector('.rqUrgent').checked
      })}).then(function(rr){return rr.json();}).then(function(j){
        if(!j||!j.ok) throw new Error((j&&j.error)||'не удалось сохранить');
        Object.assign(r,{name:name, qty:box.querySelector('.rqQty').value.trim(), link:box.querySelector('.rqLink').value.trim(), urgent:box.querySelector('.rqUrgent').checked});
        msg.textContent='Сохранено ✓'; msg.style.color='var(--green)';
        setTimeout(function(){ render(); }, 700);
      }).catch(function(e){ msg.textContent='Ошибка: '+(e&&e.message||e); msg.style.color='var(--red)'; });
    }

    // ---------- ИНСТРУМЕНТ ----------
    var TOOL_FIELDS=[
      ['name','Наименование *','Болгарка Makita GA5030'],
      ['serial','Серийный № / инв. №',''],
      ['boughtAt','Дата покупки','',''],
      ['warrantyUntil','Гарантия до',''],
      ['serviceCompany','Сервисная компания','ТОО СервисПро'],
      ['servicePhone','Телефон сервиса','+7 ...'],
      ['serviceIntervalMonths','Интервал сервиса, мес','6'],
      ['lastService','Последний сервис',''],
      ['note','Заметка','']
    ];
    function isDateField(k){ return k==='boughtAt'||k==='warrantyUntil'||k==='lastService'; }
    function renderTools(){
      var h='';
      if(TOOL_EDIT!==null){
        var tv=TOOL_EDIT;
        h+='<h3>'+(tv.id?'Редактировать':'Добавить')+' инструмент / станок</h3><div class="grid2">';
        TOOL_FIELDS.forEach(function(f){
          h+='<div><div class="lbl">'+esc(f[1])+'</div><input '+(isDateField(f[0])?'type="date"':'type="text"')+' id="tf_'+f[0]+'" value="'+esc(tv[f[0]]||'')+'" placeholder="'+esc(f[2]||'')+'"></div>';
        });
        h+='</div><button class="btn primary" id="tsave" type="button">💾 Сохранить</button> <button class="btn" id="tcancel" type="button">Отмена</button>';
        h+='<h3>Чеки и документы</h3>';
        if(tv.id) h+='<div id="trec" class="muted">Загрузка…</div>';
        h+='<div style="margin-top:8px">'+pickerHtml('tp')+'</div>'+
           '<div class="muted" style="margin-top:4px">Фото (сжимается само) или PDF до ~650 КБ. Выбранные файлы загрузятся при нажатии «Сохранить».</div>';
        return h;
      }
      if(!TOOLS.length) return '<div class="empty">Реестр пуст — добавьте первый инструмент.</div>'+
        '<button class="btn primary" id="taddBtn" type="button">+ Добавить инструмент</button>';
      h+='<button class="btn primary" id="taddBtn" type="button">+ Добавить инструмент</button>';
      h+='<table style="margin-top:10px"><thead><tr><th>Инструмент</th><th>Куплен</th><th>Гарантия до</th><th>Сервис-компания</th><th>Следующий сервис</th><th></th></tr></thead><tbody>';
      TOOLS.forEach(function(x){
        var st = x.serviceState==='overdue' ? '<span class="pill overdue">⚠ просрочен: '+esc(x.nextService)+'</span>'
               : x.serviceState==='soon' ? '<span class="pill soon">скоро: '+esc(x.nextService)+'</span>'
               : x.serviceState==='ok' ? '<span class="pill ok">'+esc(x.nextService)+'</span>'
               : '<span class="muted">—</span>';
        h+='<tr><td><b>'+esc(x.name)+'</b>'+(x.serial?('<div class="muted">'+esc(x.serial)+'</div>'):'')+'</td>'+
           '<td class="muted">'+esc(x.boughtAt||'—')+'</td><td class="muted">'+esc(x.warrantyUntil||'—')+'</td>'+
           '<td>'+esc(x.serviceCompany||'—')+(x.servicePhone?('<div class="muted">'+esc(x.servicePhone)+'</div>'):'')+'</td>'+
           '<td>'+st+'</td>'+
           '<td style="white-space:nowrap"><button class="btn tedit" data-id="'+x.id+'" type="button">✎</button> <button class="btn danger tdel" data-id="'+x.id+'" type="button">✕</button></td></tr>';
      });
      return h+'</tbody></table>';
    }

    // ---------- НАЛИЧНЫЕ ----------
    function renderCash(){
      var h='<div class="filters">'+
        '<input type="date" id="cfrom" value="'+CASH_RANGE.from+'"><span class="muted">—</span>'+
        '<input type="date" id="cto" value="'+CASH_RANGE.to+'">'+
        '<button class="btn" id="capply" type="button">Показать</button></div>';
      var bal=(CASH&&CASH.balance!=null)?CASH.balance:null;
      h+='<div class="kpis">'+
         '<div class="kpi"><div class="k">Перенос с прошлого</div><div class="v">'+money(CASH?CASH.carryIn:0)+' ₸</div></div>'+
         '<div class="kpi"><div class="k">Выдано за период</div><div class="v" style="color:#579dff">'+money(CASH?CASH.issued:0)+' ₸</div></div>'+
         '<div class="kpi"><div class="k">Потрачено</div><div class="v">'+money(CASH?CASH.total:0)+' ₸</div></div>'+
         '<div class="kpi"><div class="k">Остаток в подотчёте</div><div class="v" style="color:'+(bal!=null&&bal<0?'var(--red,#f28b82)':'var(--green,#4bce97)')+'">'+money(bal)+' ₸</div></div>'+
         '</div>';
      if(bal!=null&&bal<0) h+='<div class="muted" style="color:var(--red,#f28b82);margin:-6px 0 10px">⚠ Потрачено больше, чем выдано — проверьте, все ли выдачи записаны.</div>';
      if(IS_ADMIN){
        h+='<h3>Выдача налом (подотчёт)</h3><div class="grid2">'+
           '<div><div class="lbl">Дата</div><input type="date" id="idate" value="'+fmtDate(new Date())+'"></div>'+
           '<div><div class="lbl">Сумма, ₸ *</div><input type="text" id="iamount" placeholder="200000"></div>'+
           '<div><div class="lbl">Заметка</div><input type="text" id="inote" placeholder="выдача на июль"></div></div>'+
           '<button class="btn primary" id="iadd" type="button">+ Выдать</button><span id="imsg" class="muted" style="margin-left:8px"></span>';
      }
      var issues=(CASH&&CASH.issues)||[];
      if(issues.length){
        h+='<h3 style="margin-top:14px">Выдачи за период</h3><table><thead><tr><th>Дата</th><th class="num">Сумма</th><th>Заметка</th>'+(IS_ADMIN?'<th></th>':'')+'</tr></thead><tbody>';
        issues.forEach(function(i0){
          h+='<tr><td>'+esc(i0.date)+'</td><td class="num" style="color:#579dff">+'+money(i0.amount)+' ₸</td><td class="muted">'+esc(i0.note||'')+'</td>'+
             (IS_ADMIN?('<td><button class="btn danger idel" data-id="'+i0.id+'" type="button">✕</button></td>'):'')+'</tr>';
        });
        h+='</tbody></table>';
      }
      h+='<h3>Новый расход</h3><div class="grid2">'+
         '<div><div class="lbl">Дата</div><input type="date" id="cdate" value="'+fmtDate(new Date())+'"></div>'+
         '<div><div class="lbl">Сумма, ₸ *</div><input type="text" id="camount" placeholder="12500"></div>'+
         '<div><div class="lbl">На что *</div><input type="text" id="cwhat" placeholder="Диски отрезные"></div>'+
         '<div><div class="lbl">Заметка</div><input type="text" id="cnote" placeholder=""></div>'+
         '<div><div class="lbl">Чек: фото или PDF</div>'+pickerHtml('cp')+'</div></div>'+
         '<button class="btn primary" id="cadd" type="button">+ Записать расход</button><span id="cmsg" class="muted" style="margin-left:8px"></span>';
      var entries=(CASH&&CASH.entries)||[];
      if(!entries.length) return h+'<div class="empty">Расходов за период нет.</div>';
      h+='<table style="margin-top:14px"><thead><tr><th>На что</th><th class="num">Сумма</th><th>Чеки</th><th></th></tr></thead><tbody>';
      var lastDate=null;
      entries.forEach(function(e0){
        if(e0.date!==lastDate){
          lastDate=e0.date;
          h+='<tr class="daterow"><td>'+esc(e0.date)+'</td><td class="num">'+money(CASH.byDate[e0.date])+' ₸</td><td colspan="2"></td></tr>';
        }
        h+='<tr><td>'+esc(e0.what)+(e0.note?('<div class="muted">'+esc(e0.note)+'</div>'):'')+'</td>'+
           '<td class="num">'+money(e0.amount)+' ₸</td>'+
           '<td><span class="crec" data-id="'+e0.id+'">…</span> <label style="cursor:pointer;color:#8ab4ff">📎<input type="file" accept="image/*,application/pdf" class="cfile" data-id="'+e0.id+'" style="display:none"></label></td>'+
           '<td><button class="btn danger cdel" data-id="'+e0.id+'" type="button">✕</button></td></tr>';
      });
      return h+'</tbody></table>';
    }

    // фото → сжатое JPEG base64 (без префикса)
    function compressImage(file){
      return new Promise(function(resolve,reject){
        var fr=new FileReader();
        fr.onload=function(){
          var img=new Image();
          img.onload=function(){
            var maxSide=1280, w=img.width, hgt=img.height;
            var k=Math.min(1, maxSide/Math.max(w,hgt));
            var cnv=document.createElement('canvas');
            cnv.width=Math.round(w*k); cnv.height=Math.round(hgt*k);
            cnv.getContext('2d').drawImage(img,0,0,cnv.width,cnv.height);
            var url=cnv.toDataURL('image/jpeg',0.72);
            resolve(url.split(',')[1]);
          };
          img.onerror=reject;
          img.src=fr.result;
        };
        fr.onerror=reject;
        fr.readAsDataURL(file);
      });
    }
    // Файлы, выбранные ДО сохранения (по разделам): tp — инструмент, cp — наличные
    var PEND = { tp: [], cp: [] };
    function pickerHtml(p){
      return '<button type="button" class="btn" id="'+p+'Cam">📷 Камера</button> '+
             '<button type="button" class="btn" id="'+p+'Gal">📁 Файл</button>'+
             '<input type="file" id="'+p+'CamI" accept="image/*" capture="environment" style="display:none">'+
             '<input type="file" id="'+p+'GalI" accept="image/*,application/pdf" multiple style="display:none">'+
             '<div id="'+p+'List" class="muted" style="margin-top:6px"></div>';
    }
    function drawPend(p){
      var el=document.getElementById(p+'List'); if(!el) return;
      el.innerHTML = PEND[p].length
        ? PEND[p].map(function(f,i){ return '<span style="margin-right:10px">'+(f.type==='application/pdf'?'📄':'📷')+' '+String(f.name||'файл').replace(/[<>&"]/g,'')+' <a href="#" data-rm="'+i+'" style="color:#e8a59d;text-decoration:none">✕</a></span>'; }).join('')
        : '';
      [].forEach.call(el.querySelectorAll('[data-rm]'), function(a){
        a.onclick=function(ev){ ev.preventDefault(); PEND[p].splice(+this.getAttribute('data-rm'),1); drawPend(p); };
      });
    }
    function wirePicker(p){
      var cam=document.getElementById(p+'Cam'), gal=document.getElementById(p+'Gal');
      var camI=document.getElementById(p+'CamI'), galI=document.getElementById(p+'GalI');
      if(!cam||!camI) return;
      cam.onclick=function(){ camI.click(); };
      gal.onclick=function(){ galI.click(); };
      function add(inp){ [].forEach.call(inp.files||[], function(f){ PEND[p].push(f); }); inp.value=''; drawPend(p); }
      camI.onchange=function(){ add(this); };
      galI.onchange=function(){ add(this); };
      drawPend(p);
    }
    // последовательная загрузка выбранных файлов к записи id; msgEl — куда писать прогресс
    function uploadPending(kind, refId, p, msgEl){
      var files=PEND[p].slice();
      var chain=Promise.resolve();
      files.forEach(function(f,i){
        chain=chain.then(function(){
          if(msgEl) msgEl.textContent='Файл '+(i+1)+' из '+files.length+'…';
          return prepFile(f).then(function(pf){
            return fetch(WORKER+'/receipt-save',{ method:'POST', headers:{'Content-Type':'application/json'},
              body: JSON.stringify({ kind:kind, refId:String(refId), filename:pf.filename, mime:pf.mime, dataB64:pf.b64 }) })
              .then(function(r){return r.json();})
              .then(function(j){ if(!j||!j.ok) throw new Error((j&&j.error)||'файл не сохранился'); });
          });
        });
      });
      return chain.then(function(){ PEND[p]=[]; });
    }
    function fileToB64(file){
      return new Promise(function(res,rej){
        var fr=new FileReader();
        fr.onload=function(){ res(String(fr.result).split(',')[1]); };
        fr.onerror=rej; fr.readAsDataURL(file);
      });
    }
    function prepFile(file){
      if(file.type==='application/pdf'){
        if(file.size > 650000) return Promise.reject(new Error('PDF «'+(file.name||'')+'» слишком большой (макс ~650 КБ)'));
        return fileToB64(file).then(function(b64){ return { b64:b64, mime:'application/pdf', filename:file.name||'документ.pdf' }; });
      }
      return compressImage(file).then(function(b64){ return { b64:b64, mime:'image/jpeg', filename:file.name||'чек.jpg' }; });
    }
    function uploadReceipt(kind, refId, file, done){
      prepFile(file).then(function(p){
        return fetch(WORKER+'/receipt-save',{ method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ kind:kind, refId:String(refId), filename:p.filename, mime:p.mime, dataB64:p.b64 }) });
      }).then(function(r){return r.json();}).then(function(j){
        if(!j||!j.ok) throw new Error((j&&j.error)||'не сохранилось');
        done&&done(true);
      }).catch(function(e){ alert('Файл не сохранился: '+(e&&e.message||e)); done&&done(false); });
    }
    function fillReceipts(kind, refId, el){
      fetch(WORKER+'/receipts-list?kind='+kind+'&refId='+encodeURIComponent(refId))
        .then(function(r){return r.json();}).then(function(j){
          var list=(j&&j.receipts)||[];
          el.innerHTML = list.length
            ? list.map(function(r){ var pdf=/\.pdf$/i.test(r.filename||''); return '<a href="'+WORKER+'/receipt-get?id='+r.id+'" target="_blank" title="'+(r.filename||'')+'">'+(pdf?'📄':'🧾')+'</a>'; }).join(' ')
            : '<span class="muted">нет</span>';
        }).catch(function(){ el.innerHTML='<span class="muted">?</span>'; });
    }

    // ---------- вкладка «Цены материалов» (для снабженца) ----------
    // Редактируются ТОЛЬКО цены материалов/компонентов и свои позиции.
    // Коэффициенты, тарифы работ и доли здесь не показываются и не затрагиваются:
    // сохранение идёт через /pricing-save-materials, который сливает изменения
    // с остальными настройками, а не перезаписывает их.
    var PR=null;       // загруженный pricing (переопределения)
    var PR_BUSY=false;
    var CALC=window.CALC||{};
    function prNum(v){ return (v==null||v==='')?'':(+v); }
    function prPct(v,def){ return (v!=null&&v!=='')?Math.round(+v*1000)/10:def; }

    function loadPrices(){
      if(PR||PR_BUSY) return;
      PR_BUSY=true;
      fetch(WORKER+'/pricing-get').then(function(r){return r.json();}).then(function(j){
        PR=(j&&j.ok&&j.pricing)||{};
        PR.mat=PR.mat||{}; PR.cmp=PR.cmp||{}; PR.customMat=PR.customMat||[]; PR.customCmp=PR.customCmp||[];
        PR_BUSY=false; if(TAB==='prices') render();
      }).catch(function(){ PR={mat:{},cmp:{},customMat:[],customCmp:[]}; PR_BUSY=false; if(TAB==='prices') render(); });
    }

    function renderPrices(){
      if(!PR){ loadPrices(); return '<div class="empty">Загрузка цен…</div>'; }
      var MAT=CALC.MAT||{}, CMP=CALC.CMP||{};
      var IST='background:var(--bg2);border:1px solid var(--line);border-radius:6px;color:var(--txt);padding:6px 8px';
      var h='<div class="small muted" style="margin:4px 0 10px">Держите цены закупки актуальными — по ним считаются все новые расчёты и заказы. Изменения применяются после «Сохранить цены»; уже сохранённые заказы не пересчитываются.</div>';

      function priceGrid(CAT, over, cls){
        var bySec={}; Object.keys(CAT).forEach(function(code){ var it=CAT[code]; (bySec[it.sec]=bySec[it.sec]||[]).push(code); });
        var out='';
        Object.keys(bySec).forEach(function(sec){
          out+='<div style="margin-top:10px"><div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;font-weight:700;margin-bottom:6px">'+esc(sec)+'</div>';
          out+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:6px 12px">';
          bySec[sec].forEach(function(code){
            var it=CAT[code]; var val=(over[code]!=null&&over[code]!=='')?over[code]:it.u;
            var spec=(it.spec||'').trim();
            out+='<div style="display:flex;align-items:center;gap:6px;justify-content:space-between">'+
                 '<label style="font-size:12.5px">'+esc(it.lbl)+(spec?' <span class="small muted" title="Параметры позиции (размер листа / сечение)">'+esc(spec)+' мм</span>':'')+'</label>'+
                 '<span style="white-space:nowrap"><input type="number" step="any" class="'+cls+'" data-code="'+code+'" value="'+prNum(val)+'" style="'+IST+';width:92px;text-align:right"> <span class="small muted">₸</span></span></div>';
          });
          out+='</div></div>';
        });
        return out;
      }

      h+='<h3 style="margin-top:8px">Материалы (₸ за м² / п.м)</h3>'+priceGrid(MAT, PR.mat, 'smp');
      h+='<h3 style="margin-top:16px">Компоненты (₸ за шт / краска за м²)</h3>'+priceGrid(CMP, PR.cmp, 'scp');

      function uniq(list){ var seen={}, out=[]; list.forEach(function(s){ if(s&&!seen[s]){ seen[s]=1; out.push(s); } }); return out; }
      function sectionsOf(CAT){ return uniq(Object.keys(CAT).map(function(c){ return CAT[c].sec; })); }
      var matSections=uniq(sectionsOf(MAT).concat(PR.customMat.map(function(it){return it.sec;})));
      var cmpSections=uniq(sectionsOf(CMP).concat(PR.customCmp.map(function(it){return it.sec;})));

      function fld(cap,inner,wrap){ return '<div style="display:flex;flex-direction:column;gap:2px;'+(wrap||'')+'"><span style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;white-space:nowrap">'+esc(cap)+'</span>'+inner+'</div>'; }
      function txtf(f,val,w){ return '<input data-f="'+f+'" value="'+esc(val==null?'':val)+'" style="'+IST+';'+(w||'')+'">'; }
      function numf(f,val,w){ return '<input data-f="'+f+'" type="number" step="any" value="'+(val==null||val===''?'':val)+'" style="'+IST+';text-align:right;'+(w||'width:84px')+'">'; }
      function secPicker(val,known){
        var match=known.indexOf(val)>=0, isNew=!match;
        var sel='<select class="ssecsel" style="'+IST+';width:100%">';
        known.forEach(function(s){ sel+='<option value="'+esc(s)+'"'+(match&&s===val?' selected':'')+'>'+esc(s)+'</option>'; });
        sel+='<option value="__new__"'+(isNew||!known.length?' selected':'')+'>+ новый раздел…</option></select>';
        var txt='<input data-f="sec" value="'+esc(val||'')+'" placeholder="Название раздела" style="'+IST+';width:100%;margin-top:4px;'+((isNew||!known.length)?'':'display:none')+'">';
        return '<div>'+sel+txt+'</div>';
      }
      function custRow(t,it,known){
        it=it||{};
        // проценты (отходы/расходники/работа) снабженцу не показываем — это
        // коэффициенты руководства; при сохранении они берутся из прежних значений
        var r='<div class="scustrow" data-t="'+t+'" data-code="'+esc(it.code||'')+'" style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin-bottom:6px">';
        r+=fld('Название', txtf('lbl', it.lbl, 'width:100%'), 'flex:1;min-width:170px');
        r+=fld('Параметры, мм', txtf('spec', it.spec, 'width:110px'), 'width:110px');
        r+=fld('Раздел', secPicker(it.sec, known), 'width:190px');
        r+=fld('Цена, ₸', numf('u', it.u));
        r+='<button class="sdelcust btn" data-t="'+t+'" data-code="'+esc(it.code||'')+'" type="button" style="padding:6px 10px" title="Удалить позицию">✕</button>';
        r+='</div>';
        return r;
      }

      h+='<h3 style="margin-top:18px">Свои материалы</h3>';
      h+='<div class="small muted" style="margin-bottom:6px">Появился новый материал — добавьте его здесь, и он сразу станет доступен в калькуляторе.</div>';
      PR.customMat.forEach(function(it){ h+=custRow('mat', it, matSections); });
      h+='<button class="btn" data-sadd="mat" type="button" style="margin-top:4px">+ материал</button>';

      h+='<h3 style="margin-top:16px">Свои компоненты</h3>';
      PR.customCmp.forEach(function(it){ h+=custRow('cmp', it, cmpSections); });
      h+='<button class="btn" data-sadd="cmp" type="button" style="margin-top:4px">+ компонент</button>';

      h+='<div style="display:flex;gap:10px;align-items:center;margin:16px 0 30px"><button class="btn primary" id="sprSave" type="button">Сохранить цены</button><span class="small" id="sprMsg"></span></div>';
      return h;
    }

    function collectPricesTab(){
      var mat={}, cmp={};
      [].forEach.call(document.querySelectorAll('.smp'), function(el){ if(el.value!=='') mat[el.getAttribute('data-code')]=+el.value; });
      [].forEach.call(document.querySelectorAll('.scp'), function(el){ if(el.value!=='') cmp[el.getAttribute('data-code')]=+el.value; });
      var customMat=[], customCmp=[];
      // коэффициенты (отходы/расходники/работа) в форме не показываются —
      // берём прежние значения по коду позиции, для новых — стандартные
      var oldMat={}, oldCmp={};
      (PR.customMat||[]).forEach(function(it){ oldMat[it.code]=it; });
      (PR.customCmp||[]).forEach(function(it){ oldCmp[it.code]=it; });
      function fv(row,f){ var el=row.querySelector('[data-f="'+f+'"]'); return el?el.value:''; }
      [].forEach.call(document.querySelectorAll('.scustrow'), function(row){
        var t=row.getAttribute('data-t'), code=row.getAttribute('data-code');
        var lbl=fv(row,'lbl').trim(); if(!lbl) return;
        var sec=fv(row,'sec').trim();
        var spec=fv(row,'spec').trim();
        if(t==='mat'){
          var om=oldMat[code]||{};
          customMat.push({ code:code, lbl:lbl, spec:spec, sec:sec||'ДРУГИЕ МАТЕРИАЛЫ', u:+fv(row,'u')||0,
            ost:(om.ost!=null?om.ost:0.15), rah:(om.rah!=null?om.rah:0.04) });
        } else {
          var oc=oldCmp[code]||{};
          customCmp.push({ code:code, lbl:lbl, spec:spec, sec:sec||'ДРУГИЕ КОМПОНЕНТЫ', u:+fv(row,'u')||0,
            ost:(oc.ost!=null?oc.ost:0), rah:(oc.rah!=null?oc.rah:0.07), m:(oc.m!=null?oc.m:1) });
        }
      });
      return { mat:mat, cmp:cmp, customMat:customMat, customCmp:customCmp };
    }
    function sNewCode(t){ return (t==='mat'?'CUSTM_':'CUSTC_')+Date.now().toString(36)+Math.floor(Math.random()*1000); }
    function wirePricesTab(){
      var save=document.getElementById('sprSave'); if(!save) return;
      save.onclick=function(){
        var body=collectPricesTab();
        var msg=document.getElementById('sprMsg'); msg.textContent='Сохранение…'; msg.style.color='var(--muted)';
        fetch(WORKER+'/pricing-save-materials',{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) })
          .then(function(r){return r.json();}).then(function(j){
            if(!j||!j.ok) throw new Error((j&&j.error)||'?');
            PR.mat=body.mat; PR.cmp=body.cmp; PR.customMat=body.customMat; PR.customCmp=body.customCmp;
            msg.textContent='Сохранено ✓ Новые расчёты пойдут по этим ценам.'; msg.style.color='var(--green)';
          }).catch(function(e){ msg.textContent='Ошибка: '+(e&&e.message||e); msg.style.color='var(--red)'; });
      };
      [].forEach.call(document.querySelectorAll('[data-sadd]'), function(b){
        b.onclick=function(){
          var t=this.getAttribute('data-sadd');
          var cur=collectPricesTab();
          PR.mat=cur.mat; PR.cmp=cur.cmp; PR.customMat=cur.customMat; PR.customCmp=cur.customCmp;
          if(t==='mat') PR.customMat.push({code:sNewCode('mat'),lbl:'',sec:'',u:'',ost:0.15,rah:0.04});
          else PR.customCmp.push({code:sNewCode('cmp'),lbl:'',sec:'',u:'',rah:0.07,m:1});
          render();
        };
      });
      [].forEach.call(document.querySelectorAll('.sdelcust'), function(b){
        b.onclick=function(){
          if(!confirm('Удалить позицию из каталога? В старых сохранённых расчётах она останется как есть.')) return;
          var t=this.getAttribute('data-t'), code=this.getAttribute('data-code');
          var cur=collectPricesTab();
          PR.mat=cur.mat; PR.cmp=cur.cmp;
          if(t==='mat') PR.customMat=cur.customMat.filter(function(x){return x.code!==code;}); else PR.customMat=cur.customMat;
          if(t==='cmp') PR.customCmp=cur.customCmp.filter(function(x){return x.code!==code;}); else PR.customCmp=cur.customCmp;
          render();
        };
      });
      [].forEach.call(document.querySelectorAll('.ssecsel'), function(sel){
        var txt=sel.parentElement.querySelector('[data-f="sec"]'); if(!txt) return;
        sel.onchange=function(){
          if(sel.value==='__new__'){ txt.style.display=''; txt.value=''; txt.focus(); }
          else { txt.style.display='none'; txt.value=sel.value; }
        };
      });
    }

    function render(){
      var app=document.getElementById('app');
      var h='<h2>Снабжение</h2><div class="tabs">';
      [['req','Заявки'+(OPEN?'<span class="cnt">'+OPEN+'</span>':'')],
       ['tools','Инструмент и сервис'+(DUE?'<span class="cnt">'+DUE+'</span>':'')],
       ['cash','Наличные расходы'],
       ['prices','💲 Цены материалов']].forEach(function(x){
        h+='<div class="tab'+(TAB===x[0]?' active':'')+'" data-tab="'+x[0]+'">'+x[1]+'</div>';
      });
      h+='</div>';
      h+= TAB==='req' ? renderReq() : TAB==='tools' ? renderTools() : TAB==='prices' ? renderPrices() : renderCash();

      [].forEach.call(document.querySelectorAll('.tab[data-tab]'), function(el){ el.onclick=function(){ TAB=this.getAttribute('data-tab'); TOOL_EDIT=null; render(); }; });

      [].forEach.call(document.querySelectorAll('.rqfiles'), function(el){

          .then(function(r){return r.json();}).then(function(j){
            var list=(j&&j.receipts)||[];

            el.innerHTML=list.map(function(r){ var pdf=/\.pdf$/i.test(r.filename||''); return '<a href="'+WORKER+'/receipt-get?id='+r.id+'" target="_blank" title="'+(r.filename||'')+'">'+(pdf?'📄':'📷')+'</a>'; }).join(' ');

      [].forEach.call(document.querySelectorAll('.rq'), function(b){

      });
      [].forEach.call(document.querySelectorAll('.sarch'), function(b){
        b.onclick=function(){ var id=+this.getAttribute('data-id');

          fetch(WORKER+'/supply-request-archive',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:id})})
            .then(function(r){return r.json();}).then(function(j){ if(!j.ok) throw new Error(j.error); loadAll(); })
            .catch(function(e){ alert('Не удалось: '+(e&&e.message||e)); });
        };
      });
      [].forEach.call(document.querySelectorAll('.sdel'), function(b){
        b.onclick=function(){ var id=+this.getAttribute('data-id');
          if(!confirm('УДАЛИТЬ заявку безвозвратно вместе с чеками? Для рабочих заявок используйте архив.')) return;
          fetch(WORKER+'/supply-request-delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:id})})
            .then(function(r){return r.json();}).then(function(j){ if(!j.ok) throw new Error(j.error); loadAll(); })
            .catch(function(e){ alert('Не удалось: '+(e&&e.message||e)); });
        };
      });
      [].forEach.call(document.querySelectorAll('[data-reqedit]'), function(b){
        b.onclick=function(){ toggleReqEditRow(+this.getAttribute('data-reqedit')); };
      });

      var ta=document.getElementById('taddBtn'); if(ta) ta.onclick=function(){ TOOL_EDIT={}; render(); };
      [].forEach.call(document.querySelectorAll('.tedit'), function(b){
        b.onclick=function(){ var id=+this.getAttribute('data-id'); TOOL_EDIT=JSON.parse(JSON.stringify(TOOLS.filter(function(x){return x.id===id;})[0]||{})); render(); };
      });
      [].forEach.call(document.querySelectorAll('.tdel'), function(b){
        b.onclick=function(){ var id=+this.getAttribute('data-id');
          if(!confirm('Удалить из реестра вместе с чеками?')) return;
          fetch(WORKER+'/tool-delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:id})})
            .then(function(){ loadAll(); });
        };
      });
      var ts=document.getElementById('tsave'); if(ts) ts.onclick=function(){
        TOOL_FIELDS.forEach(function(f){ var el=document.getElementById('tf_'+f[0]); if(el) TOOL_EDIT[f[0]]=el.value.trim(); });
        if(!TOOL_EDIT.name){ alert('Укажите наименование.'); return; }
        var btn=this; btn.disabled=true;
        fetch(WORKER+'/tool-save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({tool:TOOL_EDIT})})
          .then(function(r){return r.json();}).then(function(j){
            if(!j.ok) throw new Error(j.error);
            return uploadPending('tool', j.id, 'tp', btn);
          }).then(function(){ TOOL_EDIT=null; loadAll(); })
          .catch(function(e){ alert('Не сохранилось: '+(e&&e.message||e)); btn.disabled=false; btn.textContent='💾 Сохранить'; });
      };
      var tc=document.getElementById('tcancel'); if(tc) tc.onclick=function(){ TOOL_EDIT=null; render(); };
      var trec=document.getElementById('trec'); if(trec && TOOL_EDIT && TOOL_EDIT.id) fillReceipts('tool', TOOL_EDIT.id, trec);
      wirePicker('tp');

        var note=document.getElementById('inote').value.trim();
        var msg=document.getElementById('imsg');
        if(!(amount>0)||!date){ msg.textContent='Заполните дату и сумму.'; return; }
        var btn=this; btn.disabled=true;
        fetch(WORKER+'/cash-issue-save',{method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({issue:{date:date,amount:amount,note:note}})})
          .then(function(r){return r.json();}).then(function(j){ if(!j.ok) throw new Error(j.error); loadAll(); })
          .catch(function(e){ msg.textContent='Не сохранилось: '+(e&&e.message||e); btn.disabled=false; });

      [].forEach.call(document.querySelectorAll('.idel'), function(b){
        b.onclick=function(){ var id=+this.getAttribute('data-id');
          if(!confirm('Удалить эту выдачу? Остаток пересчитается.')) return;
          fetch(WORKER+'/cash-issue-delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:id})})
            .then(function(){ loadAll(); });
        };
      });
      var cadd=document.getElementById('cadd'); if(cadd) cadd.onclick=function(){
        var amount=+String(document.getElementById('camount').value).replace(/[^\d.]/g,'');
        var what=document.getElementById('cwhat').value.trim();
        var date=document.getElementById('cdate').value;
        var msg=document.getElementById('cmsg');
        if(!(amount>0)||!what||!date){ msg.textContent='Заполните дату, сумму и «на что».'; return; }
        var btn=this; btn.disabled=true;
        fetch(WORKER+'/cash-save',{method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({entry:{date:date,amount:amount,what:what,note:document.getElementById('cnote').value.trim()}})})
          .then(function(r){return r.json();}).then(function(j){
            if(!j.ok) throw new Error(j.error);
            return uploadPending('cash', j.id, 'cp', msg);
          }).then(function(){ btn.disabled=false; loadAll(); })
          .catch(function(e){ msg.textContent='Ошибка: '+(e&&e.message||e); btn.disabled=false; });
      };
      [].forEach.call(document.querySelectorAll('.cdel'), function(b){
        b.onclick=function(){ var id=+this.getAttribute('data-id');
          if(!confirm('Удалить запись вместе с чеками?')) return;
          fetch(WORKER+'/cash-delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:id})})
            .then(function(){ loadAll(); });
        };
      });
      [].forEach.call(document.querySelectorAll('.crec'), function(el){ fillReceipts('cash', el.getAttribute('data-id'), el); });
      [].forEach.call(document.querySelectorAll('.cfile'), function(inp){
        inp.onchange=function(){ if(this.files && this.files[0]) uploadReceipt('cash', this.getAttribute('data-id'), this.files[0], function(){ render(); }); };
      });
    }

    canUse().then(function(allowed){
      if(!allowed){
        document.getElementById('boot').textContent='Раздел доступен руководителю и снабженцу (право включается в «Зарплата / Работники»).';
        return;
      }
      return loadAll();
    }).catch(function(e){ document.getElementById('boot').textContent='Ошибка: '+(e&&e.message||e); });
  </script>
</body>
</html>
